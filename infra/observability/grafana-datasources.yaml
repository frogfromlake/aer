# Grafana datasource provisioning — wires the two AĒR observability backends
# (Tempo for traces, Prometheus for metrics) so dashboards resolve them by uid.
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus