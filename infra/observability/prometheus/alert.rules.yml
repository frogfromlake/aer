# Prometheus alert rules for the AĒR pipeline. Loaded by prometheus.yml via
# rule_files. These evaluate in Prometheus (visible in its /alerts UI) and are
# validated offline by promtool (`make observability-validate`).
#
# DELIVERY (email→Brevo) is owned by the Grafana-managed MIRROR of these rules in
# ../grafana/provisioning/alerting/rules.yaml (SEC-037 — contact points only fire
# from Grafana-managed rules; no Alertmanager container per D4). The two are kept
# in lockstep BY HAND: change a threshold/expr here AND in the Grafana mirror, or
# they drift. Prometheus = validated local view; Grafana = delivery + graphical.
groups:
  - name: aer_pipeline
    rules:
      - alert: WorkerDown
        expr: up{job="analysis-worker"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Analysis Worker is down"
          description: "The analysis-worker Prometheus scrape target has been unreachable for more than 1 minute."

      - alert: DLQOverflow
        expr: dlq_size > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead Letter Queue overflow detected"
          description: "bronze-quarantine bucket contains {{ $value }} objects, exceeding the threshold of 50."

      - alert: HighEventProcessingLatency
        # for: 1h (not 5m) — event_processing_duration is PER-DOCUMENT end-to-end
        # (BERT NER + BERTopic + sentiment), so a p95 > 5s is normal load during a
        # 6-hourly crawl burst and self-resolves in ~25 min. Only a *sustained*
        # hour of high p95 means the pipeline genuinely cannot drain (real
        # backlog). CrawlStale + DLQOverflow are the fast data-integrity signals;
        # this is the slow "is the worker keeping up" one. Kept in lockstep with
        # the Grafana mirror (grafana/provisioning/alerting/rules.yaml).
        expr: histogram_quantile(0.95, rate(event_processing_duration_seconds_bucket[5m])) > 5
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High event processing latency (p95)"
          description: "95th percentile processing duration is {{ $value }}s, exceeding the 5s threshold."

  # SEC-052 / SEC-056 — host & ingress signals. Without these the most likely
  # single-box outages (disk-fill, OOM, silent TLS-cert expiry, a dead scrape
  # target) are invisible until a user complains. Delivery to the operator is
  # wired in SEC-037 (Batch D); these rules evaluate in Prometheus regardless.
  - name: aer_infra
    rules:
      # Generic liveness for every scrape target (WorkerDown stays as the
      # critical-severity specialisation for the worker).
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Scrape target {{ $labels.job }} is down"
          description: "Prometheus target {{ $labels.job }} ({{ $labels.instance }}) has been unreachable for more than 2 minutes."

      # Disk-fill — the #1 single-box killer. node-exporter reports the host root
      # as mountpoint "/" (the rootfs is bind-mounted at /host with
      # --path.rootfs=/host). Logs + all data volumes share this filesystem.
      - alert: DiskSpaceLow
        expr: |
          node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs|ramfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs|ramfs"} < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk below 15% free"
          description: "Root filesystem has {{ $value | humanizePercentage }} space left. Logs/volumes share this disk — investigate before the data layer loses write space."

      - alert: DiskSpaceCritical
        expr: |
          node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs|ramfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs|ramfs"} < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host disk below 5% free"
          description: "Root filesystem has {{ $value | humanizePercentage }} space left. Postgres/ClickHouse/MinIO write failures are imminent."

      # Memory pressure (proxy for the OOM-killer reaping a service — SEC-038).
      - alert: HostMemoryLow
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory below 10% available"
          description: "{{ $value | humanizePercentage }} memory available. Under load the OOM-killer may reap postgres/bff/minio."

      # TLS cert expiry — a whole-site outage at the ACME boundary, otherwise
      # signal-less. The series only exists once Traefik has loaded a cert, so
      # this never false-fires pre-issuance.
      - alert: TLSCertExpiringSoon
        expr: (min(traefik_tls_certs_not_after) by (sans)) - time() < 7 * 86400
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring within 7 days"
          description: "A Traefik-served certificate ({{ $labels.sans }}) expires in less than 7 days and has not auto-renewed."

      - alert: TLSCertExpiringCritical
        expr: (min(traefik_tls_certs_not_after) by (sans)) - time() < 2 * 86400
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate expiring within 2 days"
          description: "A Traefik-served certificate ({{ $labels.sans }}) expires in less than 2 days — ACME renewal is failing; the public site will go offline."

  # SEC-049 / SEC-053 — data-integrity heartbeats. A backup that silently stops
  # and a corpus that silently freezes are the two "looks fine until you need it"
  # failures; both are surfaced here off metrics backup.sh / the worker emit.
  - name: aer_backup
    rules:
      # backup.sh writes aer_backup_last_success_timestamp_seconds via the
      # node-exporter textfile collector. Daily backup + a generous grace.
      - alert: BackupStale
        expr: time() - aer_backup_last_success_timestamp_seconds > 26 * 3600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in over 26 hours"
          description: "Last successful off-box backup was {{ $value | humanizeDuration }} ago. The off-box recovery point is aging — investigate before relying on it."

      # The metric is entirely absent → backup.sh has never run (or the textfile
      # path is misconfigured). Distinct from a stale-but-present series.
      - alert: BackupNeverRan
        expr: absent(aer_backup_last_success_timestamp_seconds)
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: "No backup heartbeat metric present"
          description: "aer_backup_last_success_timestamp_seconds is absent — the backup job has never succeeded or the node-exporter textfile path is wrong."

      - alert: BackupFailed
        expr: aer_backup_last_exit_code != 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Last backup run failed"
          description: "backup.sh exited {{ $value }} on its last run. Off-box backups are not being taken; check the host scheduler + Storage Box reachability."

      # Pipeline alive (worker up) but no new Gold for 6h → the corpus has
      # silently frozen (no crawl / discovery gap), distinct from WorkerDown.
      # The most dangerous failure for a data-quality-supreme system.
      - alert: CrawlStale
        expr: |
          sum(increase(events_processed_total[6h])) == 0
            and sum(up{job="analysis-worker"}) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No documents processed in 6 hours (corpus frozen)"
          description: "The worker is up but has processed zero events for 6h — the crawl has likely stopped. The dashboard keeps serving aging Gold that looks current."

  # Phase 150 — live capacity & growth guardrails. These fire on signals that
  # ALREADY exist natively (Phase 154 added the worker JetStream-lag gauge + the
  # ClickHouse-native endpoint + the minio/clickhouse scrape jobs), so the
  # SEC-052-remainder exporters (cadvisor/nats-exporter) are NOT needed for them
  # (Occam): worker RSS comes from prometheus_client's default process collector,
  # backlog from nats_consumer_pending, object-store capacity from the minio job.
  # Kept in lockstep with the Grafana mirror (grafana/.../alerting/rules.yaml).
  - name: aer_capacity
    rules:
      # Worker falling behind ingestion: JetStream messages pending delivery to the
      # durable consumer (main.py sets nats_consumer_pending from num_pending). A
      # crawl burst spikes this then drains within the hour; >1000 sustained for a
      # full hour means the pool genuinely cannot keep up — distinct from CrawlStale
      # (zero throughput). Tuned long to avoid per-crawl noise (the
      # HighEventProcessingLatency lesson).
      - alert: WorkerBacklogGrowing
        expr: nats_consumer_pending > 1000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Analysis-worker backlog not draining"
          description: "{{ $value }} JetStream messages pending for the worker consumer for over 1h — ingestion is outpacing processing. Check worker CPU/memory + crawl volume; see the scale runbook."

      # Worker RSS approaching its memory cap. Phase 148c measured a ~9.3 GiB peak
      # against the 11 GiB (11264M) limit; >90% (~10.1 GiB) sustained means the
      # 148c headroom is shrinking and a BERTopic fit may stall at the ceiling.
      # The 11811160064 constant MUST track compose.yaml's analysis-worker
      # deploy.resources.limits.memory (there is no cadvisor on the box to read the
      # cgroup limit dynamically).
      - alert: WorkerMemoryHigh
        expr: process_resident_memory_bytes{job="analysis-worker"} / 11811160064 > 0.90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Analysis-worker RSS above 90% of its 11 GiB cap"
          description: "Worker RSS is {{ $value | humanizePercentage }} of the 11 GiB limit for 15m. The 148c headroom is shrinking; at the cap the container OOMs (→ WorkerDown). Investigate corpus size / the topic embedding + co-occurrence window."

      # A poison message is a document that fails processing even after NATS
      # redelivery (terminated to avoid an infinite redeliver loop). Any non-zero
      # rate is worth a look — usually a source-format change breaking an adapter.
      - alert: WorkerPoisonMessages
        expr: increase(analysis_worker_poison_messages_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Analysis-worker hit a poison message"
          description: "{{ $value }} message(s) failed processing past redelivery in the last hour. A source's structure likely changed — check worker logs + the bronze-quarantine DLQ."

      # MinIO's own view of usable capacity (distinct from the host-fs DiskSpaceLow;
      # on this single box they track the same disk, but this survives a future move
      # of MinIO to its own volume and catches object-store fill explicitly).
      - alert: MinIOCapacityLow
        expr: |
          minio_cluster_capacity_usable_free_bytes
            / minio_cluster_capacity_usable_total_bytes < 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "MinIO usable capacity below 15%"
          description: "MinIO reports {{ $value | humanizePercentage }} usable capacity free. Bronze/Silver ILM should bound growth — if this keeps falling, ILM may not be pruning (run scripts/operations/verify_ilm.sh)."

      # ILM enforcement heartbeat — verify_ilm.sh (aer-verify-ilm.timer) checks that
      # MinIO objects + ClickHouse rows are actually expired at their TTL and writes
      # aer_ilm_* via the node-exporter textfile collector (same pattern as
      # backup.sh). Absent/old metric = the check stopped.
      - alert: ILMCheckStale
        expr: absent(aer_ilm_last_check_timestamp_seconds) or time() - aer_ilm_last_check_timestamp_seconds > 26 * 3600
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "ILM TTL-enforcement check not running"
          description: "verify_ilm.sh has not reported in over 26h (or never) — TTL enforcement is no longer being verified live. Check the aer-verify-ilm systemd timer."

      # violations>0 = data older than its TTL is lingering (ILM not enforcing →
      # unbounded growth + a DSGVO-retention breach). The strong "verified live, not
      # just configured" signal the phase requires.
      - alert: ILMViolation
        expr: aer_ilm_violations > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Data older than its ILM TTL is lingering"
          description: "verify_ilm.sh found {{ $value }} TTL violation(s) — MinIO objects or ClickHouse rows past their retention are not being pruned. Check the MinIO lifecycle config + ClickHouse TTL merges before storage grows unbounded."
