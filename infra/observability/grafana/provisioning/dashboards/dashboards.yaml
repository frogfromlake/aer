# Grafana dashboard provisioning — loads the committed dashboard JSON from
# /etc/grafana/provisioning/dashboards on a 30s refresh.
apiVersion: 1

providers:
  - name: 'aer-dashboards'
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
