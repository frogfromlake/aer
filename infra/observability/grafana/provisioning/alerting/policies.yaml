# SEC-037 — notification policy. Alerts now go to ntfy push (free), not email, so
# they no longer consume the Brevo quota. Three tiers (2026-06-29):
#   • default (warnings) → aer-ntfy-warning, repeat once every 24h, no "resolved"
#     push. A continuously-firing warning (disk <15%, ILM stale, worker RAM) pushes
#     at most once a day.
#   • alertname=~"Backup.*" → aer-ntfy, repeat every 24h, alerts grouped together
#     so BackupFailed + BackupStale arrive as ONE push, not two. (Before this they
#     were 2 critical alerts × 1h = ~2 mails/hour — far too noisy. Once a day is
#     plenty to learn the off-box backup needs attention.) Listed FIRST so it wins
#     over the generic critical route below.
#   • severity=critical → aer-ntfy, repeat every 1h, with "resolved" push. The
#     genuine wake-me-up tier (disk <5%, cert expiring, service down) — rare.
apiVersion: 1

policies:
  - orgId: 1
    receiver: aer-ntfy-warning
    group_by: ["alertname"]
    group_wait: 1m
    group_interval: 10m
    repeat_interval: 24h
    routes:
      - receiver: aer-ntfy
        matchers:
          - alertname =~ "Backup.*"
        # group WITHOUT alertname so the redundant Backup* alerts coalesce into one.
        group_by: ["grafana_folder"]
        group_wait: 1m
        group_interval: 30m
        repeat_interval: 24h
      - receiver: aer-ntfy
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 1h
