# SEC-037 — notification policy. How alerts are grouped + routed to the contact
# point. Single default policy: everything goes to the email contact point,
# grouped by alertname so repeated firings of the same rule coalesce. Critical
# alerts get a tighter repeat interval so they keep nagging until resolved.
apiVersion: 1

policies:
  - orgId: 1
    receiver: aer-email
    group_by: ["alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: aer-email
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
