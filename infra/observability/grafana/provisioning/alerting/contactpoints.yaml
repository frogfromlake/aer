# SEC-037 — Grafana unified-alerting contact points. Where alerts are delivered.
#
# Alerts are delivered to ntfy (free push, see aer-ntfy below) so they no longer
# consume the Brevo email quota (reserved for user invites/resets, Phase 153).
# The email contact points are kept as an inert fallback. All recipient addresses
# / URLs come from env (ALERT_EMAIL_TO / NTFY_ALERT_URL) — never hardcoded, the
# repo is public.
apiVersion: 1

contactPoints:
  # Critical alerts (disk <5%, backup failed, cert expiring, service down): mailed
  # immediately, plus a "resolved" mail when they clear so the operator knows the
  # incident is over.
  - orgId: 1
    name: aer-email
    receivers:
      - uid: aer_email_receiver
        type: email
        settings:
          addresses: ${ALERT_EMAIL_TO}
          # One email per alert group (singleEmail=false would split). Keep the
          # group summary so a disk-fill storm is one mail, not fifty.
          singleEmail: false
        disableResolveMessage: false

  # Warning alerts (RAM near cap, disk <15%, ILM heartbeat, etc.): same mailbox,
  # but NO "resolved" mails — a worker that hits 90% RAM and recovers on every run
  # would otherwise send two mails per run. Paired with the 24h repeat in
  # policies.yaml, each warning mails at most once a day. Saves the Brevo quota
  # (shared with user invites/resets, Phase 153) for what actually matters.
  - orgId: 1
    name: aer-email-warning
    receivers:
      - uid: aer_email_warning_receiver
        type: email
        settings:
          addresses: ${ALERT_EMAIL_TO}
          singleEmail: false
        disableResolveMessage: true

  # ntfy push (free, no email quota). Grafana POSTs the alert to the private ntfy
  # topic URL (NTFY_ALERT_URL, env — the topic name is the shared secret, so it is
  # never committed). Two receivers mirror the email tiers: critical/backup send a
  # "resolved" push, warnings do not (no recover-spam). Same topic, both.
  - orgId: 1
    name: aer-ntfy
    receivers:
      - uid: aer_ntfy_receiver
        type: webhook
        settings:
          url: ${NTFY_ALERT_URL}
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: aer-ntfy-warning
    receivers:
      - uid: aer_ntfy_warning_receiver
        type: webhook
        settings:
          url: ${NTFY_ALERT_URL}
          httpMethod: POST
        disableResolveMessage: true
