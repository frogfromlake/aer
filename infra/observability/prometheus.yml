global:
  scrape_interval: 5s

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'analysis-worker'
    static_configs:
      - targets: ['analysis-worker:8001']

  - job_name: 'ingestion-api'
    static_configs:
      - targets: ['ingestion-api:8081']

  - job_name: 'bff-api'
    static_configs:
      - targets: ['bff-api:8080']
    metrics_path: /metrics

  # Phase 154 — datastore health via native Prometheus endpoints (no exporter
  # containers). MinIO exposes cluster metrics unauthenticated (public auth
  # type, internal network only); ClickHouse exposes its built-in endpoint on
  # port 9363. Both are scraped for the operator dashboard's storage-health row.
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']