# Prometheus — metrics scraping + alerting for the AĒR stack. Scrapes the OTel
# Collector's Prometheus exporter and each service's /metrics endpoint, and
# loads the alert rules referenced under rule_files.
global:
  scrape_interval: 5s

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'analysis-worker'
    static_configs:
      - targets: ['analysis-worker:8001']

  - job_name: 'ingestion-api'
    static_configs:
      - targets: ['ingestion-api:8081']

  - job_name: 'bff-api'
    static_configs:
      - targets: ['bff-api:8080']
    metrics_path: /metrics

  # Phase 154 — datastore health via native Prometheus endpoints (no exporter
  # containers). MinIO exposes cluster metrics unauthenticated (public auth
  # type, internal network only); ClickHouse exposes its built-in endpoint on
  # port 9363. Both are scraped for the operator dashboard's storage-health row.
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']

  # SEC-056 — host filesystem / memory / CPU. Disk-fill is the #1 single-box
  # killer; node-exporter mounts the host root read-only and is the metric
  # source the DiskSpaceLow/HostMemoryLow rules depend on.
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # SEC-052 — Traefik router/entrypoint metrics + TLS cert expiry
  # (traefik_tls_certs_not_after) so ACME cert-renewal failure is alertable
  # before the public site goes dark at the 90-day boundary. Scraped over the
  # internal metrics entrypoint (:8082), never host-published.
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']