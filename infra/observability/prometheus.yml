global:
  scrape_interval: 5s

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'analysis-worker'
    static_configs:
      - targets: ['analysis-worker:8001']

  - job_name: 'ingestion-api'
    static_configs:
      - targets: ['ingestion-api:8081']

  - job_name: 'bff-api'
    static_configs:
      - targets: ['bff-api:8080']
    metrics_path: /metrics