# CI-only overlay (Phase 150, M5) — the nightly smoke PULLS the pre-built GHCR
# service images instead of building them locally (a ~10 GB analysis-worker
# rebuild that timed the job out at ~25 min). It mirrors the four `image:` refs
# from compose.prod.yaml but WITHOUT the prod ACME / Traefik-host overlay (the
# smoke has no real domain or TLS). Activated by COMPOSE_FILE=compose.yaml:compose.ci-images.yaml
# (defaulted in scripts/build/e2e_smoke_test.sh). `!reset` drops the base
# `build:` so the stack is pull-only. GHCR_OWNER/IMAGE_TAG come from the CI .env
# (defaults: frogfromlake / latest).
services:
  ingestion-api:
    image: ghcr.io/${GHCR_OWNER:-frogfromlake}/aer-ingestion-api:${IMAGE_TAG:-latest}
    build: !reset null

  bff-api:
    image: ghcr.io/${GHCR_OWNER:-frogfromlake}/aer-bff-api:${IMAGE_TAG:-latest}
    build: !reset null

  analysis-worker:
    image: ghcr.io/${GHCR_OWNER:-frogfromlake}/aer-analysis-worker:${IMAGE_TAG:-latest}
    build: !reset null
    # CI runners have 4 vCPU; compose.yaml pins cpus "6.00" for the 8-vCPU prod
    # box, which Docker rejects on the runner ("range of CPUs is 0.01 to 4.00").
    # The smoke does a tiny synthetic ingest (not a real crawl), so cap it low —
    # memory (11264M) merges through from the base, harmless on the 16 GB runner.
    deploy:
      resources:
        limits:
          cpus: "2.00"

  dashboard:
    image: ghcr.io/${GHCR_OWNER:-frogfromlake}/aer-dashboard:${IMAGE_TAG:-latest}
    build: !reset null
