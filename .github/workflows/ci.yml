name: AĒR Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-pipeline:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' # Matches production Dockerfile (python:3.14.3-slim-bookworm)
          cache: 'pip'

      # The Phase-119 BERT determinism test and the Phase-120 BERTopic
      # end-to-end test pull HuggingFace model snapshots on first run
      # (~2 GB combined). Caching the HF home directory keyed on the
      # model revisions in the language-capability manifest skips the
      # download on warm runs and cuts the python pipeline by 5-7 min.
      # Cache key falls back to the manifest hash so a revision bump
      # invalidates automatically.
      - name: Cache HuggingFace model snapshots
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('services/analysis-worker/configs/language_capabilities.yaml') }}
          restore-keys: |
            hf-${{ runner.os }}-

      # scikit-learn 1.7.0 / scipy 1.17.1 ship no cp314 wheels yet, so pip
      # builds them from source on Python 3.14. Mirror the worker
      # Dockerfile's builder stage (gfortran + OpenBLAS/LAPACK) so the
      # source build succeeds. CI/runtime parity (Phase 35); revisit once
      # upstream ships cp314 wheels (then this step + the source build go away).
      - name: Install scientific-stack build deps (scipy/scikit-learn on Python 3.14)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ gfortran make libopenblas-dev liblapack-dev

      - name: Install Dependencies
        working-directory: ./services/analysis-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff (analysis-worker)
        working-directory: ./services/analysis-worker
        run: python -m ruff check .

      - name: Run Unit Tests (analysis-worker)
        working-directory: ./services/analysis-worker
        run: python -m pytest tests/ -v

      - name: Install Web-Crawler Dependencies (Phase 122)
        working-directory: ./crawlers/web-crawler
        run: pip install -e ".[dev]"

      - name: Lint with Ruff (web-crawler)
        working-directory: ./crawlers/web-crawler
        run: python -m ruff check .

      - name: Run Unit Tests (web-crawler)
        working-directory: ./crawlers/web-crawler
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  # The Go pipeline is split into three independent jobs that run in
  # parallel: linting (4 modules), the OpenAPI contract-sync check, and
  # the testcontainer-backed integration tests. End-to-end wall time is
  # dominated by the slowest job (tests) instead of the sum, cutting
  # ~3 min off the per-push budget. Setup-Go cache + a shared go-tools
  # cache amortise the per-job setup cost.

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Cache Go tools (golangci-lint)
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint Ingestion API
        working-directory: ./services/ingestion-api
        run: golangci-lint run

      - name: Lint BFF API
        working-directory: ./services/bff-api
        run: golangci-lint run

      - name: Lint pkg/
        working-directory: ./pkg
        run: golangci-lint run

  go-codegen-sync:
    name: Go OpenAPI Contract Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum

      - name: Cache Go tools (oapi-codegen)
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@${{ env.OAPI_CODEGEN_VERSION }}

      - name: OpenAPI $ref-style lint (ADR-021)
        run: make openapi-lint

      - name: OpenAPI Contract Test (codegen sync check)
        run: |
          make codegen
          git diff --exit-code services/bff-api/internal/handler/generated.go services/ingestion-api/internal/handler/generated.go

      - name: OpenAPI Bundle (Swagger UI artifact)
        run: make openapi-bundle

  go-test:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Extract Testcontainer image tags from compose.yaml
        id: tc-images
        run: |
          echo "minio=$(yq '.services.minio.image' compose.yaml)" >> $GITHUB_OUTPUT
          echo "postgres=$(yq '.services.postgres.image' compose.yaml)" >> $GITHUB_OUTPUT
          echo "clickhouse=$(yq '.services.clickhouse.image' compose.yaml)" >> $GITHUB_OUTPUT

      - name: Cache Testcontainers Docker images
        uses: actions/cache@v5
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-tc-${{ hashFiles('compose.yaml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-images/*.tar; do
            [ -f "$f" ] && docker load -i "$f"
          done

      - name: Pull and cache Testcontainers images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          docker pull ${{ steps.tc-images.outputs.minio }}
          docker pull ${{ steps.tc-images.outputs.postgres }}
          docker pull ${{ steps.tc-images.outputs.clickhouse }}

          docker save ${{ steps.tc-images.outputs.minio }} -o /tmp/docker-images/minio.tar
          docker save ${{ steps.tc-images.outputs.postgres }} -o /tmp/docker-images/postgres.tar
          docker save ${{ steps.tc-images.outputs.clickhouse }} -o /tmp/docker-images/clickhouse.tar

      - name: Run Go Integration Tests (Testcontainers)
        run: |
          cd services/ingestion-api && go test -v ./...
          cd ../bff-api && go test -v ./...
          cd ../../pkg && go test -v ./...

  frontend-pipeline:
    name: Frontend Lint, Test & Bundle-Size Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack (pnpm from packageManager field)
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('services/dashboard/pnpm-lock.yaml') }}

      - name: Install dependencies (frozen lockfile)
        working-directory: ./services/dashboard
        run: pnpm install --frozen-lockfile

      - name: Bundle OpenAPI spec (SSoT for TS codegen)
        run: make openapi-bundle

      - name: OpenAPI TS codegen sync check (ADR-021 parity)
        run: |
          make fe-codegen
          git diff --exit-code services/dashboard/src/lib/api/types.ts

      - name: Lint (ESLint + Prettier + svelte-check)
        run: make fe-lint

      - name: Unit tests (Vitest)
        run: make fe-test

      - name: Production build (static adapter)
        run: make fe-build

      - name: Bundle-size gate (80 kB gzipped, Design Brief §7)
        run: make fe-bundle-size

      - name: Playwright visual + axe a11y gate (Phase 98c)
        run: make fe-test-e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            services/dashboard/playwright-report
            services/dashboard/test-results
          retention-days: 14

  dependency-audit:
    name: Dependency Auditing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      # Advisory (Phase 137 gating policy): security findings are reported but
      # do NOT fail the pipeline — a real finding is fixed by a dep bump, an
      # accepted one by a justified suppression. The finding stays visible (the
      # step shows as a non-passing warning inside a green run); Phase 137 adds
      # the nightly + notification so it is never silent.
      - name: Run govulncheck (pkg/)
        continue-on-error: true
        working-directory: ./pkg
        run: govulncheck ./...

      - name: Run govulncheck (ingestion-api)
        continue-on-error: true   # advisory — report, don't block (see note above)
        working-directory: ./services/ingestion-api
        run: govulncheck ./...

      - name: Run govulncheck (bff-api)
        continue-on-error: true   # advisory — report, don't block (see note above)
        working-directory: ./services/bff-api
        run: govulncheck ./...

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' # Matches production Dockerfile (python:3.14.3-slim-bookworm)
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit==${{ env.PIP_AUDIT_VERSION }}

      # Delegating to `make audit-python` keeps a single source of truth
      # for `--ignore-vuln` suppressions (Makefile `PIP_AUDIT_IGNORE_VULNS`).
      # Each entry there carries CVE, justification, and upstream-fix
      # tracker — revisited on every `make deps-refresh`.
      - name: Run pip-audit (analysis-worker)
        continue-on-error: true   # advisory — report, don't block (see note above)
        run: make audit-python

      # Same Python-3.14/no-cp314-wheel reason as the python-pipeline job: the
      # lockfile install builds scipy/scikit-learn from source and needs the
      # Fortran/BLAS toolchain. (Phase 137: a cp314 wheel bump removes both this
      # step and the slow source build.)
      - name: Install scientific-stack build deps (scipy/scikit-learn on Python 3.14)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ gfortran make libopenblas-dev liblapack-dev

      - name: Verify hash-pinned lockfile installs (analysis-worker)
        working-directory: ./services/analysis-worker
        run: |
          python -m venv /tmp/lock-verify
          /tmp/lock-verify/bin/pip install --require-hashes -r requirements.lock.txt

  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # The analysis-worker image is intentionally NOT built/scanned on the
      # per-PR path: it bakes 10+ GB of HuggingFace model weights (plus a
      # `load: true` tarball export that doubles disk use), which exhausts the
      # runner disk and dominates wall-clock (~30 min). The model bytes are
      # irrelevant to a CVE scan — the worker's Python dependencies are already
      # covered by pip-audit (dependency-audit job), and its debian-slim OS
      # layer is covered by the web-crawler image scan (same base). The full
      # worker image is scanned out-of-band (scheduled/release — Phase 137/146),
      # keeping the per-PR scan fast and disk-safe.
      - name: Set up Python (for OpenAPI bundler)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install PyYAML (openapi_bundle.py dependency)
        run: pip install pyyaml

      # The dashboard image COPYs services/bff-api/api/openapi.bundle.yaml
      # during its build stage. The bundle is a generated artifact
      # (gitignored), so materialize it before any docker build.
      - name: Bundle OpenAPI spec (required for dashboard image build)
        run: make openapi-bundle

      # Buildx + GHA layer cache. With four service images, the cold-run
      # cost is ~5-7 min of builds; warm runs reuse the GHA layer cache
      # and finish in ~1 min. The cache scope is per-image so a change
      # in one Dockerfile does not bust the others.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ingestion-api/Dockerfile
          tags: aer/ingestion-api:ci
          load: true
          cache-from: type=gha,scope=ingestion-api
          cache-to: type=gha,mode=max,scope=ingestion-api

      - name: Build bff-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/bff-api/Dockerfile
          tags: aer/bff-api:ci
          load: true
          cache-from: type=gha,scope=bff-api
          cache-to: type=gha,mode=max,scope=bff-api

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/dashboard/Dockerfile
          tags: aer/dashboard:ci
          load: true
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Build web-crawler image (Phase 122)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crawlers/web-crawler/Dockerfile
          tags: aer/web-crawler:ci
          load: true
          cache-from: type=gha,scope=web-crawler
          cache-to: type=gha,mode=max,scope=web-crawler

      # Advisory (same policy as make audit): image CVEs are reported but do
      # NOT block the pipeline, and all five image scans run in one go (a HIGH
      # in image 1 no longer skips scans 2-5). Fix = base-image bump or a
      # justified .trivyignore entry. Phase 137 adds nightly + notification.
      - name: Trivy scan — ingestion-api
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/ingestion-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — bff-api
        continue-on-error: true   # advisory — report image CVEs, don't block
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/bff-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — dashboard
        continue-on-error: true   # advisory — report image CVEs, don't block
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/dashboard:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — web-crawler
        continue-on-error: true   # advisory — report image CVEs, don't block
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/web-crawler:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      # Phase 84: MEDIUM-severity scan is reporting-only (exit-code: 0).
      # Catches drift early without blocking the build.
      - name: Trivy scan (MEDIUM, reporting-only) — ingestion-api
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/ingestion-api:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'MEDIUM'

      - name: Trivy scan (MEDIUM, reporting-only) — bff-api
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/bff-api:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'MEDIUM'

      - name: Trivy scan (MEDIUM, reporting-only) — dashboard
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'aer/dashboard:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'MEDIUM'

# E2E smoke test moved to .github/workflows/e2e_smoke_nightly.yml.
# Rationale: testcontainer suites cover service-level integration; the
# Compose-wiring smoke check is unique value but not a per-push regression
# gate. Cadence is now nightly + workflow_dispatch + path-triggered on
# compose/infra/script edits.