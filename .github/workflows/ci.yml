name: AĒR Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  python-pipeline:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Passend zu requirements.txt
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./services/analysis-worker
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: ./services/analysis-worker
        run: python -m ruff check .

      - name: Run Unit Tests
        working-directory: ./services/analysis-worker
        run: python -m pytest tests/ -v

  go-pipeline:
    name: Go Lint & Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Cache Testcontainers Docker images
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-tc-v1-minio-latest-postgres-16alpine-ch-23.8

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-images/*.tar; do
            [ -f "$f" ] && docker load -i "$f"
          done

      - name: Pull and cache Testcontainers images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          docker pull minio/minio:latest
          docker pull postgres:16-alpine
          docker pull clickhouse/clickhouse-server:23.8
          docker save minio/minio:latest -o /tmp/docker-images/minio.tar
          docker save postgres:16-alpine -o /tmp/docker-images/postgres.tar
          docker save clickhouse/clickhouse-server:23.8 -o /tmp/docker-images/clickhouse.tar

      # Manual installation is required because the pre-built action binary
      # does not yet support Go 1.26.1 features.
      - name: Cache Go tools (golangci-lint, oapi-codegen)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint Ingestion API
        working-directory: ./services/ingestion-api
        run: golangci-lint run

      - name: Lint BFF API
        working-directory: ./services/bff-api
        run: golangci-lint run

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: OpenAPI Contract Test (codegen sync check)
        run: |
          make codegen
          git diff --exit-code services/bff-api/internal/handler/generated.go

      - name: Run Go Integration Tests (Testcontainers)
        run: |
          cd services/ingestion-api && go test -v ./...
          cd ../bff-api && go test -v ./...

  dependency-audit:
    name: Dependency Auditing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (ingestion-api)
        working-directory: ./services/ingestion-api
        run: govulncheck ./...

      - name: Run govulncheck (bff-api)
        working-directory: ./services/bff-api
        run: govulncheck ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (analysis-worker)
        working-directory: ./services/analysis-worker
        run: pip-audit -r requirements.txt

  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ingestion-api image
        run: docker build -t aer/ingestion-api:ci ./services/ingestion-api

      - name: Build bff-api image
        run: docker build -t aer/bff-api:ci ./services/bff-api

      - name: Build analysis-worker image
        run: docker build -t aer/analysis-worker:ci ./services/analysis-worker

      - name: Trivy scan — ingestion-api
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'aer/ingestion-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — bff-api
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'aer/bff-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — analysis-worker
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'aer/analysis-worker:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'