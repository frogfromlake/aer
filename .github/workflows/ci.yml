name: AĒR Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-pipeline:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./services/analysis-worker
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: ./services/analysis-worker
        run: python -m ruff check .

      - name: Run Unit Tests
        working-directory: ./services/analysis-worker
        run: python -m pytest tests/ -v

  go-pipeline:
    name: Go Lint & Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Lint Ingestion API
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./services/ingestion-api

      - name: Lint BFF API
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./services/bff-api

      - name: Run Go Integration Tests (Testcontainers)
        run: |
          cd services/ingestion-api && go test -v ./...
          cd ../bff-api && go test -v ./...