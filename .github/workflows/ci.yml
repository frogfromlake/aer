name: AĒR Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  python-pipeline:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Matches production Dockerfile (python:3.14.3-slim-bookworm)
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./services/analysis-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        working-directory: ./services/analysis-worker
        run: python -m ruff check .

      - name: Run Unit Tests
        working-directory: ./services/analysis-worker
        run: python -m pytest tests/ -v

  go-pipeline:
    name: Go Lint & Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum
            crawlers/rss-crawler/go.sum

      - name: Extract Testcontainer image tags from compose.yaml
        id: tc-images
        run: |
          echo "minio=$(yq '.services.minio.image' compose.yaml)" >> $GITHUB_OUTPUT
          echo "postgres=$(yq '.services.postgres.image' compose.yaml)" >> $GITHUB_OUTPUT
          echo "clickhouse=$(yq '.services.clickhouse.image' compose.yaml)" >> $GITHUB_OUTPUT

      - name: Cache Testcontainers Docker images
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/docker-images
          key: docker-tc-${{ hashFiles('compose.yaml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/docker-images/*.tar; do
            [ -f "$f" ] && docker load -i "$f"
          done

      - name: Pull and cache Testcontainers images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          docker pull ${{ steps.tc-images.outputs.minio }}
          docker pull ${{ steps.tc-images.outputs.postgres }}
          docker pull ${{ steps.tc-images.outputs.clickhouse }}

          docker save ${{ steps.tc-images.outputs.minio }} -o /tmp/docker-images/minio.tar
          docker save ${{ steps.tc-images.outputs.postgres }} -o /tmp/docker-images/postgres.tar
          docker save ${{ steps.tc-images.outputs.clickhouse }} -o /tmp/docker-images/clickhouse.tar

      # Manual installation is required because the pre-built action binary
      # does not yet support Go 1.26.2 features.
      - name: Cache Go tools (golangci-lint, oapi-codegen)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint Ingestion API
        working-directory: ./services/ingestion-api
        run: golangci-lint run

      - name: Lint BFF API
        working-directory: ./services/bff-api
        run: golangci-lint run

      - name: Lint pkg/
        working-directory: ./pkg
        run: golangci-lint run

      - name: Lint RSS Crawler
        working-directory: ./crawlers/rss-crawler
        run: golangci-lint run

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@${{ env.OAPI_CODEGEN_VERSION }}

      - name: OpenAPI Contract Test (codegen sync check)
        run: |
          make codegen
          git diff --exit-code services/bff-api/internal/handler/generated.go

      - name: Run Go Crawler Tests
        run: cd crawlers/rss-crawler && go test -v ./...

      - name: Run Go Integration Tests (Testcontainers)
        run: |
          cd services/ingestion-api && go test -v ./...
          cd ../bff-api && go test -v ./...
          cd ../../pkg && go test -v ./...

  dependency-audit:
    name: Dependency Auditing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load tool versions from .tool-versions
        run: grep -E '^[A-Z_]+=' .tool-versions >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: |
            services/ingestion-api/go.sum
            services/bff-api/go.sum
            pkg/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Run govulncheck (pkg/)
        working-directory: ./pkg
        run: govulncheck ./...

      - name: Run govulncheck (ingestion-api)
        working-directory: ./services/ingestion-api
        run: govulncheck ./...

      - name: Run govulncheck (bff-api)
        working-directory: ./services/bff-api
        run: govulncheck ./...

      - name: Run govulncheck (rss-crawler)
        working-directory: ./crawlers/rss-crawler
        run: govulncheck ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Matches production Dockerfile (python:3.14.3-slim-bookworm)
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit==${{ env.PIP_AUDIT_VERSION }}

      - name: Run pip-audit (analysis-worker)
        working-directory: ./services/analysis-worker
        run: pip-audit -r requirements.txt

  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ingestion-api image
        run: docker build -t aer/ingestion-api:ci -f services/ingestion-api/Dockerfile .

      - name: Build bff-api image
        run: docker build -t aer/bff-api:ci -f services/bff-api/Dockerfile .

      - name: Build analysis-worker image
        run: docker build -t aer/analysis-worker:ci -f services/analysis-worker/Dockerfile .

      - name: Trivy scan — ingestion-api
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'aer/ingestion-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — bff-api
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'aer/bff-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan — analysis-worker
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'aer/analysis-worker:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env for smoke test
        run: |
          cp .env.example .env
          # Override secrets from GitHub — required boot secrets (Phase 75).
          sed -i "s|^BFF_API_KEY=.*|BFF_API_KEY=${{ secrets.BFF_API_KEY }}|" .env
          sed -i "s|^INGESTION_API_KEY=.*|INGESTION_API_KEY=${{ secrets.INGESTION_API_KEY }}|" .env
          sed -i "s|^CLICKHOUSE_PASSWORD=.*|CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}|" .env
          sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}|" .env
          sed -i "s|^DB_URL=.*|DB_URL=postgres://aer_admin:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/aer_metadata?sslmode=disable|" .env

      - name: Run E2E Smoke Test
        run: bash scripts/e2e_smoke_test.sh

      - name: Upload e2e failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs
          path: logs/e2e/
          retention-days: 7