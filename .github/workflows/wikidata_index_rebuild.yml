      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ env.REGISTRY }}
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Stage index for Docker build
      #   run: |
      #     mkdir -p infra/wikidata-index/data
      #     cp /tmp/wikidata_aliases.db infra/wikidata-index/data/
      #     echo "${{ steps.hash.outputs.hash }}" > infra/wikidata-index/data/wikidata_aliases.db.sha256

      # - name: Extract metadata for image tags
      #   id: meta
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     tags: |
      #       type=raw,value=${{ steps.snapshot.outputs.date }}
      #       type=raw,value=latest
      #       type=sha,prefix=hash-,format=short

      # - name: Build and push image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ./infra/wikidata-index
      #     push: true
      #     tags: ${{ steps.meta.outputs.tags }}
      #     labels: |
      #       ${{ steps.meta.outputs.labels }}
      #       org.aer.wikidata.snapshot-date=${{ steps.snapshot.outputs.date }}
      #       org.aer.wikidata.sha256=${{ steps.hash.outputs.hash }}
      #     provenance: true
      #     sbom: true

      # ----------------------------------------------------------------------
      # Failure notification
      # ----------------------------------------------------------------------

      - name: Summarise run
        if: always()
        run: |
          echo "## Wikidata Index Rebuild Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshot date: \`${{ steps.snapshot.outputs.date }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Languages: \`${{ inputs.languages || 'de,en,fr' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Output hash: \`${{ steps.hash.outputs.hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Output size: \`${{ steps.hash.outputs.size }} bytes\`" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY