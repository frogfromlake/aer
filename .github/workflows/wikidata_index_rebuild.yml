# =============================================================================
# AĒR — Wikidata Alias Index Rebuild
# =============================================================================
# Periodic build of the Wikidata alias SQLite index used by Phase 118's
# entity-linking step. Runs on a quarterly cadence plus on-demand for
# new-language additions. Produces the `aer-wikidata-index` Docker image
# baking the SQLite DB, pushed to GitHub Container Registry.
#
# Architecture rationale: see docs/operations/scheduled_work.md
# Build script: scripts/build_wikidata_index.py (lands with Phase 118)
# =============================================================================

name: Wikidata Alias Index Rebuild

on:
  # Manual trigger — for on-demand rebuilds (new language coverage, urgent
  # refresh after a Wikidata schema change). Always available.
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'Wikidata snapshot date (YYYY-MM-DD). Defaults to yesterday at 00:00 UTC.'
        required: false
        type: string
      languages:
        description: 'Comma-separated language codes (e.g. "de,en,fr"). Defaults to script default.'
        required: false
        type: string
        default: 'de,en,fr'

  # Scheduled trigger — quarterly, 1st of Jan/Apr/Jul/Oct at 02:00 UTC.
  # Commented out until Phase 118 ships and the build script is verified
  # end-to-end. Uncomment after Phase 118 close-out.
  # schedule:
  #   - cron: '0 2 1 1,4,7,10 *'

# Required permissions to push to GitHub Container Registry.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-wikidata-index

jobs:
  rebuild:
    name: Build & Publish Wikidata Alias Index
    runs-on: ubuntu-latest
    # Standard runners have a 6-hour job limit; the build script targets
    # 2-6h runtime per the Phase 118 estimate. If the build approaches
    # the limit consistently, switch to `ubuntu-latest-large` or a
    # self-hosted runner.
    timeout-minutes: 350  # 5h 50m — leaves margin under the 6h hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install build-script dependencies
        working-directory: ./scripts
        run: |
          python -m pip install --upgrade pip
          # Phase 118 ships requirements file alongside the build script.
          # Until then, this step will fail — workflow_dispatch only.
          if [ -f requirements_wikidata_build.txt ]; then
            pip install -r requirements_wikidata_build.txt
          else
            echo "::error::scripts/requirements_wikidata_build.txt not found — Phase 118 not yet shipped"
            exit 1
          fi

      - name: Resolve snapshot date
        id: snapshot
        run: |
          if [ -n "${{ inputs.snapshot_date }}" ]; then
            DATE="${{ inputs.snapshot_date }}"
          else
            # Default: yesterday at 00:00 UTC (per Phase 118 spec)
            DATE=$(date -u -d 'yesterday' +'%Y-%m-%d')
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "Using snapshot date: $DATE"

      - name: Build Wikidata alias index
        run: |
          python scripts/build_wikidata_index.py \
            --snapshot-date "${{ steps.snapshot.outputs.date }}" \
            --languages "${{ inputs.languages || 'de,en,fr' }}" \
            --output-path /tmp/wikidata_aliases.db
        # The build is the long-running step — 2-6h depending on
        # SPARQL endpoint responsiveness and language scope.

      - name: Verify output hash
        id: hash
        run: |
          HASH=$(sha256sum /tmp/wikidata_aliases.db | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          SIZE=$(stat -c%s /tmp/wikidata_aliases.db)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Built wikidata_aliases.db — size: $SIZE bytes, sha256: $HASH"
          # Sanity check: index should be 50-150 MB per Phase 118 estimate.
          if [ "$SIZE" -lt 10000000 ] || [ "$SIZE" -gt 500000000 ]; then
            echo "::error::Output size $SIZE bytes is outside expected 10MB-500MB range"
            exit 1
          fi

      - name: Upload index as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wikidata-aliases-${{ steps.snapshot.outputs.date }}
          path: /tmp/wikidata_aliases.db
          retention-days: 90
        # Artifact retention covers one quarterly cycle plus margin —
        # if the next quarterly build fails, the previous artifact is
        # still recoverable for rollback.

      # ----------------------------------------------------------------------
      # Docker image build & publish
      # ----------------------------------------------------------------------
      # Below: the steps that build and push the `aer-wikidata-index` image.
      # These are commented out until Phase 118 ships its Dockerfile for
      # the index image. Uncomment after Phase 118 close-out.
      # ----------------------------------------------------------------------

      # - name: Set up Docker Buildx
