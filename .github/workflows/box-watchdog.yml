# Box watchdog — automatic recovery after a reboot (Phase 155 / ADR-046).
#
# The production box stores NO secrets (pure fortress): a reboot clears the tmpfs
# at /run/aer-secrets, so the stack cannot come back up on its own. This scheduled
# workflow is the off-box "brain" that brings it back automatically — GitHub
# already holds the secrets and the deploy key, so the box stays secret-free.
#
# Every ~10 min it probes the public health endpoint. If the box is up but the
# stack is down (the post-reboot signature: the BFF-backed /api/v1/healthz fails),
# it re-stages the secrets into tmpfs and `docker compose up`s the stack again. No
# operator action, no standing secret on disk. Re-running `up --wait` against an
# already-healthy stack is a safe no-op, so an occasional false negative is benign.
name: Box watchdog (auto-recover after reboot)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: box-watchdog
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  health:
    name: Probe public health
    runs-on: ubuntu-latest
    outputs:
      down: ${{ steps.check.outputs.down }}
    steps:
      - name: Probe the public health endpoint (3 tries)
        id: check
        env:
          URL: ${{ vars.HEALTHCHECK_URL || 'https://aer-project.eu/api/v1/healthz' }}
        run: |
          set -u
          down=true
          for i in 1 2 3; do
            if curl -fsS --max-time 20 "$URL" >/dev/null 2>&1; then
              down=false
              break
            fi
            sleep 10
          done
          echo "down=$down" >> "$GITHUB_OUTPUT"
          if [ "$down" = "true" ]; then
            echo "::warning::Health check failed 3× at $URL — the box stack looks down; recovery will run."
          else
            echo "Box healthy at $URL."
          fi

  recover:
    name: Re-stage secrets and bring the stack up
    needs: health
    # Only when the stack is actually down AND the Phase-155 staging is live.
    if: ${{ needs.health.outputs.down == 'true' && vars.STAGE_SECRETS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH (dedicated deploy key + pinned host key)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Identical secret set + streaming pattern as release-images.yml's deploy
      # job. KEEP IN SYNC with infra/secrets/secrets.manifest and that job: secret
      # VALUES travel down the SSH stdin pipe to stage_secrets.sh, never in argv or
      # the log. GitHub masks registered secret values; this step never echoes them.
      - name: Re-stage secrets to the box tmpfs (off persistent disk)
        env:
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          INGESTION_MINIO_ACCESS_KEY: ${{ secrets.INGESTION_MINIO_ACCESS_KEY }}
          INGESTION_MINIO_SECRET_KEY: ${{ secrets.INGESTION_MINIO_SECRET_KEY }}
          WORKER_MINIO_ACCESS_KEY: ${{ secrets.WORKER_MINIO_ACCESS_KEY }}
          WORKER_MINIO_SECRET_KEY: ${{ secrets.WORKER_MINIO_SECRET_KEY }}
          BFF_MINIO_ACCESS_KEY: ${{ secrets.BFF_MINIO_ACCESS_KEY }}
          BFF_MINIO_SECRET_KEY: ${{ secrets.BFF_MINIO_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BFF_DB_PASSWORD: ${{ secrets.BFF_DB_PASSWORD }}
          BFF_AUTH_DB_PASSWORD: ${{ secrets.BFF_AUTH_DB_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          INGESTION_API_KEY: ${{ secrets.INGESTION_API_KEY }}
          BFF_API_KEY: ${{ secrets.BFF_API_KEY }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          # optional — empty value is simply not staged
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GF_SMTP_PASSWORD: ${{ secrets.GF_SMTP_PASSWORD }}
          # non-secret inputs for the synthesised DB_URL (arc42 §8.5.2)
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'aer_admin' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'aer_metadata' }}
        run: |
          set -euo pipefail
          if [ -z "${POSTGRES_PASSWORD}" ]; then
            echo "::error::Recovery needs the production Environment Secrets, but POSTGRES_PASSWORD is empty." >&2
            exit 1
          fi
          emit() { for n in "$@"; do eval "v=\${$n-}"; if [ -n "$v" ]; then printf '%s\0%s\0' "$n" "$v"; fi; done; }
          emit \
            MINIO_ROOT_USER MINIO_ROOT_PASSWORD \
            INGESTION_MINIO_ACCESS_KEY INGESTION_MINIO_SECRET_KEY \
            WORKER_MINIO_ACCESS_KEY WORKER_MINIO_SECRET_KEY \
            BFF_MINIO_ACCESS_KEY BFF_MINIO_SECRET_KEY \
            POSTGRES_PASSWORD BFF_DB_PASSWORD BFF_AUTH_DB_PASSWORD \
            CLICKHOUSE_PASSWORD INGESTION_API_KEY BFF_API_KEY \
            GF_SECURITY_ADMIN_PASSWORD RESTIC_PASSWORD \
            SMTP_PASSWORD GF_SMTP_PASSWORD \
            POSTGRES_USER POSTGRES_DB \
          | ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
              "root@${{ secrets.DEPLOY_HOST }}" \
              "bash /opt/aer/scripts/operations/stage_secrets.sh"

      # No git checkout / image pull: a reboot does not change the checked-out tag
      # or the on-disk images, only the tmpfs. Just bring the stack back up with the
      # freshly re-staged secrets. The existing .env.runtime (non-secret, on disk)
      # survives the reboot, so compose has everything it needs.
      - name: Bring the stack back up (health-gated)
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "root@${{ secrets.DEPLOY_HOST }}" \
            "set -e; cd /opt/aer; docker compose --profile dashboard up -d --remove-orphans --wait --wait-timeout 300"
