site_name: AĒR Architecture & Methodology
site_description: Documentation, arc42 structure, and scientific methodology for Project AĒR

theme:
  name: material
  
  # 1. Logo & Icon (A telescope perfectly represents the "Macroscope" concept)
  icon:
    logo: material/telescope

  # 2. Modern Fonts (automatically loaded via Google Fonts)
  font:
    text: Inter
    code: Fira Code

  # 3. Enable UI/UX Features
  features:
    - navigation.tabs # Converts main navigation items into top-level tabs
    - navigation.tabs.sticky # Keeps tabs sticky when scrolling down
    - navigation.sections # Improves sidebar grouping and visual hierarchy
    - navigation.top # Adds a "Back to top" button
    - toc.follow # Table of Contents (right side) follows scrolling intelligently
    - search.suggest # Provides search suggestions while typing
    - search.highlight # Highlights search terms in the results
    - content.code.copy # Adds a copy button to code blocks
    - content.tabs.link # Enables deep linking to content tabs

  # 4. Dark Theme as Default (Slate) with High-Contrast Accent Color
  palette:
    # Dark mode (preferred if OS is in dark mode)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan # Cyan provides a modern, high-contrast look on dark backgrounds
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    # Light mode (fallback)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

# 5. Markdown Extensions (For Admonitions, Tabs, Tasklists)
markdown_extensions:
  - admonition # Enables '!!! info' admonition blocks
  - pymdownx.details # Makes admonitions collapsible ('??? info')
  - pymdownx.superfences # Advanced code blocks formatting
  - pymdownx.tabbed: # Enables tabs within markdown content
      alternate_style: true 
  - pymdownx.tasklist: # Enables [x] task lists
      custom_checkbox: true
  - attr_list

# Navigation Hierarchy
nav:
  - "Home": index.md
  - "Architecture (arc42)":
      - "0. Manifesto": arc42/00_manifesto.md
      - "1. Introduction and Goals": arc42/01_introduction_and_goals.md
      - "2. Architecture Constraints": arc42/02_architecture_constraints.md
      - "3. System Scope and Context": arc42/03_system_scope_and_context.md
      - "4. Solution Strategy": arc42/04_solution_strategy.md
      - "5. Building Block View": arc42/05_building_block_view.md
      - "6. Runtime View": arc42/06_runtime_view.md
      - "7. Deployment View": arc42/07_deployment_view.md
      - "8. Cross-cutting Concepts": arc42/08_concepts.md
      - "9. Architecture Decisions (ADRs)": arc42/09_architecture_decisions.md
      - "10. Quality Requirements": arc42/10_quality_requirements.md
      - "11. Risks and Technical Debts": arc42/11_risks_and_technical_debts.md
      - "12. Glossary": arc42/12_glossary.md
      - "13. Scientific Foundations": arc42/13_scientific_foundations.md
  - "Scientific Methodology":
      - "WP-001: Toward a Culturally Agnostic Probe Catalog": methodology/WP-001-toward_a_culturally_agnostic_probe_catalog-a_functional_taxonomy_for_global_discourse_observation.md
      - "WP-002: Metric Validity and Sentiment Calibration": methodology/WP-002-metric_validity_and_sentiment_calibration.md
      - "WP-003: Platform Bias, Algorithmic Amplification and Detection of Non-Human Actors": methodology/WP-003-platform_bias_algorithmic_amplification_and_the_detection_of_non-human_actors.md
      - "WP-004: Cross-Cultural Comparability of Discourse Metrics": methodology/WP-004-cross-cultural_comparability_of_discourse_metrics.md
      - "WP-005: Temporal Granularity of Discourse Shifts": methodology/WP-005-temporal_granularity_of_discourse_shifts.md
      - "WP-006: Observer Effect, Reflexivity and the Ethics of Discourse Measurement": methodology/WP-006-observer_effect_reflexivity_and_the_ethics_of_discourse_measurement.md
  - "Operations Playbook": operations_playbook.md