# =============================================================================
# AĒR — The Societal Discourse Macroscope
# Documentation Configuration (MkDocs Material)
# =============================================================================
# Docs-as-Code: This file is maintained alongside the source code to ensure
# architectural design, scientific theory, and technical implementation remain
# perfectly synchronized.
# =============================================================================

site_name: "AĒR — Architecture & Methodology"
site_description: >-
  The complete technical blueprint and scientific methodology for Project AĒR:
  a modular system for the real-time analysis and long-term observation of
  societal discourses — functioning as a digital macroscope.
site_author: "AĒR Project"

# =============================================================================
# Theme Configuration
# =============================================================================
theme:
  name: material
  language: en
  
  icon:
    logo: material/telescope
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      warning: fontawesome/solid/triangle-exclamation
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/lightbulb
      abstract: fontawesome/solid/clipboard-list

  font:
    text: Inter
    code: Fira Code

  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - navigation.footer

    # Table of Contents
    - toc.follow

    # Search
    - search.suggest
    - search.highlight
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

    # Header
    - header.autohide
    - announce.dismiss

  palette:
    # --- Dark Mode (Default) ---
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: "Switch to light mode"

    # --- Light Mode ---
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: "Switch to dark mode"

# =============================================================================
# Markdown Extensions
# =============================================================================
markdown_extensions:
  # --- Standard ---
  - abbr
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html

  # --- Admonitions ---
  - admonition
  - pymdownx.details

  # --- Code & Syntax ---
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # --- Content Formatting ---
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols

  # --- Table of Contents ---
  - toc:
      permalink: true
      permalink_title: "Link to this section"
      toc_depth: 3

# =============================================================================
# Plugins
# =============================================================================
plugins:
  - search:
      separator: '[\s\-\.]+'
      lang:
        - en
        - de

# =============================================================================
# Extra Configuration
# =============================================================================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/frogfromlake/aer
      name: "AĒR on GitHub"

  generator: false

  status:
    new: "Recently added"
    deprecated: "Deprecated"

extra_css: []
extra_javascript: []

