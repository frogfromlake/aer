services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: aer_docs
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --livereload --watch /docs --dirty
    networks:
      - aer-network

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aer_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_NOTIFY_NATS_ENABLE_aer: "on"
      MINIO_NOTIFY_NATS_ADDRESS_aer: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_aer: "aer.lake.bronze"
      MINIO_NOTIFY_NATS_JETSTREAM_aer: "on"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - aer-network
    depends_on:
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: aer_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infra/minio/setup.sh:/setup.sh
    entrypoint: /bin/sh /setup.sh
    networks:
      - aer-network

  # ----------------------------------------------------
  # 2.2 MESSAGE BROKER (EVENT PIPELINE)
  # ----------------------------------------------------
  nats:
    image: nats:latest
    container_name: aer_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"
    networks:
      - aer-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aer_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 3.1 ANALYTICS / GOLD LAYER (TIME-SERIES)
  # ----------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: aer_clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------
  # 4. OBSERVABILITY (OTEL, TEMPO, PROMETHEUS, GRAFANA)
  # ----------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: aer_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - aer-network
    depends_on:
      - nats

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aer_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml
    networks:
      - aer-network

  prometheus:
    image: prom/prometheus:latest
    container_name: aer_prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - aer-network

  grafana:
    image: grafana/grafana:latest
    container_name: aer_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${MINIO_ROOT_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - tempo
      - prometheus
    networks:
      - aer-network
      
volumes:
  minio_data:
  postgres_data:
  clickhouse_data:

networks:
  aer-network:
    driver: bridge