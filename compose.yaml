services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: aer_docs
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --livereload --watch /docs --dirty

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aer_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Tell MinIO to connect to NATS and publish to the subject "aer.lake.bronze"
      MINIO_NOTIFY_NATS_ENABLE_aer: "on"
      MINIO_NOTIFY_NATS_ADDRESS_aer: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_aer: "aer.lake.bronze"
      MINIO_NOTIFY_NATS_JETSTREAM_aer: "on"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    depends_on:
      - nats

  # ----------------------------------------------------
  # 2.1 INFRASTRUCTURE PROVISIONING (INIT SCRIPT)
  # ----------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: aer_minio_init
    depends_on:
      - minio
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infra/minio/setup.sh:/setup.sh
    entrypoint: /bin/sh /setup.sh

  # ----------------------------------------------------
  # 2.2 MESSAGE BROKER (EVENT PIPELINE)
  # ----------------------------------------------------
  nats:
    image: nats:latest
    container_name: aer_nats
    ports:
      - "4222:4222" # Client Port
      - "8222:8222" # Web UI / Monitoring Port
    command: "-js"  # Enables JetStream for persistence

  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aer_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

# ----------------------------------------------------
  # 3.1 ANALYTICS / GOLD LAYER (TIME-SERIES)
  # ----------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: aer_clickhouse
    ports:
      - "8123:8123" # HTTP port
      - "9002:9000" # Native client port
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

# ----------------------------------------------------
  # 4. OBSERVABILITY (OTEL, TEMPO, PROMETHEUS, GRAFANA)
  # ----------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: aer_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC (for backend services)
      - "4318:4318" # OTLP HTTP (for scripts/frontend)

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aer_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: aer_prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: aer_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${MINIO_ROOT_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - tempo
      - prometheus
      
volumes:
  minio_data:
  postgres_data:
  clickhouse_data: