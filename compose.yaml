services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  docs:
    image: squidfunk/mkdocs-material:9.7.6
    container_name: aer_docs
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --livereload --watch /docs
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ----------------------------------------------------
  # 0.1 API CONTRACT REFERENCE (dev-only; not in compose.prod.yaml)
  # ----------------------------------------------------
  # Serves the bundled BFF + Ingestion OpenAPI specs through Swagger UI.
  # Bundles are produced by `make openapi-bundle` and mounted read-only.
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: aer_swagger_ui
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8080"
    environment:
      URLS: |
        [
          {"url":"/specs/bff-api.yaml","name":"BFF API"},
          {"url":"/specs/ingestion-api.yaml","name":"Ingestion API"}
        ]
      URLS_PRIMARY_NAME: "BFF API"
    volumes:
      - ./services/bff-api/api/openapi.bundle.yaml:/usr/share/nginx/html/specs/bff-api.yaml:ro
      - ./services/ingestion-api/api/openapi.bundle.yaml:/usr/share/nginx/html/specs/ingestion-api.yaml:ro
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

  # ----------------------------------------------------
  # 0. REVERSE PROXY / TLS TERMINATION
  # ----------------------------------------------------
  traefik:
    image: traefik:v3.6.12
    container_name: aer_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aer-frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: aer_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_NOTIFY_NATS_ENABLE_aer: "on"
      MINIO_NOTIFY_NATS_ADDRESS_aer: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_aer: "aer.lake.bronze"
      MINIO_NOTIFY_NATS_JETSTREAM_aer: "on"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - aer-frontend
      - aer-backend
    depends_on:
      nats-init:
        condition: service_completed_successfully # MinIO waits for JetStream
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: aer_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - INGESTION_MINIO_ACCESS_KEY=${INGESTION_MINIO_ACCESS_KEY}
      - INGESTION_MINIO_SECRET_KEY=${INGESTION_MINIO_SECRET_KEY}
      - WORKER_MINIO_ACCESS_KEY=${WORKER_MINIO_ACCESS_KEY}
      - WORKER_MINIO_SECRET_KEY=${WORKER_MINIO_SECRET_KEY}
      - BFF_MINIO_ACCESS_KEY=${BFF_MINIO_ACCESS_KEY}
      - BFF_MINIO_SECRET_KEY=${BFF_MINIO_SECRET_KEY}
    volumes:
      - ./infra/minio/setup.sh:/setup.sh
    entrypoint: /bin/sh /setup.sh
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 2.2 MESSAGE BROKER (EVENT PIPELINE)
  # ----------------------------------------------------
  nats:
    image: nats:2.12.6-alpine3.22
    container_name: aer_nats
    restart: unless-stopped
    command: "-js"
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  nats-init:
    image: natsio/nats-box:0.19.3
    container_name: aer_nats_init
    restart: "no"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - aer-backend
    volumes:
      - ./infra/nats/streams:/config/streams:ro
    # Idempotent IaC provisioning: create stream if absent, otherwise update
    # from the versioned JSON definition. Hard Rule 5 SSoT.
    command: >
      sh -c "
        nats --server nats:4222 stream add AER_LAKE --config /config/streams/AER_LAKE.json 2>/dev/null ||
        nats --server nats:4222 stream update AER_LAKE --config /config/streams/AER_LAKE.json --force
      "
  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: aer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # Provisions the BFF API's read-only PostgreSQL role. Waits until
  # ingestion-api has run its migrations (so the `sources` table exists),
  # then creates/updates `bff_readonly` with SELECT on that single table.
  # IaC-only (Hard Rule 5) — the BFF must never provision its own role.
  postgres-init-roles:
    image: postgres:18.3-alpine3.23
    container_name: aer_postgres_init_roles
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      ingestion-api:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB}
      - BFF_DB_USER=${BFF_DB_USER}
      - BFF_DB_PASSWORD=${BFF_DB_PASSWORD}
    volumes:
      - ./infra/postgres/init-roles.sh:/init-roles.sh:ro
    entrypoint: /bin/sh /init-roles.sh
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1 ANALYTICS / GOLD LAYER (TIME-SERIES)
  # ----------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:26.3.3-alpine
    container_name: aer_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"

  clickhouse-init:
    image: clickhouse/clickhouse-server:26.3.3-alpine
    container_name: aer_clickhouse_init
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./infra/clickhouse/migrations:/migrations:ro
      - ./infra/clickhouse/migrate.sh:/migrate.sh:ro
    entrypoint: /bin/sh /migrate.sh
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1b INGESTION API (INTERNAL WRITE PATH)
  # ----------------------------------------------------
  ingestion-api:
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    container_name: aer_ingestion_api
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - INGESTION_PORT=8081
      - DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - INGESTION_MINIO_ACCESS_KEY=${INGESTION_MINIO_ACCESS_KEY}
      - INGESTION_MINIO_SECRET_KEY=${INGESTION_MINIO_SECRET_KEY}
      - MINIO_USE_SSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}  # Production recommendation: 0.1
      - MIGRATIONS_PATH=/migrations
      - INGESTION_API_KEY=${INGESTION_API_KEY}
      - INGESTION_BRONZE_BUCKET=${INGESTION_BRONZE_BUCKET:-bronze}
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.1b' WIKIDATA ALIAS INDEX (PHASE 118)
  # ----------------------------------------------------
  # One-shot init that copies the SQLite alias DB from the
  # aer-wikidata-index image (built quarterly by
  # .github/workflows/wikidata_index_rebuild.yml) into the persistent
  # `wikidata_data` named volume mounted read-only by the analysis-worker.
  # IaC-only provisioning per Hard Rule 5; mirrors nats-init / minio-init /
  # clickhouse-init. Image tag is pinned via WIKIDATA_INDEX_TAG so a known
  # snapshot is deployed deterministically.
  wikidata-index-init:
    image: ghcr.io/frogfromlake/aer-wikidata-index:${WIKIDATA_INDEX_TAG:-latest}
    container_name: aer_wikidata_index_init
    restart: "no"
    # Run as root for the provisioning phase only — overriding the image's
    # USER aer (uid 10001). A freshly-created Docker named volume is owned
    # root:root 755 and an unprivileged user inside the container cannot
    # write into it. The worker mounts the same volume read-only and reads
    # the chmod 0644 files with any UID, so worker-side hardening is not
    # affected. Standard init-container pattern; mirrors how nats-init /
    # minio-init / clickhouse-init provision their respective stores
    # (Hard Rule 5).
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    # Mount path aligned with the analysis-worker's
    # `wikidata_data:/data/wikidata:ro` mount — both containers see the
    # index at the same path `/data/wikidata/wikidata_aliases.db`. The
    # earlier asymmetric setup (init at /data, worker at /data/wikidata)
    # was operationally confusing.
    command: >
      "
        set -e
        cp /index/wikidata_aliases.db /data/wikidata/
        cp /index/wikidata_aliases.db.sha256 /data/wikidata/
        chmod 0644 /data/wikidata/wikidata_aliases.db /data/wikidata/wikidata_aliases.db.sha256
        cd /data/wikidata && sha256sum -c wikidata_aliases.db.sha256
        echo 'wikidata-index-init: copy + checksum verified'
        cat wikidata_aliases.db.sha256
      "
    volumes:
      - wikidata_data:/data/wikidata
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1c ANALYSIS WORKER (BRONZE → SILVER → GOLD)
  # ----------------------------------------------------
  analysis-worker:
    build:
      context: .
      dockerfile: services/analysis-worker/Dockerfile
    container_name: aer_analysis_worker
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - WORKER_COUNT=${WORKER_COUNT:-5}
      - MINIO_ENDPOINT=minio:9000
      - WORKER_MINIO_ACCESS_KEY=${WORKER_MINIO_ACCESS_KEY}
      - WORKER_MINIO_SECRET_KEY=${WORKER_MINIO_SECRET_KEY}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - WORKER_BRONZE_BUCKET=${WORKER_BRONZE_BUCKET:-bronze}
      # Phase 118: Wikidata alias index, populated into wikidata_data by the
      # wikidata-index-init service. Empty WIKIDATA_INDEX_SHA256 disables the
      # fail-fast hash check (recommended only for development).
      - WIKIDATA_INDEX_PATH=${WIKIDATA_INDEX_PATH:-/data/wikidata/wikidata_aliases.db}
      - WIKIDATA_INDEX_SHA256=${WIKIDATA_INDEX_SHA256:-}
    volumes:
      - wikidata_data:/data/wikidata:ro
      # Phase 119: HuggingFace cache for Tier-2 BERT sentiment models
      # (cardiffnlp/twitter-xlm-roberta-base-sentiment, mdraw/german-news-sentiment-bert).
      # First inference downloads ~1.5 GB on the slowest call; subsequent
      # container recreations hit this volume without touching the network.
      - hf_cache:/hf-cache
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      wikidata-index-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: "2.00"

  # ----------------------------------------------------
  # 3.1d RSS CRAWLER (ONE-SHOT JOB)
  # ----------------------------------------------------
  # Standalone Go binary that fetches configured RSS feeds and submits
  # documents to the Ingestion API. Runs on the internal `aer-backend`
  # network so it reaches `ingestion-api:8081` directly — no host port
  # exposure required, identical in dev and prod.
  #
  # `profiles: ["crawlers"]` keeps it out of `make up`. Invoke via
  # `make crawl` (wraps `docker compose run --rm rss-crawler`) or from
  # a host cron / systemd timer in production.
  rss-crawler:
    build:
      context: .
      dockerfile: crawlers/rss-crawler/Dockerfile
    image: aer-rss-crawler:local
    container_name: aer_rss_crawler
    profiles: ["crawlers"]
    restart: "no"
    environment:
      - INGESTION_URL=http://ingestion-api:8081/api/v1/ingest
      - SOURCES_URL=http://ingestion-api:8081/api/v1/sources
      - INGESTION_API_KEY=${INGESTION_API_KEY}
    volumes:
      # Dedup state survives across runs so re-running `make crawl`
      # doesn't re-ingest items. Clear with `docker volume rm
      # aer_rss_crawler_state` when you want a full re-crawl.
      - rss_crawler_state:/state
    networks:
      - aer-backend
    depends_on:
      ingestion-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.2 BFF API (PUBLIC-FACING, BEHIND TRAEFIK)
  # ----------------------------------------------------
  bff-api:
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    container_name: aer_bff_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - BFF_PORT=8080
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - BFF_API_KEY=${BFF_API_KEY}
      - BFF_METRICS_CACHE_TTL_SECONDS=${BFF_METRICS_CACHE_TTL_SECONDS:-60}
      # BFF reads source metadata directly from the Postgres `sources`
      # table via a dedicated read-only role (Phase 87). The role is
      # provisioned by the postgres-init-roles init container.
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - BFF_DB_USER=${BFF_DB_USER}
      - BFF_DB_PASSWORD=${BFF_DB_PASSWORD}
      - BFF_SOURCES_CACHE_TTL_SECONDS=${BFF_SOURCES_CACHE_TTL_SECONDS:-60}
      # MinIO read-only access for L5 Evidence article-detail (Phase 101).
      - MINIO_ENDPOINT=minio:9000
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - BFF_MINIO_ACCESS_KEY=${BFF_MINIO_ACCESS_KEY}
      - BFF_MINIO_SECRET_KEY=${BFF_MINIO_SECRET_KEY}
      - BFF_K_ANONYMITY_THRESHOLD=${BFF_K_ANONYMITY_THRESHOLD:-10}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}  # Production recommendation: 0.1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.bff-api.entrypoints=websecure"
      - "traefik.http.routers.bff-api.tls=true"
      - "traefik.http.services.bff-api.loadbalancer.server.port=8080"
      # Gateway-injected API key. Browsers never see BFF_API_KEY: Traefik
      # adds the header to every /api/* request server-side, and the
      # static bundle ships with no secret. Non-browser callers (crawlers,
      # smoke tests) keep sending X-API-Key directly to the BFF on :8080.
      # Replace with proper session auth once a login surface exists.
      - "traefik.http.routers.bff-api.middlewares=bff-api-key@docker"
      - "traefik.http.middlewares.bff-api-key.headers.customrequestheaders.X-API-Key=${BFF_API_KEY}"
    networks:
      - aer-frontend
      - aer-backend
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres-init-roles:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.3 DASHBOARD (STATIC FRONTEND, BEHIND TRAEFIK)
  # ----------------------------------------------------
  # SvelteKit static bundle served by Nginx. Phase 97 scaffolding — see
  # services/dashboard/README.md and ADR-020. Frontend-network only: no
  # route to any backend service except the BFF via Traefik (ADR-008).
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
      # PUBLIC_* values are inlined at build time by the SvelteKit static
      # adapter (Phase 98d). Changing them requires rebuilding the image.
      args:
        PUBLIC_OTLP_ENDPOINT: ${PUBLIC_OTLP_ENDPOINT-}
        PUBLIC_DEPLOYMENT_ENVIRONMENT: ${PUBLIC_DEPLOYMENT_ENVIRONMENT-development}
    image: aer-dashboard:local
    container_name: aer_dashboard
    restart: unless-stopped
    # `dashboard` profile lets `make backend-up` skip this service so
    # `make fe-dev` can serve the SvelteKit dev server on :5173 without
    # a Traefik route conflict on `/`.
    profiles: ["dashboard"]
    networks:
      - aer-frontend
    labels:
      - "traefik.enable=true"
      # Host-catch-all minus /api so the BFF router wins for /api/*.
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      # BFF router has the longer, more specific rule — Traefik picks it
      # for /api/*. Set explicit lower priority on the dashboard catch-all
      # so this is deterministic regardless of rule-length heuristics.
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 4. OBSERVABILITY (OTEL, TEMPO, PROMETHEUS, GRAFANA)
  # ----------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:0.149.0
    container_name: aer_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    networks:
      - aer-backend
    depends_on:
      - nats
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  tempo:
    image: grafana/tempo:2.10.1
    container_name: aer_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: aer_prometheus
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  grafana:
    image: grafana/grafana:12.4.0
    container_name: aer_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - tempo
      - prometheus
    networks:
      - aer-frontend
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ----------------------------------------------------
  # 5. DEBUG PORT FORWARDER (opt-in via --profile debug)
  # ----------------------------------------------------
  # Exposes backend service ports to the host for local development.
  # Default: off. Start with: docker compose --profile debug up
  # This is a single socat-based TCP proxy — no application logic.
  debug-ports:
    image: alpine/socat:1.8.0.1
    container_name: aer_debug_ports
    profiles: ["debug"]
    restart: unless-stopped
    ports:
      - "5432:5432"     # PostgreSQL
      - "8123:8123"     # ClickHouse HTTP
      - "9002:9002"     # ClickHouse native (host 9002 → container 9000)
      - "4222:4222"     # NATS client
      - "8222:8222"     # NATS monitoring
      - "9000:9000"     # MinIO API
      - "9001:9001"     # MinIO Console
      - "4317:4317"     # OTel Collector gRPC
      - "4318:4318"     # OTel Collector HTTP
      - "3000:3000"     # Grafana
      - "8081:8081"     # Ingestion API
    entrypoint: ["sh", "-c"]
    command:
      - |
        socat TCP-LISTEN:5432,fork,reuseaddr TCP-CONNECT:postgres:5432 &
        socat TCP-LISTEN:8123,fork,reuseaddr TCP-CONNECT:clickhouse:8123 &
        socat TCP-LISTEN:9002,fork,reuseaddr TCP-CONNECT:clickhouse:9000 &
        socat TCP-LISTEN:4222,fork,reuseaddr TCP-CONNECT:nats:4222 &
        socat TCP-LISTEN:8222,fork,reuseaddr TCP-CONNECT:nats:8222 &
        socat TCP-LISTEN:9000,fork,reuseaddr TCP-CONNECT:minio:9000 &
        socat TCP-LISTEN:9001,fork,reuseaddr TCP-CONNECT:minio:9001 &
        socat TCP-LISTEN:4317,fork,reuseaddr TCP-CONNECT:otel-collector:4317 &
        socat TCP-LISTEN:4318,fork,reuseaddr TCP-CONNECT:otel-collector:4318 &
        socat TCP-LISTEN:3000,fork,reuseaddr TCP-CONNECT:grafana:3000 &
        socat TCP-LISTEN:8081,fork,reuseaddr TCP-CONNECT:ingestion-api:8081 &
        wait
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"

  # ----------------------------------------------------------------
  # Playwright test runner (Phase 98c)
  # Image tag SSoT for `make fe-test-e2e` and the CI visual+a11y gate.
  # Version MUST match services/dashboard/package.json `@playwright/test`
  # so the browser bundle matches the client API.
  # `profiles: ["test"]` keeps it out of `make up`.
  # ----------------------------------------------------------------
  playwright-runner:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles: ["test"]
    command: ["true"]

volumes:
  minio_data:
  postgres_data:
  clickhouse_data:
  tempo_data:
  rss_crawler_state:
  wikidata_data:
  # Phase 119: persistent HuggingFace model cache for the analysis
  # worker's Tier-2 BERT sentiment extractors. Survives container
  # recreations so models download exactly once per host.
  hf_cache:

networks:
  aer-frontend:
    name: aer-frontend
    driver: bridge
  aer-backend:
    name: aer-backend
    driver: bridge