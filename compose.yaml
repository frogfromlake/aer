services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  docs:
    image: squidfunk/mkdocs-material:9.5.49
    container_name: aer_docs
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --livereload --watch /docs --dirty
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ----------------------------------------------------
  # 0. REVERSE PROXY / TLS TERMINATION
  # ----------------------------------------------------
  traefik:
    image: traefik:v3
    container_name: aer_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - aer-frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: aer_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_NOTIFY_NATS_ENABLE_aer: "on"
      MINIO_NOTIFY_NATS_ADDRESS_aer: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_aer: "aer.lake.bronze"
      MINIO_NOTIFY_NATS_JETSTREAM_aer: "on"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - aer-backend
    depends_on:
      nats-init:
        condition: service_completed_successfully # MinIO waits for JetStream
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: aer_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infra/minio/setup.sh:/setup.sh
    entrypoint: /bin/sh /setup.sh
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 2.2 MESSAGE BROKER (EVENT PIPELINE)
  # ----------------------------------------------------
  nats:
    image: nats:2.10.26-alpine
    container_name: aer_nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  nats-init:
    image: natsio/nats-box:0.19.3
    container_name: aer_nats_init
    restart: "no"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - aer-backend
    command: >
      sh -c "
        nats stream add AER_LAKE --subjects 'aer.lake.>' --storage file --server nats:4222 --defaults &&
        echo 'JetStream AER_LAKE created successfully.'
      "
  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aer_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ----------------------------------------------------
  # 3.1 ANALYTICS / GOLD LAYER (TIME-SERIES)
  # ----------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.12.3.47
    container_name: aer_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"

  # ----------------------------------------------------
  # 3.1b INGESTION API (INTERNAL WRITE PATH)
  # ----------------------------------------------------
  ingestion-api:
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    container_name: aer_ingestion_api
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - INGESTION_PORT=8081
      - DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.1c ANALYSIS WORKER (BRONZE → SILVER → GOLD)
  # ----------------------------------------------------
  analysis-worker:
    build:
      context: .
      dockerfile: services/analysis-worker/Dockerfile
    container_name: aer_analysis_worker
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - WORKER_COUNT=${WORKER_COUNT:-5}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ----------------------------------------------------
  # 3.2 BFF API (PUBLIC-FACING, BEHIND TRAEFIK)
  # ----------------------------------------------------
  bff-api:
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    container_name: aer_bff_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - BFF_PORT=8080
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - BFF_API_KEY=${BFF_API_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.bff-api.entrypoints=websecure"
      - "traefik.http.routers.bff-api.tls.certresolver=myresolver"
      - "traefik.http.services.bff-api.loadbalancer.server.port=8080"
    networks:
      - aer-frontend
      - aer-backend
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 4. OBSERVABILITY (OTEL, TEMPO, PROMETHEUS, GRAFANA)
  # ----------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:0.120.0
    container_name: aer_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - aer-backend
    depends_on:
      - nats
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aer_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: aer_prometheus
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: aer_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - tempo
      - prometheus
    networks:
      - aer-frontend
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  minio_data:
  postgres_data:
  clickhouse_data:
  traefik-certs:

networks:
  aer-frontend:
    driver: bridge
  aer-backend:
    driver: bridge
