# SEC-055 — bounded container logs: every service inherits a rotated json-file
# driver (max 10MB x 3 = 30MB/container) so no container log can fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  # PUBLIC docs build (Phase 134 / ADR-040). Serves only methodology, per-probe
  # descriptions and the manifesto — what an external researcher needs. The
  # source-card `documentation_url` points here (:8000), so the split is
  # transparent to that link. The engineering internals are served by the
  # separate `docs-internal` service below.
  docs:
    logging: *default-logging
    image: squidfunk/mkdocs-material:9.7.6
    container_name: aer_docs
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve -f mkdocs.public.yml --dev-addr=0.0.0.0:8000 --livereload --watch /docs
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # INTERNAL docs build (Phase 134 / ADR-040): Arc42, ADRs, design, extending
  # guides, operations runbooks, security model. On :8001. In a real deployment
  # this MUST be access-controlled to the admin role (Traefik forward-auth to
  # the BFF) and not publicly routed — that gating is deferred until deploy; for
  # local/dev it is a plain second build.
  docs-internal:
    logging: *default-logging
    image: squidfunk/mkdocs-material:9.7.6
    container_name: aer_docs_internal
    restart: unless-stopped
    # SEC-018: loopback-only host publish. The internal corpus (Arc42, ADRs,
    # design, operations + security model) must never be internet-reachable. In
    # production reach it via an SSH tunnel (`ssh -L 8001:localhost:8001 …`); the
    # firewall exposes only 80/443. (SR-7 / SEC-064 will replace this dev
    # livereload server with a hardened static build.)
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - .:/docs
    command: serve -f mkdocs.yml --dev-addr=0.0.0.0:8001 --livereload --watch /docs
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ----------------------------------------------------
  # 0.1 API CONTRACT REFERENCE (dev-only; not in compose.prod.yaml)
  # ----------------------------------------------------
  # Serves the bundled BFF + Ingestion OpenAPI specs through Swagger UI.
  # Bundles are produced by `make openapi-bundle` and mounted read-only.
  swagger-ui:
    logging: *default-logging
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: aer_swagger_ui
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8080"
    environment:
      URLS: |
        [
          {"url":"/specs/bff-api.yaml","name":"BFF API"},
          {"url":"/specs/ingestion-api.yaml","name":"Ingestion API"}
        ]
      URLS_PRIMARY_NAME: "BFF API"
    volumes:
      - ./services/bff-api/api/openapi.bundle.yaml:/usr/share/nginx/html/specs/bff-api.yaml:ro
      - ./services/ingestion-api/api/openapi.bundle.yaml:/usr/share/nginx/html/specs/ingestion-api.yaml:ro
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

  # ----------------------------------------------------
  # 0. REVERSE PROXY / TLS TERMINATION
  # ----------------------------------------------------
  traefik:
    logging: *default-logging
    image: traefik:v3.6.12
    container_name: aer_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # SEC-052: expose Prometheus metrics on a dedicated INTERNAL entrypoint
      # (:8082, never host-published) so Prometheus can scrape Traefik —
      # `traefik_tls_certs_not_after` makes ACME cert-expiry/renewal-failure
      # alertable (the 90-day TLS boundary is a whole-site outage with no other
      # signal source).
      - "--entrypoints.metrics.address=:8082"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      # SEC-052: also on aer-backend so Prometheus (backend-only) can reach the
      # :8082 metrics entrypoint. Only :80/:443 are host-published; the metrics
      # port stays internal to the docker networks.
      - aer-frontend
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    logging: *default-logging
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: aer_minio
    restart: unless-stopped
    environment:
      # Phase 155 / ADR-046: root creds via MinIO's native *_FILE support
      # (Docker secrets on tmpfs); the plain env MUST be absent or MinIO would
      # prefer it over the file.
      MINIO_ROOT_USER_FILE: /run/secrets/MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/MINIO_ROOT_PASSWORD
      MINIO_NOTIFY_NATS_ENABLE_aer: "on"
      MINIO_NOTIFY_NATS_ADDRESS_aer: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_aer: "aer.lake.bronze"
      MINIO_NOTIFY_NATS_JETSTREAM_aer: "on"
      # Phase 154 — expose the native Prometheus metrics endpoint without a
      # bearer token. Safe because the endpoint is reachable only on the
      # internal, zero-trust aer-backend network (never published to the host),
      # mirroring the unauthenticated /metrics endpoints on the Go services.
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    secrets:
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls=true"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - aer-frontend
      - aer-backend
    depends_on:
      nats-init:
        condition: service_completed_successfully # MinIO waits for JetStream
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"

  minio-init:
    logging: *default-logging
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: aer_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=minio:9000
      # Phase 155 / ADR-046: Docker secrets on tmpfs, resolved by setup.sh's
      # _FILE resolver.
      - MINIO_ROOT_USER_FILE=/run/secrets/MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/MINIO_ROOT_PASSWORD
      - INGESTION_MINIO_ACCESS_KEY_FILE=/run/secrets/INGESTION_MINIO_ACCESS_KEY
      - INGESTION_MINIO_SECRET_KEY_FILE=/run/secrets/INGESTION_MINIO_SECRET_KEY
      - WORKER_MINIO_ACCESS_KEY_FILE=/run/secrets/WORKER_MINIO_ACCESS_KEY
      - WORKER_MINIO_SECRET_KEY_FILE=/run/secrets/WORKER_MINIO_SECRET_KEY
      - BFF_MINIO_ACCESS_KEY_FILE=/run/secrets/BFF_MINIO_ACCESS_KEY
      - BFF_MINIO_SECRET_KEY_FILE=/run/secrets/BFF_MINIO_SECRET_KEY
    secrets:
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
      - INGESTION_MINIO_ACCESS_KEY
      - INGESTION_MINIO_SECRET_KEY
      - WORKER_MINIO_ACCESS_KEY
      - WORKER_MINIO_SECRET_KEY
      - BFF_MINIO_ACCESS_KEY
      - BFF_MINIO_SECRET_KEY
    volumes:
      - ./infra/minio/setup.sh:/setup.sh
    entrypoint: /bin/sh /setup.sh
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 2.2 MESSAGE BROKER (EVENT PIPELINE)
  # ----------------------------------------------------
  nats:
    logging: *default-logging
    image: nats:2.12.6-alpine3.22
    container_name: aer_nats
    restart: unless-stopped
    command: "-js"
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  nats-init:
    logging: *default-logging
    image: natsio/nats-box:0.19.3
    container_name: aer_nats_init
    restart: "no"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - aer-backend
    volumes:
      - ./infra/nats/streams:/config/streams:ro
    # Idempotent IaC provisioning: create stream if absent, otherwise update
    # from the versioned JSON definition. Hard Rule 5 SSoT.
    command: >
      sh -c "
        nats --server nats:4222 stream add AER_LAKE --config /config/streams/AER_LAKE.json 2>/dev/null ||
        nats --server nats:4222 stream update AER_LAKE --config /config/streams/AER_LAKE.json --force
      "
  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    logging: *default-logging
    image: postgres:18.3-alpine3.23
    container_name: aer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      # Phase 155 / ADR-046: superuser password via postgres' native *_FILE
      # (Docker secret on tmpfs).
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
      POSTGRES_DB: ${POSTGRES_DB}
      # postgres:18 moved its default data dir to a major-version-specific path
      # (/var/lib/postgresql/18/docker) and HARD-REFUSES to start when a volume
      # is mounted at the legacy /var/lib/postgresql/data without this override
      # ("there appears to be PostgreSQL data in ... (unused mount/volume)").
      # Pinning PGDATA back to the mounted path keeps the established layout, so
      # a FRESH volume initialises cleanly and existing volumes keep working.
      PGDATA: /var/lib/postgresql/data
    secrets:
      - POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # Provisions the BFF API's read-only PostgreSQL role. Waits until
  # ingestion-api has run its migrations (so the `sources` table exists),
  # then creates/updates `bff_readonly` with SELECT on that single table.
  # IaC-only (Hard Rule 5) — the BFF must never provision its own role.
  postgres-init-roles:
    logging: *default-logging
    image: postgres:18.3-alpine3.23
    container_name: aer_postgres_init_roles
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      ingestion-api:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER}
      # Phase 155 / ADR-046: Docker secrets on tmpfs, resolved by init-roles.sh.
      - PGPASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD
      - PGDATABASE=${POSTGRES_DB}
      - BFF_DB_USER=${BFF_DB_USER}
      - BFF_DB_PASSWORD_FILE=/run/secrets/BFF_DB_PASSWORD
      - BFF_AUTH_DB_USER=${BFF_AUTH_DB_USER}
      - BFF_AUTH_DB_PASSWORD_FILE=/run/secrets/BFF_AUTH_DB_PASSWORD
    secrets:
      - POSTGRES_PASSWORD
      - BFF_DB_PASSWORD
      - BFF_AUTH_DB_PASSWORD
    volumes:
      - ./infra/postgres/init-roles.sh:/init-roles.sh:ro
    entrypoint: /bin/sh /init-roles.sh
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1 ANALYTICS / GOLD LAYER (TIME-SERIES)
  # ----------------------------------------------------
  clickhouse:
    logging: *default-logging
    image: clickhouse/clickhouse-server:26.3.3-alpine
    container_name: aer_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      # Phase 155 / ADR-046: password via clickhouse-server's native *_FILE
      # (Docker secret on tmpfs).
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/CLICKHOUSE_PASSWORD
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    secrets:
      - CLICKHOUSE_PASSWORD
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Phase 154 — enable the built-in Prometheus endpoint (port 9363,
      # internal-only). No exporter container; scraped by the `clickhouse`
      # Prometheus job.
      - ./infra/clickhouse/config.d/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      # SEC-099 — disable high-volume internal system logs + TTL the rest so they
      # cannot fill the disk (they ballooned to 1.27 GiB vs ~46 MiB of real data).
      - ./infra/clickhouse/config.d/system_log_ttl.xml:/etc/clickhouse-server/config.d/system_log_ttl.xml:ro
      # SEC-031/047 — native BACKUP destination disk (captures AggregatingMergeTree
      # partitions directly; the backup script tars artifacts out of here and
      # restic ships them off-box, then they are pruned from the volume).
      - ./infra/clickhouse/config.d/backup_disk.xml:/etc/clickhouse-server/config.d/backup_disk.xml:ro
      - clickhouse_backups:/backups
    networks:
      - aer-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"

  clickhouse-init:
    logging: *default-logging
    image: clickhouse/clickhouse-server:26.3.3-alpine
    container_name: aer_clickhouse_init
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./infra/clickhouse/migrations:/migrations:ro
      - ./infra/clickhouse/migrate.sh:/migrate.sh:ro
    entrypoint: /bin/sh /migrate.sh
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      # Phase 155 / ADR-046: Docker secret on tmpfs, resolved by migrate.sh.
      - CLICKHOUSE_PASSWORD_FILE=/run/secrets/CLICKHOUSE_PASSWORD
    secrets:
      - CLICKHOUSE_PASSWORD
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1b INGESTION API (INTERNAL WRITE PATH)
  # ----------------------------------------------------
  ingestion-api:
    logging: *default-logging
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    container_name: aer_ingestion_api
    # Phase 155 / D9: non-secret runtime config (generated by gen_runtime_env.sh).
    # env_file is the base layer; the `environment:` below overrides/adds literals.
    # A new non-secret var lands in .env.runtime and is forwarded by construction.
    env_file:
      - .env.runtime
    restart: unless-stopped
    # Graceful shutdown grace must exceed INGESTION_SHUTDOWN_TIMEOUT_SECONDS (65s)
    # + WriteTimeout (60s); Docker's default 10s would SIGKILL mid-drain.
    stop_grace_period: 70s
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - INGESTION_PORT=8081
      # Phase 155 / ADR-046: Docker secrets on tmpfs (DB_URL synthesised at stage
      # time from POSTGRES_PASSWORD), resolved by the service's _FILE loader.
      - DB_URL_FILE=/run/secrets/DB_URL
      - MINIO_ENDPOINT=minio:9000
      - INGESTION_MINIO_ACCESS_KEY_FILE=/run/secrets/INGESTION_MINIO_ACCESS_KEY
      - INGESTION_MINIO_SECRET_KEY_FILE=/run/secrets/INGESTION_MINIO_SECRET_KEY
      - MINIO_USE_SSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}  # Production recommendation: 0.1
      - MIGRATIONS_PATH=/migrations
      - INGESTION_API_KEY_FILE=/run/secrets/INGESTION_API_KEY
      - INGESTION_BRONZE_BUCKET=${INGESTION_BRONZE_BUCKET:-bronze}
    secrets:
      - DB_URL
      - INGESTION_MINIO_ACCESS_KEY
      - INGESTION_MINIO_SECRET_KEY
      - INGESTION_API_KEY
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.1b' WIKIDATA ALIAS INDEX (PHASE 118)
  # ----------------------------------------------------
  # One-shot init that copies the SQLite alias DB from the
  # aer-wikidata-index image (built quarterly by
  # .github/workflows/wikidata_index_rebuild.yml) into the persistent
  # `wikidata_data` named volume mounted read-only by the analysis-worker.
  # IaC-only provisioning per Hard Rule 5; mirrors nats-init / minio-init /
  # clickhouse-init. Image tag is pinned via WIKIDATA_INDEX_TAG so a known
  # snapshot is deployed deterministically.
  wikidata-index-init:
    logging: *default-logging
    image: ghcr.io/frogfromlake/aer-wikidata-index:${WIKIDATA_INDEX_TAG:-latest}
    container_name: aer_wikidata_index_init
    restart: "no"
    # Run as root for the provisioning phase only — overriding the image's
    # USER aer (uid 10001). A freshly-created Docker named volume is owned
    # root:root 755 and an unprivileged user inside the container cannot
    # write into it. The worker mounts the same volume read-only and reads
    # the chmod 0644 files with any UID, so worker-side hardening is not
    # affected. Standard init-container pattern; mirrors how nats-init /
    # minio-init / clickhouse-init provision their respective stores
    # (Hard Rule 5).
    user: "0:0"
    # Mount path aligned with the analysis-worker's
    # `wikidata_data:/data/wikidata:ro` mount — both containers see the
    # index at the same path `/data/wikidata/wikidata_aliases.db`.
    #
    # Phase 120b: the previous form combined a custom entrypoint
    # (["/bin/sh", "-c"]) with a YAML folded-scalar `command: > "..."`
    # body. The script ran to completion successfully but the container
    # then never reaped — `docker inspect` showed Status=running with
    # FinishedAt=0001-01-01T00:00:00Z while no processes existed inside
    # it. `docker compose up --wait` blocked indefinitely waiting for
    # service_completed_successfully, making `make reset` take 10+
    # minutes per run. Switching to the bind-mounted script pattern
    # used by minio-init eliminates the YAML-quoting interaction and
    # the zombie behaviour.
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - wikidata_data:/data/wikidata
      - ./infra/wikidata-index/init.sh:/init.sh:ro
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1b'' WIKIDATA DISPLAY LABELS → CLICKHOUSE (PHASE 123b)
  # ----------------------------------------------------
  # One-shot init that loads the QID→display-label TSV (distributed into the
  # wikidata_data volume by wikidata-index-init) into aer_gold.wikidata_labels.
  # Backs the cross-lingual relabelling toggle on the cooccurrence_network
  # presentation: the BFF LEFT JOINs this table on the QID it already resolves
  # from entity_links. Uses the ClickHouse client image (mirrors clickhouse-init,
  # Hard Rule 5). An empty placeholder TSV is a no-op until the next index
  # rebuild populates display labels — see infra/clickhouse/load_wikidata_labels.sh.
  wikidata-labels-load:
    logging: *default-logging
    image: clickhouse/clickhouse-server:26.3.3-alpine
    container_name: aer_wikidata_labels_load
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
      wikidata-index-init:
        condition: service_completed_successfully
    volumes:
      - wikidata_data:/data/wikidata:ro
      - ./infra/clickhouse/load_wikidata_labels.sh:/load_wikidata_labels.sh:ro
    entrypoint: ["/bin/sh", "/load_wikidata_labels.sh"]
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      # Phase 155 / ADR-046: Docker secret on tmpfs, resolved by the script.
      - CLICKHOUSE_PASSWORD_FILE=/run/secrets/CLICKHOUSE_PASSWORD
    secrets:
      - CLICKHOUSE_PASSWORD
    networks:
      - aer-backend

  # ----------------------------------------------------
  # 3.1c ANALYSIS WORKER (BRONZE → SILVER → GOLD)
  # ----------------------------------------------------
  analysis-worker:
    logging: *default-logging
    build:
      context: .
      dockerfile: services/analysis-worker/Dockerfile
      args:
        # SentiWS lexicon source. Default = the canonical Leipzig mirror; that
        # academic server has occasional outages. When it is down, set
        # SENTIWS_URL in .env to a byte-identical fallback (e.g. an Internet
        # Archive snapshot of the same file). The SHA256 pin in the Dockerfile
        # verifies integrity regardless of source — a wrong/mutated file fails
        # the build — so this never weakens the supply-chain guarantee.
        SENTIWS_URL: ${SENTIWS_URL:-https://downloads.wortschatz-leipzig.de/etc/SentiWS/SentiWS_v2.0.zip}
    container_name: aer_analysis_worker
    # Phase 155 / D9: non-secret runtime config base layer (see gen_runtime_env.sh).
    env_file:
      - .env.runtime
    restart: unless-stopped
    # Graceful shutdown: the worker drains for up to WORKER_SHUTDOWN_TIMEOUT_SECONDS
    # (65s) on SIGTERM, closing ClickHouse + Postgres pools. Docker's DEFAULT grace
    # is only 10s — it would SIGKILL mid-drain on every redeploy/down. Grace must
    # exceed the drain window.
    stop_grace_period: 70s
    environment:
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}
      - WORKER_COUNT=${WORKER_COUNT:-5}
      # Phase 123 — JetStream consumer tuning (env-wired for scale). ack_wait
      # must exceed the worst-case per-document processing time so a still-
      # processing document is never redelivered (which spirals under backlog).
      - NATS_ACK_WAIT_SECONDS=${NATS_ACK_WAIT_SECONDS:-300}
      - NATS_MAX_DELIVER=${NATS_MAX_DELIVER:-5}
      # Phase 123 hardening — CRITICAL for multi-worker scale. The HuggingFace
      # `tokenizers` (Rust/rayon) library deadlocks when the BERT sentiment
      # models are tokenised from several Python threads at once: with
      # WORKER_COUNT>1 all worker threads enter inference concurrently and the
      # rayon threadpool wedges on a futex (CPU idle, pipeline frozen — the
      # exact stall observed at WORKER_COUNT=5). Disabling tokenizer-internal
      # parallelism removes the deadlock; throughput comes from the worker
      # pool, not from intra-tokeniser threads.
      - TOKENIZERS_PARALLELISM=${TOKENIZERS_PARALLELISM:-false}
      # Bound torch/OpenMP/MKL intra-op threads so N concurrent inferences do
      # not each spawn (cpu-count) threads — that oversubscription explodes the
      # process thread count and starves the scheduler. One math thread per
      # inference; parallelism is across workers.
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
      - MINIO_ENDPOINT=minio:9000
      # Phase 155 / ADR-046: Docker secrets on tmpfs, resolved by the worker's
      # _FILE loader (internal/secret_files).
      - WORKER_MINIO_ACCESS_KEY_FILE=/run/secrets/WORKER_MINIO_ACCESS_KEY
      - WORKER_MINIO_SECRET_KEY_FILE=/run/secrets/WORKER_MINIO_SECRET_KEY
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD_FILE=/run/secrets/CLICKHOUSE_PASSWORD
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      # Storage timeouts named as security defaults in CLAUDE.md. Without
      # these, the worker silently falls back to code defaults — patches
      # applied here so the .env values actually reach the process.
      - CLICKHOUSE_POOL_TIMEOUT_SECONDS=${CLICKHOUSE_POOL_TIMEOUT_SECONDS:-30}
      - WORKER_PG_STATEMENT_TIMEOUT_MS=${WORKER_PG_STATEMENT_TIMEOUT_MS:-5000}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD
      - POSTGRES_DB=${POSTGRES_DB}
      - WORKER_BRONZE_BUCKET=${WORKER_BRONZE_BUCKET:-bronze}
      - WORKER_SILVER_BUCKET=${WORKER_SILVER_BUCKET:-silver}
      # Phase 102 / 115 / 120 corpus-loop cadences. Production defaults
      # match .env.example (1h corpus interval over the full 365-day
      # Gold-entities window per Phase 131a, 24h baseline, daily
      # topic). The dev-mode .env overrides INTERVAL only — the
      # window must stay at the Gold-TTL to avoid the Phase-131a
      # BUG-1.5 regression (entity-bearing articles outside a narrow
      # window producing no co-occurrence rows). Both paths flow
      # through these compose entries.
      - CORPUS_EXTRACTION_ENABLED=${CORPUS_EXTRACTION_ENABLED:-true}
      - CORPUS_EXTRACTION_INTERVAL_SECONDS=${CORPUS_EXTRACTION_INTERVAL_SECONDS:-3600}
      - CORPUS_EXTRACTION_WINDOW_SECONDS=${CORPUS_EXTRACTION_WINDOW_SECONDS:-31536000}
      - CORPUS_EXTRACTION_INITIAL_DELAY_SECONDS=${CORPUS_EXTRACTION_INITIAL_DELAY_SECONDS:-60}
      - BASELINE_EXTRACTION_ENABLED=${BASELINE_EXTRACTION_ENABLED:-true}
      - BASELINE_EXTRACTION_INTERVAL_SECONDS=${BASELINE_EXTRACTION_INTERVAL_SECONDS:-86400}
      - BASELINE_EXTRACTION_WINDOW_SECONDS=${BASELINE_EXTRACTION_WINDOW_SECONDS:-7776000}
      - BASELINE_EXTRACTION_INITIAL_DELAY_SECONDS=${BASELINE_EXTRACTION_INITIAL_DELAY_SECONDS:-300}
      - TOPIC_EXTRACTION_ENABLED=${TOPIC_EXTRACTION_ENABLED:-false}
      - TOPIC_EXTRACTION_INTERVAL_SECONDS=${TOPIC_EXTRACTION_INTERVAL_SECONDS:-86400}
      - TOPIC_EXTRACTION_WINDOW_SECONDS=${TOPIC_EXTRACTION_WINDOW_SECONDS:-2592000}
      - TOPIC_EXTRACTION_INITIAL_DELAY_SECONDS=${TOPIC_EXTRACTION_INITIAL_DELAY_SECONDS:-600}
      - TOPIC_EXTRACTION_SWEEP_TIMEOUT_SECONDS=${TOPIC_EXTRACTION_SWEEP_TIMEOUT_SECONDS:-1800}
      - TOPIC_EMBED_THREADS=${TOPIC_EMBED_THREADS:-6}
      # Phase 122d.0 / ADR-032 — Silent-Edit Observability (Wayback CDX).
      # Default disabled; flip WAYBACK_CDX_ENABLED=true in .env to exercise.
      # The worker reads these via `os.getenv` (see `main.py::_init_wayback_client`);
      # they MUST be declared here so Docker Compose injects them into the
      # container — `.env` alone is only read by Compose for interpolation,
      # not auto-forwarded to the process environment.
      - WAYBACK_CDX_ENABLED=${WAYBACK_CDX_ENABLED:-false}
      - WAYBACK_CDX_BASE_URL=${WAYBACK_CDX_BASE_URL:-https://web.archive.org/cdx/search/cdx}
      - WAYBACK_CDX_TIMEOUT_SECONDS=${WAYBACK_CDX_TIMEOUT_SECONDS:-5.0}
      - WAYBACK_CDX_RATE_LIMIT_PER_SECOND=${WAYBACK_CDX_RATE_LIMIT_PER_SECOND:-5.0}
      - WAYBACK_CDX_CACHE_TTL_HOURS=${WAYBACK_CDX_CACHE_TTL_HOURS:-24}
      # Phase 123 — circuit breaker so an unreachable Internet Archive cannot
      # add a per-article HTTP timeout to the synchronous harmonisation path
      # (open after N consecutive failures; short-circuit for the cooldown).
      - WAYBACK_CDX_CIRCUIT_FAILURE_THRESHOLD=${WAYBACK_CDX_CIRCUIT_FAILURE_THRESHOLD:-5}
      - WAYBACK_CDX_CIRCUIT_RESET_SECONDS=${WAYBACK_CDX_CIRCUIT_RESET_SECONDS:-60}
      - MAX_CDX_REVISIONS_PER_ARTICLE=${MAX_CDX_REVISIONS_PER_ARTICLE:-20}
      - REPUBLICATION_TRIGGER_MIN_DELTA_DAYS=${REPUBLICATION_TRIGGER_MIN_DELTA_DAYS:-7}
      # Phase 122d.1 / ADR-032 amendment — Silent-Edit Diff Substance.
      # Separate enable-flag from CDX (122d.0); the snapshot fetcher
      # uses a SEPARATE token bucket (lower default rate than CDX).
      - REVISION_DIFF_EXTRACTION_ENABLED=${REVISION_DIFF_EXTRACTION_ENABLED:-false}
      - REVISION_DIFF_EXTRACTION_INTERVAL_SECONDS=${REVISION_DIFF_EXTRACTION_INTERVAL_SECONDS:-1800}
      - REVISION_DIFF_EXTRACTION_INITIAL_DELAY_SECONDS=${REVISION_DIFF_EXTRACTION_INITIAL_DELAY_SECONDS:-180}
      - REVISION_DIFF_MAX_PAIRS_PER_TICK=${REVISION_DIFF_MAX_PAIRS_PER_TICK:-200}
      - WAYBACK_SNAPSHOT_TIMEOUT_SECONDS=${WAYBACK_SNAPSHOT_TIMEOUT_SECONDS:-15.0}
      - WAYBACK_SNAPSHOT_RATE_LIMIT_PER_SECOND=${WAYBACK_SNAPSHOT_RATE_LIMIT_PER_SECOND:-2.0}
      - WEB_CRAWLER_USER_AGENT=${WEB_CRAWLER_USER_AGENT:-AerWebCrawler/0.1 (+https://aer.example/about; mailto:contact@example)}
      # Phase 118: Wikidata alias index, populated into wikidata_data by the
      # wikidata-index-init service. Empty WIKIDATA_INDEX_SHA256 disables the
      # fail-fast hash check (recommended only for development).
      - WIKIDATA_INDEX_PATH=${WIKIDATA_INDEX_PATH:-/data/wikidata/wikidata_aliases.db}
      - WIKIDATA_INDEX_SHA256=${WIKIDATA_INDEX_SHA256:-}
      # Phase 120b: numba JIT cache directory. Required because the `aer`
      # runtime user has no home (--no-create-home in the Dockerfile) and
      # /usr/local/lib/python*/site-packages is root-owned, so numba's
      # default in-tree and user-wide cache locators both fail. Without
      # this, importing UMAP via BERTopic raises:
      #   RuntimeError: cannot cache function 'rdist': no locator available
      # which the topic-modeling extractor catches and logs as
      # `topic_modeling.dependencies_missing`. /hf-cache is the worker-
      # owned directory baked into the image (see Dockerfile); the JIT
      # cache lives there at runtime in the container's writable upper
      # layer (~10 s recompile cost on container recreation, not worth
      # a named volume).
      - NUMBA_CACHE_DIR=/hf-cache/numba
    secrets:
      - WORKER_MINIO_ACCESS_KEY
      - WORKER_MINIO_SECRET_KEY
      - CLICKHOUSE_PASSWORD
      - POSTGRES_PASSWORD
    volumes:
      - wikidata_data:/data/wikidata:ro
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      wikidata-index-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          # CPUs: the worker runs the full heavy-NLP stack (2× BERT sentiment +
          # 2× spaCy NER + per-doc topic + entity-linking) across WORKER_COUNT
          # threads; 6 CPUs so each of the 4 workers gets >1 core (the target
          # CX43 has 8 vCPU).
          #
          # Memory 11G (Phase 148c, measured): a fresh reset+crawl (594 docs)
          # peaked at ~9.3 GiB — the full-corpus topic E5 embedding plus the
          # co-occurrence 1-year window. The Phase-148c corpus mutex serialises
          # the heavy sweeps, so the peak is max(single sweep), not the sum; the
          # old 6 GiB cap was below that peak and the BERTopic fit stalled at the
          # ceiling. Non-worker services use only ~1.4 GiB actual on the box, so
          # 11 GiB leaves the 16 GB CX43 comfortable (~11 + 1.4 + OS ≈ 13.4 GiB).
          # The per-sweep peak scales with the corpus; the topic embedding-cache /
          # window-streaming work (ROADMAP) will bring it back down.
          memory: 11264M
          cpus: "6.00"

  # ----------------------------------------------------
  # 3.1d WEB CRAWLER (ONE-SHOT JOB) — Phase 122
  # ----------------------------------------------------
  # Single configurable Python binary that fetches full-article HTML for
  # every news-website probe (Probe 0+). Per-probe configuration lives
  # in `crawlers/web-crawler/probes/<probe-id>/sources.yaml`; the image
  # is identical across probes (ADR-028).
  #
  # Runs on the internal `aer-backend` network so it reaches
  # `ingestion-api:8081` directly. Dedup state lives in Postgres
  # (`crawler_state` table, migration 017) — `make reset` wipes it.
  #
  # `profiles: ["crawlers"]` keeps it out of `make up`. Invoke via
  # `make crawl-probe0` (wraps `docker compose run --rm web-crawler
  # --probe probe0`) or from a host cron / systemd timer in production.
  web-crawler:
    logging: *default-logging
    build:
      context: .
      dockerfile: crawlers/web-crawler/Dockerfile
    image: aer-web-crawler:local
    container_name: aer_web_crawler
    # Phase 155 / D9: non-secret runtime config base layer (see gen_runtime_env.sh).
    env_file:
      - .env.runtime
    profiles: ["crawlers"]
    restart: "no"
    environment:
      - INGESTION_URL=http://ingestion-api:8081/api/v1/ingest
      - SOURCES_URL=http://ingestion-api:8081/api/v1/sources
      # Phase 155 / ADR-046: Docker secrets on tmpfs, resolved by the crawler's
      # _FILE loader (internal/secret_files).
      - INGESTION_API_KEY_FILE=/run/secrets/INGESTION_API_KEY
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD
      - POSTGRES_DB=${POSTGRES_DB}
      - WEB_CRAWLER_USER_AGENT=${WEB_CRAWLER_USER_AGENT:-AerWebCrawler/0.1 (+https://aer.example/about; mailto:contact@example)}
    secrets:
      - INGESTION_API_KEY
      - POSTGRES_PASSWORD
    networks:
      - aer-backend
    depends_on:
      ingestion-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ----------------------------------------------------
  # 3.2 BFF API (PUBLIC-FACING, BEHIND TRAEFIK)
  # ----------------------------------------------------
  bff-api:
    logging: *default-logging
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    container_name: aer_bff_api
    # Phase 155 / D9: non-secret runtime config base layer (see gen_runtime_env.sh).
    env_file:
      - .env.runtime
    restart: unless-stopped
    # Graceful shutdown grace must exceed BFF_SHUTDOWN_TIMEOUT_SECONDS (65s) +
    # WriteTimeout (60s); Docker's default 10s would SIGKILL mid-drain.
    stop_grace_period: 70s
    # SEC-002: loopback-only host publish. Traefik reaches the BFF over the
    # aer-frontend docker network (container :8080); this host port is a dev
    # convenience only. It must never bind 0.0.0.0 — a published port bypasses
    # Traefik TLS/HSTS and the host firewall (Docker DNAT precedes UFW), which
    # would expose /auth/login (plaintext credentials) and the unauthenticated
    # /metrics endpoint directly to the internet.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - BFF_PORT=8080
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      # Phase 155 / ADR-046: Docker secrets on tmpfs, resolved by the BFF's
      # _FILE loader (pkg/secretfile).
      - CLICKHOUSE_PASSWORD_FILE=/run/secrets/CLICKHOUSE_PASSWORD
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - BFF_API_KEY_FILE=/run/secrets/BFF_API_KEY
      - BFF_METRICS_CACHE_TTL_SECONDS=${BFF_METRICS_CACHE_TTL_SECONDS:-60}
      # BFF reads source metadata directly from the Postgres `sources`
      # table via a dedicated read-only role (Phase 87). The role is
      # provisioned by the postgres-init-roles init container.
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - BFF_DB_USER=${BFF_DB_USER}
      - BFF_DB_PASSWORD_FILE=/run/secrets/BFF_DB_PASSWORD
      - BFF_SOURCES_CACHE_TTL_SECONDS=${BFF_SOURCES_CACHE_TTL_SECONDS:-60}
      # Access control (Phase 134 / ADR-040). Auth write role (required) + the
      # session / argon2 / WebAuthn tuning. BFF_AUTH_DB_* are boot-validated.
      - BFF_AUTH_DB_USER=${BFF_AUTH_DB_USER}
      - BFF_AUTH_DB_PASSWORD_FILE=/run/secrets/BFF_AUTH_DB_PASSWORD
      - BFF_SECURE_COOKIES=${BFF_SECURE_COOKIES:-true}
      - BFF_SESSION_IDLE_SECONDS=${BFF_SESSION_IDLE_SECONDS:-28800}
      - BFF_SESSION_ABSOLUTE_SECONDS=${BFF_SESSION_ABSOLUTE_SECONDS:-604800}
      - BFF_ARGON2_MEMORY_KIB=${BFF_ARGON2_MEMORY_KIB:-19456}
      - BFF_ARGON2_ITERATIONS=${BFF_ARGON2_ITERATIONS:-2}
      - BFF_ARGON2_PARALLELISM=${BFF_ARGON2_PARALLELISM:-1}
      - BFF_PASSWORD_RESET_TTL_SECONDS=${BFF_PASSWORD_RESET_TTL_SECONDS:-3600}
      - BFF_INVITE_TTL_SECONDS=${BFF_INVITE_TTL_SECONDS:-259200}
      - BFF_PUBLIC_BASE_URL=${BFF_PUBLIC_BASE_URL:-}
      - BFF_WEBAUTHN_RP_ID=${BFF_WEBAUTHN_RP_ID:-localhost}
      - BFF_WEBAUTHN_RP_DISPLAY_NAME=${BFF_WEBAUTHN_RP_DISPLAY_NAME:-AĒR}
      - BFF_WEBAUTHN_RP_ORIGINS=${BFF_WEBAUTHN_RP_ORIGINS:-https://localhost}
      # MinIO read-only access for L5 Evidence article-detail (Phase 101).
      - MINIO_ENDPOINT=minio:9000
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - BFF_MINIO_ACCESS_KEY_FILE=/run/secrets/BFF_MINIO_ACCESS_KEY
      - BFF_MINIO_SECRET_KEY_FILE=/run/secrets/BFF_MINIO_SECRET_KEY
      - BFF_K_ANONYMITY_THRESHOLD=${BFF_K_ANONYMITY_THRESHOLD:-10}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACE_SAMPLE_RATE=${OTEL_TRACE_SAMPLE_RATE:-1.0}  # Production recommendation: 0.1
      # SEC-046 — forward the CORS allow-list. Without this the BFF falls back to
      # its `*` default, which the SEC-010 boot guard REFUSES in production — so a
      # prod box would not boot until CORS_ALLOWED_ORIGINS is set to the real
      # origin(s) (e.g. https://${DASHBOARD_HOST}).
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      # SEC-014 — per-client rate-limit budgets (keyed by SEC-003 client IP).
      # RATE_LIMIT_* is the general per-IP budget; RATE_LIMIT_AUTH_* is the
      # tighter budget for the pre-auth /auth/* brute-force surface. Defaults are
      # production-sane; raise/lower only to tune.
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-100}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-200}
      - RATE_LIMIT_AUTH_RPS=${RATE_LIMIT_AUTH_RPS:-1}
      - RATE_LIMIT_AUTH_BURST=${RATE_LIMIT_AUTH_BURST:-5}
      # SEC-032 — Transactional email (Phase 153 / ADR-043). Without these the
      # SMTP relay is never reachable inside the container, so invite/reset mail
      # is structurally inert in prod and the all-or-nothing validator (config.go)
      # has nothing to validate. Empty SMTP_HOST → LogSender fallback (dev).
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      # Phase 155 / ADR-046: Docker secret on tmpfs (optional — empty file when
      # email is not configured; the BFF then falls back to the LogSender).
      - SMTP_PASSWORD_FILE=/run/secrets/SMTP_PASSWORD
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-AĒR}
      # SEC-033 — first-admin seeding runs INSIDE this container on a prod box
      # (`docker compose exec bff-api /app/bootstrap-admin`); carry the target
      # email here so the baked-in tool reads it without a host .env.
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL:-}
    secrets:
      - CLICKHOUSE_PASSWORD
      - BFF_API_KEY
      - BFF_DB_PASSWORD
      - BFF_AUTH_DB_PASSWORD
      - BFF_MINIO_ACCESS_KEY
      - BFF_MINIO_SECRET_KEY
      - SMTP_PASSWORD
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.bff-api.entrypoints=websecure"
      - "traefik.http.routers.bff-api.tls=true"
      - "traefik.http.services.bff-api.loadbalancer.server.port=8080"
      # Phase 134 / ADR-040: Traefik NO LONGER injects an API key. Browsers
      # authenticate with the opaque `__Host-` session cookie (BFF token-
      # handler pattern); the BFF gate (session OR X-API-Key) means a browser
      # with no session and no key is rejected. The X-API-Key is demoted to a
      # MACHINE credential: non-browser callers (crawlers, CI / smoke tests)
      # send it directly to the BFF on :8080 on the backend network, never via
      # this public router. Re-adding a gateway-injected key here would defeat
      # the gate — do not.
    networks:
      - aer-frontend
      - aer-backend
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres-init-roles:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      # The BFF serves ?viewerLanguage= from aer_gold.wikidata_labels,
      # which this one-shot init populates. The dependency is also what makes
      # `docker compose up --wait` tolerate the loader's clean exit — without a
      # service_completed_successfully consumer, --wait treats its exit(0) as an
      # unexpected stop and aborts `make backend-up`.
      wikidata-labels-load:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 3.3 DASHBOARD (STATIC FRONTEND, BEHIND TRAEFIK)
  # ----------------------------------------------------
  # SvelteKit static bundle served by Nginx. Phase 97 scaffolding — see
  # services/dashboard/README.md and ADR-020. Frontend-network only: no
  # route to any backend service except the BFF via Traefik (ADR-008).
  dashboard:
    logging: *default-logging
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
      # PUBLIC_* values are inlined at build time by the SvelteKit static
      # adapter (Phase 98d). Changing them requires rebuilding the image.
      args:
        PUBLIC_OTLP_ENDPOINT: ${PUBLIC_OTLP_ENDPOINT-}
        PUBLIC_DEPLOYMENT_ENVIRONMENT: ${PUBLIC_DEPLOYMENT_ENVIRONMENT-development}
    image: aer-dashboard:local
    container_name: aer_dashboard
    restart: unless-stopped
    # `dashboard` profile lets `make backend-up` skip this service so
    # `make fe-dev` can serve the SvelteKit dev server on :5173 without
    # a Traefik route conflict on `/`.
    profiles: ["dashboard"]
    networks:
      - aer-frontend
    labels:
      - "traefik.enable=true"
      # Host-catch-all minus /api so the BFF router wins for /api/*.
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      # BFF router has the longer, more specific rule — Traefik picks it
      # for /api/*. Set explicit lower priority on the dashboard catch-all
      # so this is deterministic regardless of rule-length heuristics.
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ----------------------------------------------------
  # 4. OBSERVABILITY (OTEL, TEMPO, PROMETHEUS, GRAFANA)
  # ----------------------------------------------------
  otel-collector:
    logging: *default-logging
    image: otel/opentelemetry-collector:0.149.0
    container_name: aer_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    networks:
      - aer-backend
    depends_on:
      - nats
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  tempo:
    logging: *default-logging
    image: grafana/tempo:2.10.1
    container_name: aer_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  prometheus:
    logging: *default-logging
    image: prom/prometheus:v3.4.2
    container_name: aer_prometheus
    restart: unless-stopped
    # SEC-051: persist the TSDB on a named volume (metrics history survives a
    # redeploy — symmetry with tempo_data) and cap retention by BOTH time and
    # size so the TSDB can never slow-fill the shared budget disk.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=8GB"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  grafana:
    logging: *default-logging
    image: grafana/grafana:12.4.0
    container_name: aer_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      # Phase 155 / ADR-046: admin password via Grafana's native __FILE provider
      # (double underscore), Docker secret on tmpfs.
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/GF_SECURITY_ADMIN_PASSWORD
      # SEC-037 — alert DELIVERY. Grafana unified alerting is the SoT for who gets
      # alerted (D4: no extra Alertmanager container). The provisioned email
      # contact point sends via Grafana's own SMTP, pointed at the same Brevo relay
      # as the app (Phase 153). Empty/disabled in dev → alerts still show in the
      # Grafana UI, just no email. ALERT_EMAIL_TO is the recipient (env, not in the
      # public repo). GF_SERVER_ROOT_URL makes the "View alert" links resolve.
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-smtp-relay.brevo.com:587}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      # Phase 155 / ADR-046: optional — empty secret file when alert email is off.
      - GF_SMTP_PASSWORD__FILE=/run/secrets/GF_SMTP_PASSWORD
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-AĒR Alerts}
      - GF_SMTP_STARTTLS_POLICY=${GF_SMTP_STARTTLS_POLICY:-MandatoryStartTLS}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3000}
    secrets:
      - GF_SECURITY_ADMIN_PASSWORD
      - GF_SMTP_PASSWORD
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      # SEC-037 — provisioned unified-alerting: contact point (email→Brevo),
      # notification policy, and the alert rules (Grafana-managed, mirrors the
      # promtool-validated Prometheus rules). Read-only; mutable state (silences,
      # alert instances) lives in grafana_data below.
      - ./infra/observability/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      # SEC-051: persist Grafana's own DB (unified-alerting state, silences,
      # annotations, the admin user). Dashboards + datasources stay file-
      # provisioned (read-only above); this volume holds the mutable state the
      # SEC-037 alerting layer will need.
      - grafana_data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus
    networks:
      - aer-frontend
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # SEC-056 / SEC-052 — host filesystem + memory + CPU metrics. Disk-fill (logs +
  # data volumes on the shared disk) is the #1 single-box killer; without a host
  # metric source a DiskSpaceLow alert would reference a never-scraped series and
  # silently never fire. Read-only host mount; internal-only (Prometheus scrapes
  # :9100 on aer-backend — no host-published port).
  node-exporter:
    logging: *default-logging
    image: prom/node-exporter:v1.8.2
    container_name: aer_node_exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|run)($$|/)"
      # SEC-049/053 — read the backup heartbeat metric that backup.sh writes to
      # the host (aer_backup_last_success_timestamp_seconds / _exit_code). The
      # host root is mounted at /host (read-only), so the textfile dir is read
      # from there. The deploy runbook creates /var/lib/aer/textfile on the host.
      - "--collector.textfile.directory=/host/var/lib/aer/textfile"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - aer-backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"

  # ----------------------------------------------------
  # 5. DEBUG PORT FORWARDER (opt-in via --profile debug)
  # ----------------------------------------------------
  # Exposes backend service ports to the host for local development.
  # Default: off. Start with: docker compose --profile debug up
  # This is a single socat-based TCP proxy — no application logic.
  debug-ports:
    logging: *default-logging
    image: alpine/socat:1.8.0.1
    container_name: aer_debug_ports
    profiles: ["debug"]
    restart: unless-stopped
    # SEC-024: bind every forward to loopback (matching swagger-ui above) so a
    # direct `docker compose --profile debug up` on a public host can never
    # expose a backend service to 0.0.0.0. Local debugging connects to
    # localhost:<port>; remote debug access goes through an SSH tunnel.
    ports:
      - "127.0.0.1:5432:5432"     # PostgreSQL
      - "127.0.0.1:8123:8123"     # ClickHouse HTTP
      - "127.0.0.1:9002:9002"     # ClickHouse native (host 9002 → container 9000)
      - "127.0.0.1:4222:4222"     # NATS client
      - "127.0.0.1:8222:8222"     # NATS monitoring
      - "127.0.0.1:9000:9000"     # MinIO API
      - "127.0.0.1:9001:9001"     # MinIO Console
      - "127.0.0.1:4317:4317"     # OTel Collector gRPC
      - "127.0.0.1:4318:4318"     # OTel Collector HTTP
      - "127.0.0.1:3000:3000"     # Grafana
      - "127.0.0.1:8081:8081"     # Ingestion API
    entrypoint: ["sh", "-c"]
    command:
      - |
        socat TCP-LISTEN:5432,fork,reuseaddr TCP-CONNECT:postgres:5432 &
        socat TCP-LISTEN:8123,fork,reuseaddr TCP-CONNECT:clickhouse:8123 &
        socat TCP-LISTEN:9002,fork,reuseaddr TCP-CONNECT:clickhouse:9000 &
        socat TCP-LISTEN:4222,fork,reuseaddr TCP-CONNECT:nats:4222 &
        socat TCP-LISTEN:8222,fork,reuseaddr TCP-CONNECT:nats:8222 &
        socat TCP-LISTEN:9000,fork,reuseaddr TCP-CONNECT:minio:9000 &
        socat TCP-LISTEN:9001,fork,reuseaddr TCP-CONNECT:minio:9001 &
        socat TCP-LISTEN:4317,fork,reuseaddr TCP-CONNECT:otel-collector:4317 &
        socat TCP-LISTEN:4318,fork,reuseaddr TCP-CONNECT:otel-collector:4318 &
        socat TCP-LISTEN:3000,fork,reuseaddr TCP-CONNECT:grafana:3000 &
        socat TCP-LISTEN:8081,fork,reuseaddr TCP-CONNECT:ingestion-api:8081 &
        wait
    networks:
      - aer-backend
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"

  # ----------------------------------------------------------------
  # Playwright test runner (Phase 98c)
  # Image tag SSoT for `make fe-test-e2e` and the CI visual+a11y gate.
  # Version MUST match services/dashboard/package.json `@playwright/test`
  # so the browser bundle matches the client API.
  # `profiles: ["test"]` keeps it out of `make up`.
  # ----------------------------------------------------------------
  playwright-runner:
    logging: *default-logging
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles: ["test"]
    command: ["true"]

# Phase 155 / ADR-046 — Docker secrets sourced from a host directory. In
# production that directory is /run/aer-secrets (a tmpfs: RAM-only, gone on
# reboot, never on the persistent disk); the CD job stages it from GitHub
# Environment Secrets before `compose up` (scripts/operations/stage_secrets.sh).
# Locally, `make up` stages ./.aer-secrets from .env (stage_secrets_local.sh) and
# sets AER_SECRETS_DIR. Naming is 1:1: secret <NAME> → file <DIR>/<NAME> →
# container /run/secrets/<NAME> → consumer reads <NAME>_FILE (or its native
# *_FILE / Grafana __FILE). SoT for the full list: infra/secrets/secrets.manifest.
secrets:
  MINIO_ROOT_USER:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/MINIO_ROOT_USER
  MINIO_ROOT_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/MINIO_ROOT_PASSWORD
  INGESTION_MINIO_ACCESS_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/INGESTION_MINIO_ACCESS_KEY
  INGESTION_MINIO_SECRET_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/INGESTION_MINIO_SECRET_KEY
  WORKER_MINIO_ACCESS_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/WORKER_MINIO_ACCESS_KEY
  WORKER_MINIO_SECRET_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/WORKER_MINIO_SECRET_KEY
  BFF_MINIO_ACCESS_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/BFF_MINIO_ACCESS_KEY
  BFF_MINIO_SECRET_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/BFF_MINIO_SECRET_KEY
  POSTGRES_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/POSTGRES_PASSWORD
  BFF_DB_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/BFF_DB_PASSWORD
  BFF_AUTH_DB_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/BFF_AUTH_DB_PASSWORD
  DB_URL:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/DB_URL
  CLICKHOUSE_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/CLICKHOUSE_PASSWORD
  INGESTION_API_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/INGESTION_API_KEY
  BFF_API_KEY:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/BFF_API_KEY
  GF_SECURITY_ADMIN_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/GF_SECURITY_ADMIN_PASSWORD
  GF_SMTP_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/GF_SMTP_PASSWORD
  SMTP_PASSWORD:
    file: ${AER_SECRETS_DIR:-/run/aer-secrets}/SMTP_PASSWORD

volumes:
  minio_data:
  postgres_data:
  clickhouse_data:
  clickhouse_backups:  # SEC-031/047: native CH BACKUP staging (tarred off-box, then pruned)
  tempo_data:
  prometheus_data:   # SEC-051: persistent Prometheus TSDB (metrics history)
  grafana_data:      # SEC-051: persistent Grafana state (unified-alerting/silences)
  wikidata_data:

networks:
  aer-frontend:
    name: aer-frontend
    driver: bridge
  aer-backend:
    name: aer-backend
    driver: bridge