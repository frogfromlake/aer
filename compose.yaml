services:
  # ----------------------------------------------------
  # 1. DOCUMENTATION
  # ----------------------------------------------------
  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: aer_docs
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr=0.0.0.0:8000 --livereload --watch /docs --dirty

  # ----------------------------------------------------
  # 2. DATA LAKE (BRONZE LAYER / RAW DATA)
  # ----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aer_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ----------------------------------------------------
  # 2.1 INFRASTRUCTURE PROVISIONING (INIT SCRIPT)
  # ----------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: aer_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/bronze --ignore-existing;
      /usr/bin/mc mb myminio/silver --ignore-existing;
      echo 'AĒR Data Lake buckets provisioned successfully.';
      exit 0;
      "

  # ----------------------------------------------------
  # 3. METADATA (INDEX FOR THE DATA LAKE)
  # ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aer_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  minio_data:
  postgres_data: