entityId: language_confidence
entityType: metric
locale: en
registers:
  semantic:
    short: "The probability (0–1) that the article's language was correctly identified. High values indicate reliable detection; low values signal ambiguity."
    long: >
      Language confidence measures how certain AĒR is about its own language identification
      result for each article. A value close to 1.0 means the detection algorithm is highly
      confident — the article's vocabulary is distinctive enough for reliable identification.
      Values below 0.7 suggest that the text is ambiguous: it may be very short, code-switched
      (mixing multiple languages), or dominated by proper nouns and abbreviations that confuse
      detection. The detected language is always reported alongside confidence; both values
      should be read together. Low confidence is not an error — it is a signal that the language
      annotation may be unreliable, and downstream analyses that depend on it (such as
      language-specific metrics like sentiment score) should be interpreted with caution.

      Composition — when a Workbench Panel pools more than one source under
      composition='merged', this metric aggregates as mean detection
      confidence (0..1) over the unioned corpus. Sentiment-class metrics
      inherit the merged-mean's sensitivity to source-mix imbalance: a single
      high-volume source can dominate the aggregate. Use the split composition
      (one Cell per source) when source-level differences are the question.
      The merged reading is permitted across languages with a soft methodology
      banner (Aleph) or refused (Episteme, Rhizome) — see the per-view-mode
      entry for the exact behaviour.

  methodological:
    short: "langdetect v1.0.9 top-candidate probability, fixed seed. Tier 1 (deterministic). Degrades on texts under ~200 characters. WP-002 §3."
    long: >
      language_confidence is the highest posterior probability assigned by langdetect v1.0.9
      to the top-ranked language candidate. langdetect uses character n-gram profiles and a
      Naive Bayes classifier trained on Wikipedia text in 55 languages. The extractor fixes the
      random seed to 0 to ensure identical output for identical input (langdetect's internal
      randomness otherwise makes results non-reproducible across runs). The metric is Tier 1
      (deterministic after seed fixing) under WP-002 §3. Three documented limitations:
      (1) short-text degradation — texts under approximately 200 characters produce unreliable
      probability scores; AĒR applies no minimum-length gate at extraction time;
      (2) code-switching blindness — the classifier returns a single top language and cannot
      identify multilingual passages; (3) the fixed seed ensures reproducibility but also means
      that internal tie-breaking always resolves identically, which may produce spuriously high
      confidence on ambiguous inputs. Extractor: langdetect-1.0.9. Validation status: unvalidated.
      Note on `language_variety` (Phase 116; ADR-024 addendum): the
      `aer_gold.language_detections.language_variety` column carries a coarse source-locale
      tag derived from the RSS feed-URL TLD (`de-AT` / `de-CH` / `de-DE` for German texts,
      empty otherwise). It is retained for Silver-provenance auditing only and is not surfaced
      on the dashboard — it is not a dialect classifier (WP-002 §3.4).

      Composition (Phase 122i / ADR-034) — multi-source merged queries
      aggregate as mean detection confidence (0..1) over the unioned article
      set; the BFF accepts ?sourceIds=a,b,... and unions server-side.
      Equivalence gates (WP-004 §3) still apply when the merge spans
      heterogeneous source classes — the gate evaluates on the resolved scope
      before aggregation. Split composition is the per-source fanout; the
      metric definition is unchanged per Cell. Cross-language merged scope is
      governed at the view-mode handler: Aleph view-modes for this metric
      render the soft MethodologyBanner; Episteme/Rhizome view-modes (when
      applicable) refuse with HTTP 422 cross_language_merge_unsupported
      (ADR-034 §3).

