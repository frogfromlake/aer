entityId: k_anonymity_threshold_not_met
entityType: refusal
locale: en
registers:
  semantic:
    short: "Reading this article's full text requires enough same-day articles from the source to keep an individual unidentifiable. The gate applies only to corpora where a person could be re-identified — public institutional publishers are exempt."
    long: >
      You requested the full text of an individual article. For corpora where an author
      could be re-identified, AĒR withholds it until the article sits within a large enough
      group of same-day articles from the same source — too small a group could let an
      adversary with outside knowledge single out a specific author. This is a principled
      limit, not a technical one (WP-006 §7). It is scoped to where it matters: a PUBLIC
      institutional publisher — a government press office, a newsroom with a public article
      URL — is exempt, because the text is already public and the "author" is an institution,
      not a private individual. For gated corpora, widen the time range to accumulate more
      same-day articles, or use the always-available aggregate views.
  methodological:
    short: "HTTP 403: k-anonymity gate (WP-006 §7). Counts articles in the (source, metric, day) aggregation group, not unique sources. Corpus-class scoped — public institutional sources are exempt. No individual-article data exposed."
    long: >
      This refusal fires when a Layer 5 read (individual article detail) is requested and the
      article's aggregation group — the distinct articles sharing its (source, metric, UTC-day)
      key in `aer_gold.metrics` — holds fewer than k_min documents (configurable; default 10).
      It counts ARTICLES in that group, not unique sources. The gate exists because exposing
      individual-article text from too small a group could let an adversary with external
      knowledge re-identify a specific author. As of Phase 133 the gate is SCOPED BY CORPUS
      CLASS: sources in a public-institutional class (`institutional-web` — government press
      offices, newsrooms with public canonical URLs) are exempt (effective k_min = 1), since
      their text is already public and authorship is institutional, not individual. The gate
      stays in full force for classes where individuals could be deanonymised (social media,
      user-generated content), added later. It is enforced server-side by the BFF and cannot
      be bypassed by the frontend. Resolution for gated corpora: widen the time range to
      accumulate more same-day articles, or use the Layer 3–4 aggregate views, always
      available. WP-006 §7 documents the rationale and the corpus-class scoping.
