entityId: howto_correlation_matrix
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Each cell is the correlation of two metrics in the chosen set — warm = they rise together, cool = one falls as the other rises, pale = unrelated."
    long: >
      A correlation matrix answers "across this SET of measurements, which move together and which
      are independent?". The set you choose IS the subject of the view: every metric in it becomes
      one row and one column, and each off-diagonal cell is the correlation of that row–column
      pair. Read a strong warm or cool cell as a pair worth opening as a scatter to see the shape
      behind the number. The diagonal is always 1 (a metric correlates perfectly with itself), and
      the matrix is symmetric, so the upper and lower triangles mirror each other. Correlation is
      not causation, and Pearson r captures only straight-line relationships — a curved
      relationship can read as a weak r even when the two metrics are tightly linked.
  methodological:
    short: "Pairwise Pearson r over per-5-minute-bucket means of the chosen metric set; cells with too few overlapping buckets are left blank, never zero."
    long: >
      For every metric in the chosen set the server computes per-bucket means (fixed 5-minute
      resolution via toStartOfFiveMinute, matching the time-series endpoint), then Pearson r over
      each pair of bucket-mean series where both metrics have a value. Note the unit of observation
      is the time-bucket, not the article — this is a "do these metrics move together over time"
      correlation, distinct from the per-article scatter, which is why the same pair can look
      different in the two views. A pair with too few overlapping buckets returns null and is
      rendered blank (disclose-never-coerce, WP-003 §3.2), never a coerced zero; a thin overlap is
      also a noisy r, so read the bucket count alongside the colour rather than trusting a single
      strong cell built on a handful of buckets. A cross-frame (multi-language) matrix requires a
      validated equivalence grant for every metric in the set; absent that, the cell refuses with a
      Level-1 alternative rather than correlating non-comparable scales (WP-004 §5.2, §3.4).
