entityId: time_series_publication_hour
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Publication hour over time. Reveals whether the clock-time of a source's output is shifting — useful for detecting editorial schedule changes, seasonal daylight-saving transitions, or automation events."
    long: >
      This view plots publication hour as a time series — showing not individual article
      timestamps but the moving average of the hour-of-day at which a source publishes.
      For most stable institutional sources, this curve is remarkably flat: organisations
      publish at consistent times. Structural breaks (sudden shift in average publication
      hour) can indicate editorial schedule changes, handover to automated systems, or
      major organisational events. The annual CET/CEST transition (daylight saving) produces
      a predictable one-hour step in UTC-expressed times each spring and autumn — this is
      a known artifact, not an editorial shift.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "5-minute downsampled mean of publication hour (UTC, 0–23). Tier 1 — interpret as mean UTC clock-time. Seasonal UTC offset shifts are expected artifacts, not editorial events."
    long: >
      Publication hour in this time-series view is the downsampled mean of the UTC hour
      field. As a Tier 1 metric (WP-002 §3), it is fully deterministic. The primary
      interpretive consideration is the UTC vs. local time distinction: for German sources,
      the mean will shift by approximately one hour in spring (CET to CEST) and one hour
      back in autumn — these are timezone artifacts, not editorial changes. Because hour-of-day
      is a circular quantity (hour 23 is adjacent to hour 0), a simple mean across midnight
      is misleading — the time-series view uses a linear mean for simplicity. For near-midnight
      publishing sources, consult the distribution view instead, which can reveal the bimodal
      nature of cross-midnight distributions.

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

