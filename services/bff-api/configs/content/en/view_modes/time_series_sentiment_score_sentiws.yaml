entityId: time_series_sentiment_score_sentiws
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Sentiment polarity over time. Shows whether the emotional register of published text shifts — toward more positive or negative framing — across the observation window."
    long: >
      This view plots the sentiment score as a time series, revealing how the aggregate emotional
      register of a source's output moves across time. Sustained downward trends may signal
      escalating negative framing around a topic; upward movements may reflect resolution,
      positive reframing, or an editorial shift in subject matter. Sharp single-day movements
      often correlate with major news events. Because sentiment is aggregated at source level,
      this view does not identify which articles drive the pattern — use the distribution or
      article-level views for attribution. This metric is provisional: lexicon-based sentiment
      analysis is a baseline, not a validated measurement.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "5-minute downsampled mean of the SentiWS v2.0 sentiment score (range −1 to +1). Provisional (Tier 3). Known limitations: negation, irony, compound adjectives in German."
    long: >
      The sentiment score in this view is displayed as a 5-minute downsampled time series.
      Uncertainty bands reflect within-bucket variance. The metric is computed by the
      sentiment extractor using the SentiWS v2.0 German lexicon with mean polarity
      aggregation — Tier 3 (provisional) under WP-002 §5. The time-series view is appropriate
      for trend analysis but not for precise event attribution. Critical limitations: (1) SentiWS
      was validated on newspaper text and may not transfer cleanly to institutional press releases
      or government communications; (2) negation (nicht gut → positive-scored word counted as
      positive) is not handled; (3) irony and rhetorical inversion are not detected; (4) the
      mean aggregation is sensitive to outliers in short time windows. Cross-source comparison
      is only valid if both sources use similar linguistic registers (WP-004 §3). This view
      requires interdisciplinary validation before use in published analysis (WP-002 §7).

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

