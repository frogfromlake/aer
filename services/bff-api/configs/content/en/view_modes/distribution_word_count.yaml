entityId: distribution_word_count
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Word count distribution. Shows the full shape of article lengths for a source or probe — revealing whether the source publishes short bulletins, long analyses, or a bimodal mix of both."
    long: >
      The distribution view renders word count as a ridgeline, violin, or density plot —
      showing the full probability mass across article lengths rather than a mean trend.
      A narrow, symmetric distribution indicates a source with a consistent format (e.g.,
      fixed-length agency bulletins). A wide or right-skewed distribution suggests a mix
      of short news items and long features. A bimodal distribution — two distinct peaks —
      points to two structurally different content types coexisting in the same feed (e.g.,
      terse ticker posts and full articles). When comparing sources within a probe, this view
      reveals structural editorial divergence that would be invisible in a time-series average.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "Histogram / density estimate of word-count values within the selected window. Tier 1. Bin count adjustable (default 30). Right-tail truncation recommended for outlier-heavy corpora."
    long: >
      The distribution is computed as a histogram over word-count values in the selected scope
      and time window, with bin count adjustable between 1 and 200 (default 30). The underlying
      metric is Tier 1 deterministic (WP-002 §3). Practical considerations: (1) very long
      articles (> 2000 words) may dominate the right tail, compressing the visual density of
      the main distribution; the UI offers optional right-tail truncation; (2) the optimal bin
      count depends on corpus size — with fewer than 100 articles, fine binning produces noisy
      estimates; (3) probe-scope distributions aggregate all sources and may mask bimodal
      structure visible only at source scope. Use source-scope narrowing to investigate
      per-source shapes.

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

