entityId: time_series_sentiment_score_bert_multilingual
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Multilingual BERT sentiment over time. Shows how the emotional register of published text — read by a transformer model that handles many languages — moves across the observation window."
    long: >
      This view plots sentiment_score_bert_multilingual as a time series, revealing how
      the aggregate emotional register of a source's output moves across time when read
      by a multilingual transformer model. Compared to the lexicon-based time series
      (sentiment_score_sentiws), this score reads each article as a whole — context like
      negation, word order, and irony has at least some chance of being detected. Sustained
      shifts are interpretable as before; sharp single-day movements often correlate with
      major news events. This metric works across many languages, so it is the natural
      time-series view when the active scope spans more than one cultural-linguistic
      frame. Because sentiment is aggregated at source level, the time-series view does
      not identify which articles drive the pattern — use the distribution view for that.
      As a Tier-2 metric this is provisional: reproducible across runs but not yet
      annotation-study calibrated.
  methodological:
    short: "5-minute downsampled mean of cardiffnlp/twitter-xlm-roberta-base-sentiment scalar (P(pos) − P(neg), [-1, +1]). Tier-2 default per ADR-023. Domain-transfer caveat: trained on Twitter, applied to institutional RSS (WP-002 §3.2)."
    long: >
      sentiment_score_bert_multilingual in this view is rendered as a 5-minute downsampled
      time series. Uncertainty bands reflect within-bucket variance. The metric is
      computed by MultilingualBertSentimentExtractor running
      cardiffnlp/twitter-xlm-roberta-base-sentiment, pinned by HuggingFace commit
      revision in the Language Capability Manifest's shared.multilingual_bert block;
      the scalar is P(positive) − P(negative), clipped to [-1, +1]. Tier-2 default
      per ADR-023; the Phase-119 determinism gate guarantees byte-identical outputs
      across consecutive in-process calls under pinned model revision plus
      torch.manual_seed(42), transformers.set_seed(42),
      torch.use_deterministic_algorithms(True). Critical limitations (WP-002 §3.2):
      (1) domain transfer — the model was trained on Twitter, not institutional
      press; gap with the per-language news-domain refinement
      (sentiment_score_bert_de_news for German) is itself the WP-002 signal, not a
      flaw to be averaged out; (2) cross-language calibration drift — comparing
      time-series across two languages requires a metric_equivalence registry
      entry granting a deviation level (ADR-016) before normalisation is permitted
      across cultural-linguistic frames; (3) Tier-2 reproducibility — outputs are
      reproducible across same-process runs, not bit-for-bit deterministic across
      CUDA backends; (4) the mean aggregation is sensitive to outliers in short
      windows — interpret short-window peaks with caution.
