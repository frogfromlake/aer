entityId: distribution_publication_hour
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Publication hour distribution. Shows the full daily rhythm of when a source publishes — peaks, valleys, and whether output is concentrated in specific hours or spread across the clock."
    long: >
      The distribution view for publication hour renders the density of publications across
      the 24-hour clock as a bar chart or density curve. This is typically the most revealing
      view for this metric: while the time-series mean tells you if the average hour shifts,
      the distribution tells you what the source's editorial day looks like in total. For
      institutional sources, expect a narrow peak in working hours (UTC 07–16 for German
      sources, corresponding to local 08–17 CET). For 24-hour news operations, expect a
      flatter multi-modal curve. Multiple sharp peaks often correspond to scheduled bulletin
      times. Note that this view is circular: hour 23 and hour 0 are adjacent, which a
      standard bar chart does not convey. Prefer polar or circular layouts when available.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "Bar chart / density over publication hour (UTC, 0–23). Tier 1. Key caution: bar charts do not show circularity — hour 23 and hour 0 are adjacent. UTC ≠ local time (+1/+2 for Germany)."
    long: >
      The distribution is computed as a simple frequency count over the 24 integer values of
      publication hour (UTC), aggregated across all articles in the selected scope and window.
      Tier 1 deterministic (WP-002 §3). Two interpretive cautions specific to this view:
      (1) publication hour is a circular variable — a standard histogram treats hour 23 and
      hour 0 as maximally distant when they are in fact adjacent; sources that publish around
      midnight will appear split across the two ends of the plot; (2) UTC hours must be
      mentally offset by +1 (CET) or +2 (CEST) to read as German local time. For sources
      with midnight-spanning publication patterns, circular histogram or rose-diagram
      representations better preserve the topology of the 24-hour cycle.

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

