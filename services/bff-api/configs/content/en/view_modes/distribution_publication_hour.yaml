entityId: distribution_publication_hour
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Publication hour distribution. Shows the full daily rhythm of when a source publishes — peaks, valleys, and whether output is concentrated in specific hours or spread across the clock."
    long: >
      The distribution view for publication_hour renders the density of publications across
      the 24-hour clock as a bar chart or density curve. This is typically the most revealing
      view for this metric: while the time-series mean tells you if the average hour shifts,
      the distribution tells you what the source's editorial day looks like in total. For
      institutional sources, expect a narrow peak in working hours (UTC 07–16 for German
      sources, corresponding to local 08–17 CET). For 24-hour news operations, expect a
      flatter multi-modal curve. Multiple sharp peaks often correspond to scheduled bulletin
      times. Note that this view is circular: hour 23 and hour 0 are adjacent, which a
      standard bar chart does not convey. Prefer polar or circular layouts when available.
  methodological:
    short: "Bar chart / density over publication_hour (UTC, 0–23). Tier 1. Key caution: bar charts do not show circularity — hour 23 and hour 0 are adjacent. UTC ≠ local time (+1/+2 for Germany)."
    long: >
      The distribution is computed as a simple frequency count over the 24 integer values of
      publication_hour (UTC), aggregated across all articles in the selected scope and window.
      Tier 1 deterministic (WP-002 §3). Two interpretive cautions specific to this view:
      (1) publication_hour is a circular variable — a standard histogram treats hour 23 and
      hour 0 as maximally distant when they are in fact adjacent; sources that publish around
      midnight will appear split across the two ends of the plot; (2) UTC hours must be
      mentally offset by +1 (CET) or +2 (CEST) to read as German local time. For sources
      with midnight-spanning publication patterns, circular histogram or rose-diagram
      representations better preserve the topology of the 24-hour cycle.
