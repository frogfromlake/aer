entityId: distribution_entity_count
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Named entity density distribution. Shows the full range of how entity-rich articles are — from sparse, abstract pieces to dense, multi-actor reports — and how that range compares across sources."
    long: >
      The distribution view for entity count reveals the structural range of how specifically
      an article references the social world: how many named people, places, and organisations
      appear? A tight, low-value distribution indicates a source producing relatively abstract
      or generic content. A wide right-skewed distribution suggests a mix of brief news items
      and entity-dense reports (parliamentary debates, summit coverage, multi-party negotiations).
      Comparing this distribution across sources within a probe can identify which source
      produces the most referentially specific content — a structurally meaningful difference
      in discourse function. This view complements the network view, which shows how the
      entities relate to each other.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "Histogram / density of per-article entity count from spaCy de_core_news_lg. Provisional (Tier 3). Right-tail truncation recommended; outliers are real (long parliamentary articles)."
    long: >
      The distribution is a histogram of entity-count values per article in the selected
      scope and window. Tier 3 (provisional) under WP-002 §5 — entity counts depend on
      spaCy's German NER model (de_core_news_lg 3.8.0). Interpretation notes: (1) the
      distribution naturally skews right because entity count is bounded below at zero but
      unbounded above; very long articles with many actors produce extreme right-tail values
      (e.g., full parliamentary session transcripts); (2) the mode (most frequent count) is
      typically more interpretively useful than the mean; (3) all NER limitations apply —
      government press release style may systematically undercount organisation entities;
      (4) entity types are merged in this count; for type-stratified distributions, use the
      entity aggregation endpoints directly. Bin count defaults to 30; right-tail truncation
      is recommended for corpora with high-count outliers.

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

