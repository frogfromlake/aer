entityId: howto_revision_activity
entityType: view_mode
locale: en
registers:
  semantic:
    short: "One bar per source: how often published articles were silently re-edited, observed via Internet Archive snapshots."
    long: >
      Silent-edit observability. Each counted revision is a captured change to an already-published
      article — a Wayback (CDX) snapshot whose content differs from the previous capture. A tall bar
      means that source revises heavily after publication; a short one means edits are rare. An empty
      bar is NOT automatically "no edits": a lookup that could not complete (Internet Archive
      unreachable, rate-limited, circuit open) is recorded separately so the gap stays visible rather
      than being read as silence (ADR-036). Read the relative heights across sources, not absolute
      counts — capture frequency varies by how aggressively each site is archived.
  methodological:
    short: "Count of distinct content-changing snapshots in aer_gold.article_revisions over the window, grouped by source; the synchronic Aleph cell collapses the window to one bucket."
    long: >
      Server side: revisions come from Internet Archive CDX (Wayback index) snapshots, collapsed by
      content digest so only a snapshot whose body DIFFERS from the previous capture counts —
      identical re-archivals (the bulk of captures) are discarded. The aggregate groups
      aer_gold.article_revisions by (source, bucket) and is read with FINAL so re-ingested duplicates
      collapse to one. This Aleph cell is synchronic: it collapses the whole active window to a
      single bucket and asks only "which source edits most right now" — the diachronic per-bucket
      reading is the revision_timeline cell over the same endpoint.

      What "edit activity" is, and is NOT. A counted revision is the OBSERVABLE fact that the
      archived body changed between two captures — a silent re-edit of an already-published article.
      It is NOT a count of editorial decisions: one editorial change between captures registers as
      one revision regardless of how many words moved, and several changes BETWEEN two captures are
      invisible (they collapse into the single net diff). Crucially, bar HEIGHT is governed by
      CAPTURE FREQUENCY — how aggressively the Internet Archive crawls each site — at least as much
      as by publisher behaviour. A heavily-archived outlet can show more revisions than a lightly-
      archived one that actually edits more. Read RELATIVE heights with this caveat, never absolute
      counts as an edit rate. An empty/absent bar is NOT coerced to "no edits": a lookup that
      could not complete (Archive unreachable, rate-limited, circuit open) produces no revision row
      and is recorded in the SEPARATE wayback-lookup completeness signal, so "0 revisions" and "we
      could not look" stay distinguishable (ADR-039 disclose-never-coerce). Composition: a single
      grouped query over the scope; no merged/split fan-out.
