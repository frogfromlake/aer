entityId: cooccurrence_network_language_confidence
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Network view is not meaningful for language detection confidence. This metric is a data-quality signal, not a relational actor metric. Use the time-series or distribution view instead."
    long: >
      language_confidence measures how certain the language detector is about an article's
      language — it is a data-quality signal, not a discourse phenomenon. There are no
      entities to place as nodes and no pairs to connect. A network layout for this metric
      would produce an empty graph. To understand language confidence patterns, use the
      distribution view (to see the overall spread of detection certainty) or the time-series
      view (to detect if confidence drops over time, which would signal corpus quality issues).
      Language-conditional analysis — filtering all other metrics to articles where a specific
      language was detected with high confidence — is available as a query filter, not as
      a network cell.

      Composition — composition='merged' computes one entity co-occurrence
      graph over the joint corpus; nodes inherit salience from the union,
      edges weight by co-mention frequency across all selected sources.
      composition='split' renders one graph per source. Cross-language merged
      scope is refused at the BFF (422 cross_language_merge_unsupported)
      because the upstream NER models (spaCy/HanLP) are language-conditioned
      and edge weights would be incommensurable across language partitions;
      split-composition with one language per Cell is the supported way to
      inspect cross-language entity networks.

  methodological:
    short: "Not applicable: language_confidence is a document scalar with no relational structure. Recommended alternatives: time_series_language_confidence, distribution_language_confidence."
    long: >
      language_confidence is the per-document probability output of the langdetect model for
      the primary detected language. It has no entity or pair dimension. The co-occurrence
      network cell cannot be meaningfully populated with this metric; the backend query returns
      an empty result set. This is correct behaviour — language confidence is a metadata
      quality signal about corpus composition, not a variable describing the relational
      structure of discourse actors. Use the distribution view to characterise how well the
      corpus is linguistically resolved, and use language as a filter on other analyses
      rather than as a standalone network metric.

      Composition (Phase 122i / ADR-034) — merged composition runs one entity
      co-occurrence aggregation (POST /entities/cooccurrence/query) over the
      unioned scope (with the 100-source / 25-entity cap per ADR-034). Edge
      weights derive from per-language NER (spaCy de_core_news_lg,
      en_core_web_lg; HanLP for ZH per ADR-024) and ARE comparable within a
      language partition. Cross-language merged scope is refused at the BFF
      (HTTP 422 cross_language_merge_unsupported,
      anchor=ADR-034#cross-language) because NER tag sets and entity
      frequencies are not commensurable across language pipelines. Split
      composition renders one graph per source — appropriate for cross-source
      structural comparison within a single language.

