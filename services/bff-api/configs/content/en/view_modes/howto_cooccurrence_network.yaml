entityId: howto_cooccurrence_network
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Nodes are entities; an edge means two entities were named in the same article. Read clusters as recurring framings, bridge nodes as connectors. A merged scope pools every source — and, on confirmation, every probe — into one whole-discourse map."
    long: >
      A co-occurrence network answers "which actors, places, and concepts are spoken about
      together?". Read tight clusters as recurring framings and bridge nodes as entities that
      link otherwise-separate conversations. A merged scope pools all of its sources — and,
      across probes, the whole selected discourse — into ONE graph, so you see how a topic is
      co-framed across the corpus rather than one source at a time. One lever sets the scale —
      "Entities" — the N most-frequent entities (up to 10000) for a fine-grained map; the
      connection density follows automatically, so the graph stays connected at any breadth (hide
      the lines for a pure entity cloud). Two visual channels are bound independently to the
      graph: node SIZE and node COLOUR. Size can encode total co-occurrence weight, node degree
      (how many distinct partners an entity has), or a per-article metric. Colour can encode the
      detected theme cluster (community), entity type, cross-source presence, the owning PROBE,
      a uniform tone, or a per-article metric. "Source overlay" / "Probe overlay" colour the node
      FILL by source / probe, with a legend naming each, so you can place every node in its origin
      at a glance. Drag nodes to untangle the layout, click one to read its underlying articles.
  methodological:
    short: "Node-first force-directed graph: the top-maxNodes entities by weight (≤10000), each keeping its strongest edges (per-node top-K) so every node stays connected; node size/colour bind to a graph dimension OR a per-article metric mean; cross-language merge is a confirmed, non-identity-merging union."
    long: >
      The note is composed from a per-presentation template plus the live caps and the bound
      size/colour channels. The graph is NODE-FIRST (BFF maxNodes, ≤10000): it is built from the
      top entities by summed co-occurrence weight, and each node keeps its strongest edges
      (PER-NODE top-K, where K tracks the node count) — so EVERY node retains its strongest link
      and the graph stays connected, instead of a flat global edge cap concentrating every line on
      a few hubs and leaving the rest as an isolated central cloud. Connection density therefore
      follows breadth automatically (the single "Entities" lever); the lines can be hidden for a
      pure entity cloud. A sparse graph reflects corpus sparseness, not a conclusion, and is
      flagged below eight nodes. Node SIZE binds to total_count, degree, or
      a per-article metric; node COLOUR binds to community (Louvain), entity type, presence,
      source_overlay (per-source palette), probe_overlay (per-probe fill; a legend names each),
      a uniform tone, or a per-article metric — size and colour may bind to DIFFERENT metrics. A
      per-article metric shows the MEAN over every in-scope article naming the entity (BFF
      nodeMetric / nodeColorMetric); an entity with no such article is a grey "no data" node, never
      a coerced zero (disclose-never-coerce, WP-003 §3.2). Colour carries no intrinsic valence.
      Entities come from per-language NER, so co-mention weights are comparable WITHIN one language.
      A CROSS-LANGUAGE merged scope is no longer hard-refused: it is offered behind an explicit
      user confirmation and renders the union WITHOUT merging node identity across languages — the
      two discourse spheres stay separate and meet only where an actor is spelled identically in
      both (e.g. proper names); differing surface forms ("Frankreich"/"France") stay distinct until
      a future Wikidata-QID merge. Per-article metric channels are not carried on a cross-probe
      merge (cross-cultural metric comparison needs an equivalence grant — ADR-034, WP-004 §3.4).
