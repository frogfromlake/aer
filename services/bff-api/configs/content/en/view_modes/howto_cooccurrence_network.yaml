entityId: howto_cooccurrence_network
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Nodes are entities; an edge means two entities were named in the same article. Read clusters as recurring framings, bridge nodes as connectors."
    long: >
      A co-occurrence network answers "which actors, places, and concepts are spoken about
      together?". Read tight clusters as recurring framings and bridge nodes as entities that
      link otherwise-separate conversations. Two visual channels are bound independently to the
      graph: node SIZE and node COLOUR. Size can encode total co-occurrence weight, node degree
      (how many distinct partners an entity has), or a per-article metric (e.g. how long the
      articles mentioning that entity tend to be). Colour can encode the detected theme cluster
      (community), entity type, cross-source presence, a uniform tone, or a per-article metric
      (e.g. the mean sentiment of the articles that name the entity). When a metric drives a
      channel, a larger or warmer node is a HIGHER mean for that entity — never a count of
      mentions. Drag nodes to untangle the layout, click one to read its underlying articles.
  methodological:
    short: "Top-N entity pairs by co-occurrence weight, force-directed; node size/colour bind to a chosen graph dimension OR a per-article metric mean."
    long: >
      The note is composed from a per-presentation template plus the live top-N cap and the bound
      size/colour channels. Edges are the top-N entity pairs by summed co-occurrence count in the
      window (server-clamped to [1, 6000]; the cell default is 60); a sparse graph reflects corpus
      sparseness, not an analytical conclusion, and is flagged when it collapses below eight nodes.
      Node SIZE binds to total_count (summed co-occurrence weight), degree, or a per-article
      metric; node COLOUR binds to community (Louvain theme cluster), entity type, presence (the
      count of distinct sources an entity appears in), source_overlay (a per-source palette in a
      merged scope), a uniform tone, or a per-article metric — size and colour may bind to
      DIFFERENT metrics. When a per-article metric is bound, the value shown for an entity is the
      MEAN of that metric over every article in scope where the entity appears (BFF nodeMetric /
      nodeColorMetric): node colour = sentiment means "the average sentiment of the articles that
      name this actor"; node size = word count means "those articles' average length". An entity
      with no article carrying the metric reads as a grey "no data" node, never a coerced zero
      (disclose-never-coerce, WP-003 §3.2). Colour carries no intrinsic valence — it is a
      categorical or scaled encoding only. Entities come from per-language NER, so co-mention
      weights are comparable WITHIN one language; a cross-language merged scope is refused at the
      BFF (NER tag sets and frequencies are not commensurable across pipelines) — inspect each
      language in its own split cell (ADR-034, WP-004 §3.4).
