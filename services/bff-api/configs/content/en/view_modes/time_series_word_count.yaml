entityId: time_series_word_count
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Word count over time. Shows how article length evolves across the observation window — useful for spotting shifts in editorial scope or format changes."
    long: >
      This view plots word count as a time series, showing how average article length changes
      across the selected time range and scope. Sustained increases may signal editorial
      expansion or a shift toward long-form reporting; sustained decreases may reflect format
      compression, automation, or resource constraints. Sudden spikes often correspond to
      specific events requiring extended coverage. Compare across sources to identify whether
      length patterns are probe-wide (structural) or source-specific (editorial).

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "5-minute downsampled mean of word count. Tier 1 — no known limitations for German RSS. Uncertainty bands show sample variance within each bucket."
    long: >
      The time-series view applies 5-minute bucket downsampling to word-count values, plotting
      the mean per bucket. Uncertainty bands reflect variance within each bucket. Word count
      is a Tier 1 deterministic metric (WP-002 §3); temporal patterns in the series are
      structurally reliable for well-stamped RSS sources. The primary interpretive caveat:
      word count measures length, not depth — a longer article is not necessarily more
      informative. Cross-source comparison assumes that all sources produce content in languages
      where whitespace tokenization is appropriate (see metric entry for the agglutinative
      language caveat). For Probe 0 (German institutional RSS), no active limitations apply.

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

