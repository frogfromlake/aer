entityId: distribution_sentiment_score_bert_multilingual
entityType: view_mode
locale: en
registers:
  semantic:
    short: "Multilingual BERT sentiment distribution. Shows the spread of polarity values assigned by a multilingual transformer model across all articles in the window."
    long: >
      The distribution view for the multilingual BERT sentiment score renders the full
      spread of polarity values produced by the multilingual transformer model across
      all articles in the selected scope and window. As with the lexicon distribution,
      this is often more informative than a mean: a source with a mean near zero may
      produce uniformly neutral content or alternate between strongly positive and
      strongly negative articles that cancel out. The distribution reveals which case
      applies. Compared to the lexicon distribution (the SentiWS sentiment score), this
      view has access to whole-article context and is therefore expected to spread
      slightly wider — the model can detect irony or negation that the lexicon misses.
      The shape difference between the two distributions is itself worth inspecting
      under the methodology tray.

      Composition — when the Panel composes more than one source under
      composition='merged', this view renders ONE chart over the unioned
      corpus (BFF query ?sourceIds=a,b,...); under composition='split' the
      same source-set fans out into one chart per source, side-by-side under
      split-direction='horizontal' or stacked under 'vertical'. The merged
      reading is appropriate when the analytical question is about the union
      (e.g. 'what does the institutional press collectively show?'); the split
      reading is appropriate when source-level distinction is the question.
      Cross-language merged scope is permitted in Aleph and surfaces a soft
      methodology banner (WP-004 §3.4) rather than a refusal.

  methodological:
    short: "Histogram / density of cardiffnlp/twitter-xlm-roberta-base-sentiment scalar (range [-1, +1]). Tier-2 default per ADR-023. Tail shape is the meaningful signal; do not compare absolute shapes across languages without a metric_equivalence entry (WP-004 §3)."
    long: >
      The distribution is a histogram over the multilingual BERT sentiment score values
      (multilingual XLM-RoBERTa, P(positive) − P(negative), [-1, +1]) for the
      selected scope and window. Tier-2 default per ADR-023. Interpretive notes:
      (1) for institutional editorial sources, the distribution is expected to be
      tightly peaked near zero — this reflects the institutional register, not a
      model limitation; (2) the meaningful signal is in the tail shape and any
      secondary peaks; (3) all multilingual-BERT limitations apply equally to
      distributional shape — domain transfer (Twitter training, institutional
      application), cross-language calibration drift, Tier-2 same-process
      reproducibility (WP-002 §3.2); (4) bin count defaults to 30 across
      [-1, +1]; with a narrow distribution, reducing bin count improves
      readability. Cross-cultural comparison of absolute distribution shapes is
      gated: when the active scope spans more than one detected language, the BFF
      requires a metric_equivalence registry entry (ADR-016) granting a deviation
      level before normalisation across language frames is permitted (WP-004 §3).

      Composition (Phase 122i / ADR-034) — for composition='merged' the
      handler executes a single BFF call with the unioned sourceIds and the
      Cell renders one chart; for 'split' the Cell fans out one query per
      source and renders one chart per source. Split-direction is a
      presentation toggle (horizontal raster vs vertical stack) and does not
      affect the query shape. Cross-language merged scope is NOT refused in
      Aleph — the MethodologyBanner primitive renders a soft
      cross-frame-comparability note (WP-004 §3.4) when composition='merged'
      AND sources.length > 1, because Aleph metrics (lexicon-based polarity,
      structural counts) are language-agnostic enough that aggregation is
      meaningful with caveats. The asymmetry against Episteme/Rhizome (which
      DO refuse) is intentional and documented in WP-005 §6.2 §8b.

