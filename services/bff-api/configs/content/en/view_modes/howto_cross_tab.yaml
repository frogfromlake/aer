entityId: howto_cross_tab
entityType: view_mode
locale: en
registers:
  semantic:
    short: "A metric broken down by a metadata category — each bar is one category, its length/colour the mean of the metric among those articles."
    long: >
      A cross-tab answers "does this metric differ by category?" — e.g. is sentiment more positive
      in one section than another, or are some authors' articles longer. The view binds two things:
      a categorical group-by FIELD (the metadata field whose values become the bars — section,
      author, article_type, and so on) and a numeric METRIC that is averaged within each category.
      Each bar is one value of the field; its length and colour show the MEAN of the metric over
      the articles in that category, and the hover gives the distinct-article count and spread.
      Read a short bar built on few articles with care — a small sample is a noisy mean, and a
      single outlier can swing it. Categories with many more articles carry the more trustworthy
      means.
  methodological:
    short: "Per-category mean of a numeric metric, from a JOIN of article_metadata (the field) × metrics (the metric) on article_id; top-N by article count."
    long: >
      The server joins aer_gold.article_metadata (the categorical field, arrayJoin-expanded for
      list-valued fields, read FINAL for exact distinct-article counts) with aer_gold.metrics (the
      numeric metric, pivoted per article) on article_id, then per category value computes the
      distinct-article count and the metric's mean and sample standard deviation. The category
      field is the group-by axis; the metric is the value averaged inside each group — the same
      field can be the axis in one cell and an aggregated metric in another. Categories are ranked
      by article count and capped at the top-N; the full distinct-value count is disclosed so the
      truncation is never silent. A category where no article carries the metric is absent, never a
      coerced zero (disclose-never-coerce, WP-003 §3.2); for a list-valued field an article may
      appear under several categories, so the per-category counts can sum to more than the corpus
      size. A cross-frame (multi-language) request requires the metric's validated equivalence
      grant, and category labels rarely align across publishers' taxonomies; absent that grant, the
      cell refuses with a Level-1 alternative rather than averaging non-comparable scales (WP-004
      §5.2, §3.4).
