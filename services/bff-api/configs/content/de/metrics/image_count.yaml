entityId: image_count
entityType: metric
locale: de
displayLabel: "Bild-Anzahl"
registers:
  semantic:
    short: "Wie viele Bilder ein Herausgeber für einen Artikel in seinen strukturierten Metadaten deklariert. Ein Näherungswert für visuelle Dichte, keine Zählung jedes Bildes auf der Seite."
    long: >
      Die Bildzahl ist die Anzahl der Bilder, die der Herausgeber in den
      strukturierten Metadaten eines Artikels ausweist. Es ist ein grober
      Näherungswert dafür, wie stark eine Berichterstattung visuell aufbereitet
      ist — eine fotogeführte Reportage gegenüber einer reinen Textmeldung — und
      seine Verteilung über Quellen und Zeit kann Unterschiede in Format und
      Präsentationsaufwand zeigen. Eine behördliche Meldung mit einem einzigen
      Emblem liest sich anders als eine Nachrichtenreportage mit Bildergalerie.

      Zu lesen als Untergrenze, nicht als Vollerhebung: gezählt werden die Bilder,
      die ein Herausgeber in maschinenlesbaren Metadaten deklariert (typischerweise
      das Aufmacher- und Social-Share-Bild), nicht jede Abbildung im Artikeltext.
      Eine Quelle, die keine Bild-Metadaten deklariert, wird für dieses Feld als
      Negative Space gezeigt — sie wird nicht als „null Bilder" erfasst.
  methodological:
    short: "Kardinalität der strukturierten schema.org-image[]-Liste. Tier 1 (deterministisch). Abwesend, wenn der Herausgeber keine Bild-Metadaten deklariert — Negative Space, nie zu 0 umgedeutet."
    long: >
      Die Bildzahl ist die Anzahl der Einträge in den strukturierten Bild-Metadaten
      des Artikels (schema.org image[]), vom WebAdapter an der Silver-Grenze
      extrahiert und vom Processor zu einem Gold-metric_name befördert
      (Phase 133). Es ist ein deterministisches Tier-1-Maß (kein Modell, keine
      Statistik). Validierungsstatus: unvalidated (Engineering-Default).

      Zwei Grenzen rahmen die Interpretation. Erstens der Umfang: gezählt werden
      nur die in den strukturierten Metadaten vorhandenen Bilder, nicht jedes
      <img> im gerenderten DOM — die strukturierte Menge ist meist eine kleine
      kuratierte Teilmenge, daher unterschätzt die Metrik die tatsächliche
      Bilddichte. Zweitens disclose-never-coerce (WP-003 §3.2): eine Quelle, die
      keine strukturierten Bild-Metadaten ausgibt, ist für die Bildzahl strukturell
      abwesend (als Negative Space gezeigt, im Picker für diesen Bereich nicht
      angeboten) und wird NIE als null erfasst. Ein extrahierter Artikel, der
      tatsächlich eine leere Bildliste deklariert, zählt als 0 — das ist eine
      echte Messung, verschieden von Abwesenheit.

      Komposition — die Bildzahl ist eine extensive Zählung, daher summiert ein
      zusammengeführter Mehrquellen-Bereich legitim über den vereinigten Korpus
      (kein kontextübergreifendes Ranking); die geteilte Komposition zeigt pro
      Quelle.
