entityId: publication_weekday
entityType: metric
locale: de
displayLabel: "Veröffentlichungswochentag"
registers:
  semantic:
    short: "Der ISO-Wochentag (1 = Montag, 7 = Sonntag) der Artikelveröffentlichung. Zeigt wöchentliche Redaktionszyklen, Werktag-vs-Wochenend-Muster und institutionelle Arbeitsrhythmen."
    long: >
      publication_weekday ist die Wochentags-Komponente des Veröffentlichungszeitstempels
      eines Artikels nach ISO 8601-Nummerierung (1 = Montag, 7 = Sonntag). Als Verteilung
      dargestellt, offenbart sie den wöchentlichen redaktionellen Herzschlag einer Quelle.
      Quellen, die in institutionellen Arbeitskulturen verankert sind (Regierung, öffentlich-
      rechtlicher Rundfunk), zeigen typischerweise steile Montag–Freitag-Konzentrationen und
      deutliche Wochenendeinbrüche; Dauerredaktionen flachen diese Kurve ab; rein automatisierte
      Quellen erzeugen gleichmäßige Verteilungen. Das Wochentags-Muster steht in Wechselwirkung
      mit publication_hour: Eine Quelle, die stark an Werktagen in den Morgenstunden
      veröffentlicht, wird fast sicher durch institutionelle Zeitplanung gesteuert, nicht durch
      den Nachrichtenzyklus selbst. Die Metrik misst keine Nachrichtenwürdigkeit oder
      redaktionelles Urteil — sie misst die Strukturbedingungen, unter denen Inhalte produziert
      werden.

      Komposition — wenn ein Werkbank-Panel mehr als eine Quelle unter
      composition='merged' bündelt, aggregiert diese Metrik als
      modus-ausgerichtete Wochentagsverteilung über den vereinigten Korpus.
      Sentiment-Metriken erben die Empfindlichkeit des Merged-Mittelwerts
      gegenüber Ungleich-verteilung im Quell-Mix: eine einzelne volumenstarke
      Quelle kann den Aggregatwert dominieren. Split-Komposition (eine Zelle
      pro Quelle) ist angemessen, wenn Quellen-Unterschiede die Frage sind.
      Die merged-Lesart ist über Sprachen mit weichem Methodik-hinweis erlaubt
      (Aleph) oder verweigert (Episteme, Rhizome) — siehe den jeweiligen
      View-Mode-Eintrag für das genaue Verhalten.

  methodological:
    short: "ISO-Wochentag aus Silver-Layer-Zeitstempel extrahiert. Tier 1 (deterministisch). Hinweis: UTC-Datumsgrenze kann den scheinbaren Wochentag bei Spätveröffentlichungen um einen Tag verschieben."
    long: >
      publication_weekday wird aus demselben Silver-Layer-Zeitstempel wie publication_hour
      berechnet: der ISO-Wochentag des UTC-Datums der Veröffentlichung. Die Extraktion ist
      zustandslos und deterministisch — Tier 1 gemäß WP-002 §3. Methodologische Vorbehalte:
      (1) Da die Datumsgrenze in UTC berechnet wird, erscheint ein um 23:30 Uhr MEZ
      veröffentlichter deutscher Artikel als 22:30 UTC und wird dem UTC-Wochentag zugeordnet,
      der vom lokalen Wochentag abweichen kann. Für die meisten redaktionellen Muster ist
      dieser Offset vernachlässigbar; bei Analysen, die sich speziell auf Montagmorgen- oder
      Sonntagabend-Veröffentlichungen konzentrieren, verdient er Beachtung. (2) Der Zeitstempel
      gibt die RSS-Veröffentlichungszeit an, nicht Ereignis- oder Verfassungszeit — siehe
      publication_hour für eine vollständige Diskussion dieses Vorbehalts. (3) Bei Sonde-0-
      Quellen sind Zeitstempel maschinengeneriert und zuverlässig. Validierungsstatus: nicht
      validiert (keine bekannten aktiven Einschränkungen für Sonde 0).

      Komposition (Phase 122i / ADR-034) — mehrquellige merged-Abfragen
      aggregieren als modus-ausgerichtete Wochentagsverteilung über die
      vereinigte Artikelmenge; die BFF akzeptiert ?sourceIds=a,b,... und
      vereinigt serverseitig. Äquivalenz-Gates (WP-004 §3) gelten weiterhin,
      wenn die Merge heterogene Quellklassen umfasst — das Gate bewertet auf
      dem aufgelösten Geltungsbereich vor der Aggregation. Split-Komposition
      ist die Pro-Quelle-Auffächerung; die Metrik-Definition bleibt pro Zelle
      unverändert. Mehrsprachige merged-Bereiche werden auf der
      View-Mode-Handler-Ebene gesteuert: Aleph-View-Modes für diese Metrik
      rendern den weichen MethodologyBanner; Episteme-/Rhizome-View-Modes (wo
      anwendbar) verweigern mit HTTP 422 cross_language_merge_unsupported
      (ADR-034 §3).

