entityId: word_count
entityType: metric
locale: de
registers:
  semantic:
    short: "Die Anzahl der Wörter in einem Artikel, gezählt als Leerzeichen-getrennte Tokens. Ein Näherungswert für Artikellänge und redaktionellen Umfang."
    long: >
      Die Wortanzahl ist die einfachste quantitative Eigenschaft eines Textes: Wie viele
      durch Leerzeichen getrennte Tokens enthält er? In AĒR fungiert sie als Näherungswert
      für redaktionellen Umfang — längere Artikel beinhalten typischerweise ausführlichere
      Berichterstattung, mehr kontextuelles Framing oder eine breitere thematische Abdeckung.
      Muster in der Wortanzahl über Quellen und Zeit hinweg können Veränderungen in
      redaktionellen Formaten, Ressourcenbeschränkungen oder Kommunikationsnormen signalisieren.
      AĒR zählt rohe Tokens ohne Lemmatisierung oder sprachspezifische Segmentierung. Die
      Metrik wird auf cleaned_text berechnet, aus dem strukturelle Auszeichnungen entfernt
      wurden, ohne linguistische Normalisierung.

      Komposition — wenn ein Werkbank-Panel mehr als eine Quelle unter
      composition='merged' bündelt, aggregiert diese Metrik als mittlere
      Wortzahl pro Artikel über den vereinigten Korpus. Sentiment-Metriken
      erben die Empfindlichkeit des Merged-Mittelwerts gegenüber
      Ungleich-verteilung im Quell-Mix: eine einzelne volumenstarke Quelle
      kann den Aggregatwert dominieren. Split-Komposition (eine Zelle pro
      Quelle) ist angemessen, wenn Quellen-Unterschiede die Frage sind. Die
      merged-Lesart ist über Sprachen mit weichem Methodik-hinweis erlaubt
      (Aleph) oder verweigert (Episteme, Rhizome) — siehe den jeweiligen
      View-Mode-Eintrag für das genaue Verhalten.

  methodological:
    short: "Leerzeichen-Tokenisierung auf cleaned_text. Tier 1 (deterministisch). Bekannte Einschränkung: Unterschätzung bei agglutinierenden und logografischen Sprachen."
    long: >
      word_count wird berechnet, indem cleaned_text an Unicode-Leerzeichen aufgeteilt und
      die resultierenden Tokens gezählt werden. Der Extraktor ist zustandslos und liefert
      für identische Eingaben identische Ausgaben — Tier-1-Metrik gemäß WP-002 §3. Die
      primäre methodische Einschränkung: Leerzeichen-Tokenisierung ist ungeeignet für
      agglutinierende Sprachen (Türkisch, Finnisch) und logografische Schriftsysteme (Chinesisch,
      Japanisch, Koreanisch). Für den Probe-0-Korpus (deutschsprachige institutionelle RSS-Feeds)
      ist diese Einschränkung latent, aber nicht aktiv: Deutsch verwendet Leerzeichen konsistent,
      und Komposita werden als einzelne Tokens gezählt (Bundesregierung = 1 Token). Extraktor:
      word-count-v1. Validierungsstatus: nicht validiert.

      Komposition (Phase 122i / ADR-034) — mehrquellige merged-Abfragen
      aggregieren als mittlere Wortzahl pro Artikel über die vereinigte
      Artikelmenge; die BFF akzeptiert ?sourceIds=a,b,... und vereinigt
      serverseitig. Äquivalenz-Gates (WP-004 §3) gelten weiterhin, wenn die
      Merge heterogene Quellklassen umfasst — das Gate bewertet auf dem
      aufgelösten Geltungsbereich vor der Aggregation. Split-Komposition ist
      die Pro-Quelle-Auffächerung; die Metrik-Definition bleibt pro Zelle
      unverändert. Mehrsprachige merged-Bereiche werden auf der
      View-Mode-Handler-Ebene gesteuert: Aleph-View-Modes für diese Metrik
      rendern den weichen MethodologyBanner; Episteme-/Rhizome-View-Modes (wo
      anwendbar) verweigern mit HTTP 422 cross_language_merge_unsupported
      (ADR-034 §3).

