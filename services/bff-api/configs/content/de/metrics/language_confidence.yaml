entityId: language_confidence
entityType: metric
locale: de
displayLabel: "Sprach-Konfidenz"
registers:
  semantic:
    short: "Die Wahrscheinlichkeit (0–1), dass die Sprache des Artikels korrekt erkannt wurde. Hohe Werte zeigen zuverlässige Erkennung; niedrige Werte signalisieren Mehrdeutigkeit."
    long: >
      Die Spracherkennungskonfidenz misst, wie sicher AĒR bei der Sprachidentifikation eines
      Artikels ist. Ein Wert nahe 1,0 bedeutet hohe Konfidenz — das Vokabular ist eindeutig
      genug für eine zuverlässige Identifikation. Werte unter 0,7 deuten auf Mehrdeutigkeit
      hin: der Text könnte sehr kurz sein, mehrere Sprachen mischen (Code-Switching) oder
      vorwiegend aus Eigennamen und Abkürzungen bestehen. Die erkannte Sprache wird immer
      zusammen mit der Konfidenz angegeben; beide Werte sollten gemeinsam gelesen werden.
      Niedrige Konfidenz ist kein Fehler — sie ist ein Signal, dass die Sprachannotation
      unzuverlässig sein könnte und nachgelagerte Analysen (z. B. sprachspezifische Metriken
      wie Sentiment) entsprechend vorsichtig interpretiert werden sollten.

      Komposition — wenn ein Werkbank-Panel mehr als eine Quelle unter
      composition='merged' bündelt, aggregiert diese Metrik als mittlere
      Erkennungskonfidenz (0..1) über den vereinigten Korpus. Der
      Merged-Mittelwert erbt eine Empfindlichkeit gegenüber Ungleichgewicht
      im Quell-Mix: eine einzelne volumenstarke Quelle kann den Aggregatwert
      dominieren. Split-Komposition (eine Zelle
      pro Quelle) ist angemessen, wenn Quellen-Unterschiede die Frage sind.
      Die merged-Lesart ist über Sprachen mit weichem Methodikhinweis erlaubt
      (Aleph) oder verweigert (Episteme, Rhizome) — siehe den jeweiligen
      View-Mode-Eintrag für das genaue Verhalten.

  methodological:
    short: "langdetect v1.0.9 Top-Kandidaten-Wahrscheinlichkeit, fixer Seed. Tier 1 (deterministisch). Verschlechtert sich bei Texten unter ~200 Zeichen. WP-002 §3."
    long: >
      Die Sprach-Konfidenz ist die höchste Posterior-Wahrscheinlichkeit, die langdetect v1.0.9
      dem erstplatzierten Sprachkandidaten zuweist. langdetect verwendet Zeichen-n-Gramm-Profile
      und einen Naive-Bayes-Klassifikator, trainiert auf Wikipedia-Texten in 55 Sprachen. Der
      Extraktor fixiert den Zufallsseed auf 0, um identische Ausgaben für identische Eingaben
      sicherzustellen. Tier-1-Metrik gemäß WP-002 §3. Drei dokumentierte Einschränkungen:
      (1) Kurztext-Degradation — Texte unter ca. 200 Zeichen liefern unzuverlässige
      Wahrscheinlichkeitswerte; AĒR wendet kein Mindestlängen-Gate an; (2) Code-Switching-
      Blindheit — der Klassifikator gibt eine einzige Top-Sprache zurück und kann mehrsprachige
      Passagen nicht identifizieren; (3) der fixe Seed gewährleistet Reproduzierbarkeit,
      kann aber bei ambigen Eingaben künstlich hohe Konfidenz erzeugen. Extraktor:
      langdetect-1.0.9. Validierungsstatus: nicht validiert.
      Hinweis zu `language_variety` (Phase 116; ADR-024 Addendum): die Spalte
      `aer_gold.language_detections.language_variety` enthält eine grobe, aus der
      RSS-Feed-URL-TLD abgeleitete Source-Locale-Markierung (`de-AT` / `de-CH` / `de-DE`
      für deutsche Texte, ansonsten leer). Sie wird ausschließlich für die
      Silver-Provenance-Prüfung aufbewahrt und nicht im Dashboard angezeigt — es handelt
      sich nicht um einen Dialektklassifikator (WP-002 §3.4).

      Komposition (Phase 122i / ADR-034) — mehrquellige merged-Abfragen
      aggregieren als mittlere Erkennungskonfidenz (0..1) über die vereinigte
      Artikelmenge; die BFF akzeptiert ?sourceIds=a,b,... und vereinigt
      serverseitig. Äquivalenz-Gates (WP-004 §3) gelten weiterhin, wenn die
      Merge heterogene Quellklassen umfasst — das Gate bewertet auf dem
      aufgelösten Geltungsbereich vor der Aggregation. Split-Komposition ist
      die Pro-Quelle-Auffächerung; die Metrik-Definition bleibt pro Zelle
      unverändert. Mehrsprachige merged-Bereiche werden auf der
      View-Mode-Handler-Ebene gesteuert: Aleph-View-Modes für diese Metrik
      rendern den weichen MethodologyBanner; Episteme-/Rhizome-View-Modes (wo
      anwendbar) verweigern mit HTTP 422 cross_language_merge_unsupported
      (ADR-034 §3).

