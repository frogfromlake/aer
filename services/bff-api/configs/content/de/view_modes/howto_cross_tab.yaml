entityId: howto_cross_tab
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Eine Kennzahl, aufgeschlüsselt nach einer Metadaten-Kategorie — jeder Balken ist eine Kategorie, seine Länge/Farbe der Mittelwert der Kennzahl in diesen Artikeln."
    long: >
      Eine Kreuztabelle beantwortet „unterscheidet sich diese Kennzahl nach Kategorie?" — etwa ob die
      Stimmung in einem Ressort positiver ist als in einem anderen, oder ob die Artikel mancher
      Autoren länger sind. Jeder Balken ist ein Wert des gewählten Metadaten-Feldes; er zeigt den
      Mittelwert der gewählten Kennzahl über die Artikel dieser Kategorie, der Hover nennt Artikelzahl
      und Streuung. Lies einen kurzen Balken aus wenigen Artikeln vorsichtig — eine kleine Stichprobe
      ist ein verrauschter Mittelwert.
  methodological:
    short: "Mittelwert je Kategorie aus einem JOIN von article_metadata (das Feld) × metrics (die Kennzahl) über article_id; Top-N nach Artikelzahl."
    long: >
      Der Server verknüpft aer_gold.article_metadata (das kategorische Feld, via arrayJoin entfaltet,
      FINAL für exakte Distinct-Artikel-Zählung) mit aer_gold.metrics (die numerische Kennzahl, je
      Artikel pivotiert) über article_id und berechnet je Kategoriewert die Distinct-Artikel-Zahl
      sowie Mittelwert und Stichproben-Standardabweichung der Kennzahl. Kategorien werden nach
      Artikelzahl sortiert und bei Top-N gekappt; die Gesamtzahl distinkter Werte wird offengelegt,
      sodass die Kürzung nie stillschweigend erfolgt. Eine Kategorie, in der kein Artikel die Kennzahl
      trägt, fehlt — nie eine erzwungene Null (WP-003 §3.2). Bei einem Listen-Feld kann ein Artikel
      unter mehreren Kategorien erscheinen. Eine bereichsübergreifende (mehrsprachige) Anfrage
      erfordert die validierte Äquivalenz-Freigabe der Kennzahl; fehlt sie, verweigert die Zelle mit
      einer Level-1-Alternative (WP-004 §5.2).
