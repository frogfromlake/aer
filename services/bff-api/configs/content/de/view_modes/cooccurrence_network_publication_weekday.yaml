entityId: cooccurrence_network_publication_weekday
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Die Netzwerkansicht ist für Veröffentlichungswochentage nicht sinnvoll. Wochentag ist eine Planungseigenschaft, keine relationale Akteursdimension. Für die Verteilungsansicht optieren, um das vollständige wöchentliche Veröffentlichungsmuster zu sehen."
    long: >
      publication_weekday beschreibt, an welchem Wochentag Artikel veröffentlicht werden —
      ein strukturelles Planungsattribut von Dokumenten, keine Eigenschaft benannter Entitäten
      oder der Beziehungen zwischen ihnen. Es gibt keine Akteure als Knoten und keine
      Co-Occurrence-Paare als Kanten. Die aussagekräftigen Ansichten für diese Metrik sind
      die Verteilung (das wöchentliche Veröffentlichungsmuster) und die Zeitreihe (ob sich
      dieses Muster über einen ausgedehnten Beobachtungszeitraum verschiebt). Der Wochentag
      kann als Filter in Entitätsnetzwerkanalysen verwendet werden — z. B. Vergleich von
      Co-Occurrence-Netzwerken aus Werktags- vs. Wochenend-Artikeln — aber die Metrik selbst
      treibt keine Netzwerkstruktur an.

      Komposition — composition='merged' berechnet einen
      Entitäts-Ko-Vorkommen-Graphen über den gemeinsamen Korpus; Knoten erben
      Salienz aus der Vereinigung, Kantengewichte ergeben sich aus der
      gemeinsamen Erwähnungshäufigkeit über alle gewählten Quellen.
      composition='split' rendert einen Graphen pro Quelle. Mehrsprachige
      merged-Bereiche werden in der BFF verweigert (422
      cross_language_merge_unsupported), weil die zugrunde-liegenden
      NER-Modelle (spaCy/HanLP) sprachgebunden sind und Kantengewichte über
      Sprach-Partitionen nicht vergleichbar wären; Split-Komposition mit einer
      Sprache pro Zelle ist der unterstützte Weg, mehrsprachige
      Entitätsnetzwerke zu inspizieren.

  methodological:
    short: "Nicht anwendbar: publication_weekday ist ein Dokument-Zeitstempel-Attribut ohne relationale Struktur. Empfohlene Alternativen: distribution_publication_weekday, time_series_publication_weekday."
    long: >
      publication_weekday ist eine ganze Zahl (1–7, ISO 8601), aus einem Dokumentzeitstempel
      extrahiert. Sie hat keine Entitätsdimension und keine Paarstruktur. Die Co-Occurrence-
      Netzwerkzelle kann mit dieser Metrik nicht befüllt werden; das Backend gibt entwurfsbedingt
      ein leeres Ergebnis zurück. Zeitliche Stratifikation nach Wochentag ist als Filterparameter
      in der Entitäts-Co-Occurrence-Netzwerkabfrage verfügbar (entity_count als Metrik
      auswählen, dann nach publication_weekday-Bereich filtern), aber das Wochentag-Attribut
      selbst kann die Netzwerktopologie nicht antreiben.

      Komposition (Phase 122i / ADR-034) — merged-Komposition führt eine
      Entitäts-Ko-Vorkommen-Aggregation (POST /entities/cooccurrence/query)
      über den vereinigten Geltungsbereich aus (mit den
      100-Quellen-/25-Entitäten-Caps gemäß ADR-034). Kantengewichte leiten
      sich aus sprach-spezifischem NER ab (spaCy de_core_news_lg,
      en_core_web_lg; HanLP für ZH gemäß ADR-024) und SIND innerhalb einer
      Sprach-Partition vergleichbar. Mehrsprachige merged-Bereiche werden in
      der BFF verweigert (HTTP 422 cross_language_merge_unsupported,
      anchor=ADR-034#cross-language), weil NER-Tag-Mengen und
      Entitäts-Frequenzen über Sprach-Pipelines hinweg nicht kommensurabel
      sind. Split-Komposition rendert einen Graphen pro Quelle — geeignet für
      strukturellen Quell-Vergleich innerhalb einer Sprache.

