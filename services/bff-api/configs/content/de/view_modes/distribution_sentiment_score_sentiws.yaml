entityId: distribution_sentiment_score_sentiws
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Sentimentscore-Verteilung. Zeigt die Streuung des emotionalen Registers über alle Artikel im Fenster — ob der Output gleichmäßig neutral ist, negativ tendiert oder zwischen positiver und negativer Rahmung gespalten ist."
    long: >
      Die Verteilungsansicht für den Stimmungswert stellt die vollständige Streuung der
      Polaritätswerte über alle Artikel im ausgewählten Geltungsbereich und Fenster dar.
      Dies ist oft aussagekräftiger als ein Zeitreihenmittelwert: Eine Quelle mit einem
      Mittelwert nahe null könnte fast ausschließlich neutrale Inhalte produzieren oder
      aber zwischen scharf positiven und scharf negativen Artikeln wechseln, die sich im
      Mittelwert aufheben. Die Verteilung offenbart, welcher Fall vorliegt. Eine scharfe
      Spitze nahe null ist das typische Profil institutioneller Quellen (Regierungskommunikation
      tendiert zu neutraler Rahmung); eine linksschiefe Verteilung (Masse bei negativen
      Werten) kann auf Krisenberichterstattung oder anhaltende kritische Berichterstattung
      hinweisen.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "Histogramm / Dichte der Werte des Stimmungswerts (Bereich −1 bis +1). Vorläufig (Tier 3). Werte clustern nahe null für institutionelle deutsche Quellen; die Tail-Form ist das aussagekräftige Signal."
    long: >
      Die Verteilung ist ein Histogramm über die Werte des Stimmungswerts (SentiWS v2.0,
      Mittelwert-Polaritätenaggregation, Bereich −1 bis +1) für den ausgewählten
      Geltungsbereich und Zeitraum. Tier 3 (vorläufig) gemäß WP-002 §5.
      Interpretationshinweise: (1) für deutsche institutionelle RSS-Quellen wird die
      Verteilung erwartungsgemäß eng um null gepeakt — dies ist kein Mangel, sondern ein
      Merkmal des institutionellen Registers; (2) das aussagekräftige Signal liegt in der
      Tail-Form und etwaigen Nebengipfeln, nicht im genauen Mittelwert; (3) alle
      Sentiment-Einschränkungen (Negation, Ironie, Genretransfer — siehe Metrik-Eintrag)
      gelten gleichermaßen für die Verteilungsform; (4) die Bin-Anzahl hat standardmäßig 30
      über den Bereich −1 bis +1; bei enger Verteilung verbessert eine Reduktion der
      Bin-Anzahl die Lesbarkeit. Absolute Verteilungsformen quellenübergreifend ohne
      WP-004 §3-Äquivalenzprüfung nicht vergleichen.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

