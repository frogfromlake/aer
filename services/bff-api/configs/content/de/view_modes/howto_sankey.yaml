entityId: howto_sankey
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Artikel-Flüsse zwischen Kategorien über eine geordnete Kette von Metadaten-Feldern — wo sich der Korpus bündelt, aufteilt und zusammenführt."
    long: >
      Ein Sankey (Alluvial) zeigt, wie sich Artikel über mehrere kategoriale Felder zugleich
      verteilen. Jede Spalte ist ein Feld; jedes Band ist ein Fluss von Artikeln aus einer Kategorie
      der einen Spalte in eine Kategorie der nächsten. Dicke Bänder zeigen, wo sich der Korpus
      bündelt; ein Auffächern zeigt eine Kategorie, die sich über viele der nächsten verteilt; ein
      Zusammenlaufen zeigt viele Kategorien, die in eine münden. Von links nach rechts gelesen wird
      der Korpus wiederholt neu gruppiert.
  methodological:
    short: "Distinct-Artikel-Flüsse zwischen aufeinanderfolgenden Feld-Paaren, aus article_id-Selfjoins auf aer_gold.article_metadata (FINAL); Top-N=30 Kanten je Paar, Kette auf 8 Spalten gedeckelt."
    long: >
      Serverseitig: Für jedes BENACHBARTE Feld-Paar der geordneten Kette verknüpft die BFF
      (GET /metadata/sankey) aer_gold.article_metadata über article_id mit sich selbst — beide
      Seiten mit FINAL gelesen, sodass re-ingestierte Duplikate kollabieren und die Zählung exakt
      distinkte Artikel ergibt — und zählt distinkte Artikel je (Wert, Wert)-Paar. Verknüpft werden
      nur Nachbarspalten; der Sankey zeigt paarweise Übergänge, nie eine vollständige N-fache
      Partition des Korpus.

      Quantitative Grenzen. (1) Je Paar bleiben nur die TOP-N-Kanten (N=30); der lange Schwanz wird
      verworfen, damit kein Graph aus haarfeinen Bändern entsteht. Die Kürzung wird hier offengelegt,
      und die verworfenen Flüsse bleiben über Hover und CSV-/JSON-Export erreichbar — sie werden NIE
      in ein sichtbares Band zurücksummiert, was irreführen würde. (2) Die Feld-Kette ist hart auf
      8 Spalten gedeckelt; eine längere Kette wird vorgelagert abgelehnt. (3) Ein LISTEN-Feld (Tags,
      Kategorien) kann einen Artikel zugleich unter mehrere Werte setzen, sodass derselbe Artikel auf
      mehreren Bändern dieser Spalte gezählt wird. Bandbreiten sind daher Artikel-FLUSS-Gewichte,
      keine strikte Partition, und die Spaltensumme kann die Korpusgröße übersteigen. Lies ein dickes
      Band als „viele Artikel-Platzierungen", nicht als „dieser Anteil aller Artikel". (4) Eine
      Knoten-Beschriftung erscheint nur, wenn das Band die Höhenschwelle überschreitet; dünnere
      Knoten sind nur per Hover sichtbar — eine dünn besetzte Spalte kann also leerer wirken, als sie ist.

      Komposition (ADR-034). Der Sankey ist eine einzelne, relationale Sicht; er fächert sich nicht
      in ein merged/split-Layout je Quelle auf — die Kette selbst ist die Struktur. Nur Artikelzahlen,
      keine Kennzahl-Normierung, also greift das kulturelle Äquivalenz-Gate (WP-004 §5.3) nie:
      Kategorien verschiedener Sprachen erscheinen einfach als eigene Knoten (WP-003 §3.2), nie still
      zusammengeführt.
