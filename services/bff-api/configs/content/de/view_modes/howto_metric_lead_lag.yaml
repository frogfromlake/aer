entityId: howto_metric_lead_lag
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Läuft eine Kennzahl einer anderen zeitlich voraus? Jeder Punkt ist eine Zeitverschiebung; der höchste ist das Lead-Lag — nach rechts folgt die zweite Kennzahl der ersten."
    long: >
      Ein Lead-Lag beantwortet „wenn sich eine dieser Messgrößen bewegt, folgt die andere — und wie
      lange danach?". Die Kurve ist die Korrelation der stündlichen Reihen beider Kennzahlen bei jeder
      Zeitverschiebung; der Gipfel benennt das wahrscheinlichste Vorlaufen/Nachlaufen. Ein Gipfel bei
      Lag 0 heißt Gleichlauf; rechts folgt die zweite Kennzahl der ersten, links läuft sie voraus. Das
      beschreibt zeitlichen Gleichlauf, nicht Ursache — ein gemeinsamer äußerer Treiber erzeugt
      dieselbe Form.
  methodological:
    short: "Verschobene Pearson-Kreuzkorrelation der stündlichen Mittel-Reihen zweier Kennzahlen über einen Bereich; nutzt den Phase-124-Kreuzkorrelations-Kern."
    long: >
      Der Server bildet je Kennzahl die stündliche Mittel-Reihe über Bereich und Fenster und berechnet
      dann die Pearson-Korrelation bei jeder ganzstündigen Verschiebung in ±maxLagHours (mit dem
      Phase-124-computeLeadLag-Kern). Ein Lag ist null, wenn bei dieser Verschiebung zu wenige Buckets
      überlappen oder eine Seite keine Varianz hat — leer dargestellt, nie null. Die Bucket-Zahl bei
      Lag 0 ist ein Stichproben-Indikator: wenig Überlappung = verrauschte Kurve. Ein mehrsprachiger
      Bereich erfordert eine validierte Äquivalenz-Freigabe für beide Kennzahlen; fehlt sie,
      verweigert die Zelle mit einer Level-1-Alternative (WP-004 §5.2).
