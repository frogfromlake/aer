entityId: howto_revision_activity
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Ein Balken je Quelle: wie oft veröffentlichte Artikel still nachträglich editiert wurden, beobachtet über Internet-Archive-Snapshots."
    long: >
      Beobachtung stiller Edits. Jede gezählte Revision ist eine erfasste Änderung an einem bereits
      veröffentlichten Artikel — ein Wayback-(CDX-)Snapshot, dessen Inhalt sich vom vorigen unterscheidet.
      Ein hoher Balken heißt: die Quelle überarbeitet nach Veröffentlichung viel; ein niedriger: Edits sind
      selten. Ein leerer Balken bedeutet NICHT automatisch „keine Edits": ein Lookup, der nicht abschließen
      konnte (Internet Archive nicht erreichbar, Rate-Limit, Circuit offen), wird separat festgehalten, damit
      die Lücke sichtbar bleibt und nicht als Stille missgedeutet wird (ADR-036). Lies die relativen Höhen
      zwischen Quellen, nicht die absoluten Zahlen — wie intensiv eine Seite archiviert wird, variiert.
  methodological:
    short: "Anzahl distinkter inhaltsändernder Snapshots in aer_gold.article_revisions über das Fenster, gruppiert nach Quelle; die synchrone Aleph-Zelle kollabiert das Fenster zu einem Bucket."
    long: >
      Serverseitig: Revisionen stammen aus Internet-Archive-CDX-(Wayback-Index-)Snapshots, per
      Inhalts-Digest kollabiert, sodass nur ein Snapshot zählt, dessen Inhalt sich vom vorigen
      UNTERSCHEIDET — identische Re-Archivierungen (der Großteil der Captures) werden verworfen. Die
      Aggregation gruppiert aer_gold.article_revisions nach (source, bucket) und liest mit FINAL,
      sodass re-ingestierte Duplikate auf eines kollabieren. Diese Aleph-Zelle ist synchron: Sie
      kollabiert das ganze aktive Fenster zu einem einzigen Bucket und fragt nur „welche Quelle
      editiert gerade am meisten" — die diachrone Lesart je Bucket ist die revision_timeline-Zelle
      über denselben Endpunkt.

      Was „Edit-Aktivität" ist und NICHT ist. Eine gezählte Revision ist die BEOBACHTBARE Tatsache,
      dass sich der archivierte Inhalt zwischen zwei Captures geändert hat — ein stiller Re-Edit
      eines bereits veröffentlichten Artikels. Sie ist KEINE Zählung redaktioneller Entscheidungen:
      eine redaktionelle Änderung zwischen zwei Captures zählt als eine Revision, egal wie viele
      Wörter sich bewegt haben, und mehrere Änderungen ZWISCHEN zwei Captures sind unsichtbar (sie
      kollabieren in den einen Netto-Diff). Entscheidend: Die Balken-HÖHE wird von der CAPTURE-
      FREQUENZ bestimmt — wie intensiv das Internet Archive jede Seite crawlt — mindestens so sehr
      wie vom Verhalten des Herausgebers. Ein stark archiviertes Medium kann mehr Revisionen zeigen
      als ein schwach archiviertes, das tatsächlich mehr editiert. Lies RELATIVE Höhen mit diesem
      Vorbehalt, nie absolute Zahlen als Edit-Rate. Ein leerer/fehlender Balken wird NICHT zu „keine
      Edits" gemacht: ein Lookup, der nicht abschließen konnte (Archive nicht erreichbar, Rate-Limit,
      Circuit offen), erzeugt keine Revisionszeile und wird im SEPARATEN Wayback-Lookup-Completeness-
      Signal festgehalten, sodass „0 Revisionen" und „wir konnten nicht nachsehen" unterscheidbar
      bleiben (ADR-039 disclose-never-coerce). Komposition: eine einzelne gruppierte Abfrage über den
      Geltungsbereich; kein merged/split-Auffächern.
