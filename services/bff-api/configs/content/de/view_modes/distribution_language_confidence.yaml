entityId: distribution_language_confidence
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Spracherkennungskonfidenz-Verteilung. Zeigt, wie konsistent die Quelle in einer einzigen erkennbaren Sprache veröffentlicht — ein Datenqualitäts- und Korpuszusammensetzungssignal."
    long: >
      Die Verteilungsansicht für language_confidence zeigt die Streuung der Erkennungssicherheit
      über alle Artikel im ausgewählten Fenster. Für eine stabile einsprachige Quelle wird die
      Verteilung eng nahe 1,0 gepackt sein — dies ist das erwartete Profil für Probe 0. Ein
      langer linker Tail (viele Artikel mit niedrigerer Konfidenz) deutet auf kurze Artikel,
      gemischtsprachigen Inhalt, zitatreichen Text oder Modellunsicherheit bezüglich eines
      bestimmten sprachlichen Registers hin. Diese Ansicht ist primär ein Datenqualitätsinstrument:
      Sie sagt, wie vertrauenswürdig sprachbedingte Analysen des Korpus sind, nicht etwas
      über den Diskurs selbst.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "Histogramm / Dichte von langdetect-Konfidenzscores (0–1). Vorläufig (Tier 3). Für einsprachige deutsche Quellen wird eine Spitze nahe 1,0 erwartet; linker Tail zeigt Niedrig-Konfidenz-Artikel an."
    long: >
      Die Verteilung ist ein Histogramm der langdetect-Konfidenzwerte für die primär erkannte
      Sprache, berechnet über alle Artikel im ausgewählten Geltungsbereich und Fenster.
      Tier 3 (vorläufig) gemäß WP-002 §5. Interpretation: (1) für durchgehend deutsche Quellen
      wird eine scharfe rechtsseitige Spitze nahe 1,0 erwartet — jeder Artikel mit Konfidenz
      unter 0,9 ist einer manuellen Prüfung wert; (2) kurze Texte (< 50 Token) erzeugen
      unzuverlässige Konfidenzwerte und vergrößern den linken Tail; (3) die Verteilung
      spiegelt Per-Artikel-Konfidenz wider, nicht Per-Satz — gemischtsprachige Absätze können
      mittlere Konfidenzwerte erzeugen, die ihre tatsächliche Struktur verbergen; (4) Änderungen
      in dieser Verteilung im Zeitverlauf (in der Zeitreihenansicht sichtbar) können auf
      Inhaltswechsel in der Quelle hinweisen, nicht auf echte sprachliche Verschiebungen.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

