entityId: howto_correlation_matrix
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Jede Zelle ist die Korrelation zweier Kennzahlen der Menge — warm = sie steigen gemeinsam, kühl = die eine fällt, wenn die andere steigt, blass = kein Zusammenhang."
    long: >
      Eine Korrelations-Matrix beantwortet „Welche dieser MESSGRÖSSEN-MENGE bewegen sich gemeinsam,
      welche sind unabhängig?“. Die gewählte Menge IST der Gegenstand der Ansicht: Jede Kennzahl
      darin wird zu einer Zeile und einer Spalte, und jede Zelle abseits der Diagonale ist die
      Korrelation dieses Zeile-Spalte-Paares. Lies eine kräftig warme oder kühle Zelle als Paar,
      das sich als Streudiagramm zu öffnen lohnt, um die Form hinter der Zahl zu sehen. Die
      Diagonale ist immer 1 (eine Kennzahl korreliert perfekt mit sich selbst), und die Matrix ist
      symmetrisch, sodass oberes und unteres Dreieck einander spiegeln. Korrelation ist keine
      Kausalität, und Pearsons r erfasst nur lineare Zusammenhänge — ein gekrümmter Zusammenhang
      kann als schwaches r erscheinen, selbst wenn beide Kennzahlen eng verknüpft sind.
  methodological:
    short: "Paarweises Pearson-r über 5-Minuten-Bucket-Mittel der gewählten Menge; Zellen mit zu wenigen überlappenden Buckets bleiben leer, nie null."
    long: >
      Für jede Kennzahl der gewählten Menge berechnet der Server Bucket-Mittel (feste
      5-Minuten-Auflösung via toStartOfFiveMinute, wie der Zeitreihen-Endpoint), dann Pearson r über
      jedes Paar der Bucket-Mittel-Reihen dort, wo beide Kennzahlen einen Wert haben. Die
      Beobachtungseinheit ist der Zeit-Bucket, nicht der Artikel — also ein „bewegen sich diese
      Kennzahlen über die Zeit gemeinsam“, verschieden vom artikelweisen Streudiagramm; deshalb
      kann dasselbe Paar in beiden Ansichten anders aussehen. Ein Paar mit zu wenigen überlappenden
      Buckets liefert null und wird leer dargestellt (disclose-never-coerce, WP-003 §3.2), nie als
      erzwungene Null; wenig Überlappung ergibt zudem ein verrauschtes r, also lies die Bucket-Zahl
      neben der Farbe, statt einer einzelnen starken Zelle aus wenigen Buckets zu trauen. Eine
      bereichsübergreifende (mehrsprachige) Matrix erfordert für jede Kennzahl eine validierte
      Äquivalenz-Freigabe; fehlt sie, verweigert die Zelle mit einer Level-1-Alternative, statt
      nicht-vergleichbare Skalen zu korrelieren (WP-004 §5.2, §3.4).
