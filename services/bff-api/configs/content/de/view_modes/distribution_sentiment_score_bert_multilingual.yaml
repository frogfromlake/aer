entityId: distribution_sentiment_score_bert_multilingual
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Mehrsprachige BERT-Sentiment-Verteilung. Zeigt die Streuung der von einem mehrsprachigen Transformer-Modell vergebenen Polaritätswerte über alle Artikel im Fenster."
    long: >
      Die Verteilungsansicht für sentiment_score_bert_multilingual stellt die
      vollständige Streuung der vom mehrsprachigen Transformer-Modell erzeugten
      Polaritätswerte über alle Artikel im ausgewählten Geltungsbereich und Fenster
      dar. Wie bei der Lexikon-Verteilung ist dies oft aussagekräftiger als ein
      Mittelwert: Eine Quelle mit einem Mittelwert nahe null kann gleichmäßig
      neutrale Inhalte produzieren oder zwischen stark positiven und stark
      negativen Artikeln wechseln, die sich aufheben. Die Verteilung offenbart,
      welcher Fall vorliegt. Im Vergleich zur Lexikon-Verteilung
      (sentiment_score_sentiws) hat diese Ansicht Zugriff auf den
      Gesamtartikel-Kontext und streut daher voraussichtlich etwas weiter — das
      Modell kann Ironie oder Negation erkennen, die das Lexikon übersieht. Der
      Formunterschied zwischen den beiden Verteilungen ist im Methodologie-Tray
      seiner Inspektion wert.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "Histogramm / Dichte des cardiffnlp/twitter-xlm-roberta-base-sentiment-Skalars (Bereich [-1, +1]). Tier-2-Default gemäß ADR-023. Tail-Form ist das aussagekräftige Signal; absolute Formen sprachübergreifend ohne metric_equivalence-Eintrag nicht vergleichen (WP-004 §3)."
    long: >
      Die Verteilung ist ein Histogramm über sentiment_score_bert_multilingual-Werte
      (mehrsprachiges XLM-RoBERTa, P(positiv) − P(negativ), [-1, +1]) für den
      ausgewählten Geltungsbereich und Zeitraum. Tier-2-Default gemäß ADR-023.
      Interpretationshinweise: (1) für institutionelle redaktionelle Quellen wird
      die Verteilung erwartungsgemäß eng um null gepeakt — dies spiegelt das
      institutionelle Register wider, nicht ein Modelldefizit; (2) das
      aussagekräftige Signal liegt in der Tail-Form und etwaigen Nebengipfeln;
      (3) alle Multilingual-BERT-Einschränkungen gelten gleichermaßen für die
      Verteilungsform — Domänentransfer (Twitter-Training, institutionelle
      Anwendung), sprachübergreifende Kalibrierungsverschiebung,
      Tier-2-Same-Process-Reproduzierbarkeit (WP-002 §3.2); (4) die Bin-Anzahl
      hat standardmäßig 30 über [-1, +1]; bei enger Verteilung verbessert eine
      Reduktion die Lesbarkeit. Sprachübergreifender Vergleich absoluter
      Verteilungsformen ist gegated: wenn der aktive Geltungsbereich mehr als
      eine erkannte Sprache umfasst, fordert die BFF einen Eintrag im
      metric_equivalence-Register (ADR-016), der ein Abweichungsniveau gewährt,
      bevor die Normalisierung über sprachliche Frames zulässig ist (WP-004 §3).

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

