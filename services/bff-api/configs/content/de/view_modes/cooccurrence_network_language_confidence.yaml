entityId: cooccurrence_network_language_confidence
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Die Netzwerkansicht ist für Spracherkennungskonfidenz nicht sinnvoll. Diese Metrik ist ein Datenqualitätssignal, keine relationale Akteursdimension. Für die Verteilungs- oder Zeitreihenansicht optieren."
    long: >
      language_confidence misst, wie sicher der Spracherkennungsalgorithmus bezüglich der
      Sprache eines Artikels ist — es handelt sich um ein Datenqualitätssignal, kein
      Diskursphänomen. Es gibt keine Akteure, die als Knoten platziert, und keine Paare,
      die als Kanten verbunden werden können. Ein Netzwerklayout für diese Metrik ergibt einen
      leeren Graphen. Die aussagekräftigen Ansichten für diese Metrik sind die Verteilung
      (zur Darstellung der Gesamtstreuung der Erkennungssicherheit) und die Zeitreihe (zur
      Erkennung, ob die Konfidenz im Zeitverlauf sinkt — was auf Korpusqualitätsprobleme
      hinweisen würde). Sprachbedingte Analyse — das Filtern aller anderen Metriken auf
      Artikel, bei denen eine bestimmte Sprache mit hoher Konfidenz erkannt wurde — ist als
      Abfragefilter verfügbar, nicht als Netzwerkzelle.

      Komposition — composition='merged' berechnet einen
      Entitäts-Ko-Vorkommen-Graphen über den gemeinsamen Korpus; Knoten erben
      Salienz aus der Vereinigung, Kantengewichte ergeben sich aus der
      gemeinsamen Erwähnungshäufigkeit über alle gewählten Quellen.
      composition='split' rendert einen Graphen pro Quelle. Mehrsprachige
      merged-Bereiche werden in der BFF verweigert (422
      cross_language_merge_unsupported), weil die zugrunde-liegenden
      NER-Modelle (spaCy/HanLP) sprachgebunden sind und Kantengewichte über
      Sprach-Partitionen nicht vergleichbar wären; Split-Komposition mit einer
      Sprache pro Zelle ist der unterstützte Weg, mehrsprachige
      Entitätsnetzwerke zu inspizieren.

  methodological:
    short: "Nicht anwendbar: language_confidence ist ein Dokumentenskalar ohne relationale Struktur. Empfohlene Alternativen: time_series_language_confidence, distribution_language_confidence."
    long: >
      language_confidence ist die Per-Dokument-Wahrscheinlichkeitsausgabe des langdetect-
      Modells für die primär erkannte Sprache. Sie hat keine Entitäts- und keine Paardimension.
      Die Co-Occurrence-Netzwerkzelle kann mit dieser Metrik nicht befüllt werden; das Backend
      gibt ein leeres Ergebnis zurück. Dies ist korrektes Verhalten — Sprachkonfidenz ist ein
      Metadaten-Qualitätssignal über die Korpuszusammensetzung, keine Variable, die die
      relationale Struktur von Diskursakteuren beschreibt. Für Analysen, die sprachlich auf
      Hochkonfidenz-Artikel filtern, den Sprachfilterparameter in anderen Ansichten verwenden.

      Komposition (Phase 122i / ADR-034) — merged-Komposition führt eine
      Entitäts-Ko-Vorkommen-Aggregation (POST /entities/cooccurrence/query)
      über den vereinigten Geltungsbereich aus (mit den
      100-Quellen-/25-Entitäten-Caps gemäß ADR-034). Kantengewichte leiten
      sich aus sprach-spezifischem NER ab (spaCy de_core_news_lg,
      en_core_web_lg; HanLP für ZH gemäß ADR-024) und SIND innerhalb einer
      Sprach-Partition vergleichbar. Mehrsprachige merged-Bereiche werden in
      der BFF verweigert (HTTP 422 cross_language_merge_unsupported,
      anchor=ADR-034#cross-language), weil NER-Tag-Mengen und
      Entitäts-Frequenzen über Sprach-Pipelines hinweg nicht kommensurabel
      sind. Split-Komposition rendert einen Graphen pro Quelle — geeignet für
      strukturellen Quell-Vergleich innerhalb einer Sprache.

