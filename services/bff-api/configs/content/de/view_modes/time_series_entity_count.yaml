entityId: time_series_entity_count
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Benannte Entitätsdichte über die Zeit. Zeigt, ob Artikel entitätsreicher oder -ärmer werden — ein Proxy für die Dichte von Verweisen auf bestimmte Personen, Orte und Organisationen."
    long: >
      Diese Ansicht stellt entity_count — die Anzahl erkannter benannter Entitäten pro Artikel —
      als Zeitreihe dar. Steigende Entitätsdichte kann auf zunehmende Konkretheit in der
      Berichterstattung hinweisen (mehr spezifische Akteure, Orte und Institutionen werden
      benannt); sinkende Dichte kann abstrakteren, allgemeineren oder meinungsorientierten
      Inhalt widerspiegeln. Spitzen korrelieren häufig mit komplexen Mehrparteien-Ereignissen
      (Wahlen, Krisen, Gipfel). Diese Metrik liefert einen groben Proxy für die Spezifizität
      und faktische Verwurzelung des Diskurses. Sie ergänzt die Netzwerk-Co-Occurrence-Analyse,
      sagt aber nichts darüber aus, wie die Entitäten miteinander in Beziehung stehen.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "5-Minuten-Downsampling-Mittelwert von entity_count aus spaCy de_core_news_lg. Vorläufig (Tier 3). Bekannte Einschränkungen: NER-Fehler, Entitätsfusionierungslücken, Domänenabdeckung."
    long: >
      entity_count ist die Anzahl benannter Entitäts-Spans, die das spaCy-Modell de_core_news_lg
      pro Artikel erkennt; hier als Downsampling-Zeitreihe dargestellt. Tier 3 (vorläufig)
      gemäß WP-002 §5. Vorbehalte: (1) spaCys deutsches NER wurde auf Nachrichtentext trainiert
      und liefert die besten Ergebnisse bei nachrichtenagenturtypischem Stil; staatliche
      Pressemitteilungen können mehr falsch-negative Organisationsnamen erzeugen; (2) entity_count
      unterscheidet nicht zwischen Entitätstypen (Personen, Orte, Organisationen werden zusammengefasst)
      — für Typebenen-Analysen eignen sich die Entitätsverteilungs- oder Netzwerkansichten;
      (3) Satzlänge und Textkomplexität beeinflussen die Erkennungsrate; (4) Modell-Updates
      können diskontinuierliche Sprünge im Zählbasislevel verursachen. Trendinterpretation
      sollte diese Möglichkeit berücksichtigen.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

