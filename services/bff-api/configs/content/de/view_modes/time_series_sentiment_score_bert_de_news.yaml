entityId: time_series_sentiment_score_bert_de_news
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Deutsches Nachrichten-BERT-Sentiment über die Zeit. Gleiche Form wie die mehrsprachige Zeitreihe, aber gelesen von einem auf deutsche Nachrichten feinjustierten Modell — näher am AĒR-Quellenregister, nur Deutsch."
    long: >
      Diese Ansicht stellt sentiment_score_bert_de_news als Zeitreihe dar. Die
      Metrik ist das domänenspezialisierte Gegenstück zum mehrsprachigen
      BERT-Sentimentscore: Das Modell liest dieselben Artikel, wurde aber auf
      deutschen Nachrichtentexten feinjustiert, nicht auf mehrsprachigem Twitter,
      sodass seine Kalibrierung auf den deutschen institutionellen Quellen von AĒR
      voraussichtlich enger ist. Vergleichen Sie diese Zeitreihe mit der
      mehrsprachigen (sentiment_score_bert_multilingual) und mit dem
      lexikonbasierten Score (sentiment_score_sentiws) — die Lücke zwischen den
      drei Linien macht das WP-002-§3.2-Domänentransfer-Signal sichtbar. Die
      Ansicht ist absichtlich nur für Deutsch: Eine Eingrenzung auf
      nicht-deutsche Quellen rendert einen leeren Stream, was korrekt ist (die
      Metrik fehlt tatsächlich, ist nicht null). Als Tier-2.5-Verfeinerung
      bleibt sie vorläufig.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "5-Minuten-Downsampling-Mittelwert des mdraw/german-news-sentiment-bert-Skalars (P(pos) − P(neg), [-1, +1]). Tier-2.5-Verfeinerung gemäß ADR-023. Nur Deutsch. Genretransfer-Vorbehalt: Nachrichtentraining, institutionelle Anwendung (WP-002 §3.2)."
    long: >
      sentiment_score_bert_de_news ist in dieser Ansicht eine
      5-Minuten-Downsampling-Zeitreihe über den Skalar P(positiv) − P(negativ),
      ausgegeben von mdraw/german-news-sentiment-bert, gepinnt per
      HuggingFace-Commit-Revision im
      languages.de.sentiment_tier2_refinement-Block des Language Capability
      Manifests. Gleiche Determinismus-Flags und gleiches Phase-119-CI-Gate wie
      der mehrsprachige Default. Gemäß ADR-023 ist dies die
      Tier-2.5-Verfeinerungsschicht: läuft neben dem Multilingual-Tier-2-Default,
      niemals an seiner Stelle. Das OpenAPI-TierClassification-Enum ist [1, 2, 3];
      Tier 2.5 wird im Wire-Format auf 2 reduziert. Strikter Sprachfilter: Der
      Extraktor emittiert nur Zeilen für Dokumente mit core.language == 'de' —
      keine `und`/leer-Fall-Through-Logik, weil der gesamte Sinn der
      Verfeinerung in domänennaher Qualität auf bestätigtem deutschen Text liegt.
      Kritische Einschränkungen (WP-002 §3.2): (1) Genre-Enge — das Modell wurde
      auf deutschem Nachrichtentext feinjustiert, nicht auf
      Regierungspressemitteilungen; Transfer auf institutionelles redaktionelles
      Register ist plausibel, aber nicht validiert; (2) Einzelsprachen-
      Geltungsbereich per Design; (3) kein kompositionelles Verständnis von
      Langkontext-rhetorischer Umkehrung — ein als Nachricht gerahmter
      satirischer Artikel kann beim Nennwert bewertet werden;
      (4) Tier-2-Reproduzierbarkeitsprofil — Same-Process-byte-identisch, nicht
      bit-genau deterministisch über CUDA-Backends. Validierungsstatus: nicht
      validiert.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

