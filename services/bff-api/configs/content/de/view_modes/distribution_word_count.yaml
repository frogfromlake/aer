entityId: distribution_word_count
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Wortanzahlverteilung. Zeigt die vollständige Form der Artikellängen einer Quelle oder Sonde — ob die Quelle kurze Meldungen, lange Analysen oder eine bimodale Mischung aus beidem veröffentlicht."
    long: >
      Die Verteilungsansicht stellt word_count als Ridgeline-, Violin- oder Dichte-Plot dar —
      sie zeigt die vollständige Wahrscheinlichkeitsmasse über Artikellängen, nicht einen
      Mittelwerttrend. Eine enge, symmetrische Verteilung zeigt eine Quelle mit konsistentem
      Format an (z. B. Agenturmeldungen fixer Länge). Eine breite oder rechtsschiefe
      Verteilung deutet auf eine Mischung kurzer Nachrichten und langer Features hin. Eine
      bimodale Verteilung — zwei deutliche Gipfel — weist auf zwei strukturell verschiedene
      Inhaltstypen im selben Feed hin (z. B. knappe Ticker-Meldungen und vollständige
      Artikel). Im Vergleich zwischen Quellen einer Sonde macht diese Ansicht strukturelle
      redaktionelle Unterschiede sichtbar, die in einem Zeitreihenmittelwert unsichtbar wären.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "Histogramm / Dichteschätzung von word_count-Werten im ausgewählten Fenster. Tier 1. Bin-Anzahl anpassbar (Standard 30). Rechte-Tail-Kürzung bei Ausreißer-lastigen Korpora empfohlen."
    long: >
      Die Verteilung wird als Histogramm über word_count-Werte im ausgewählten Geltungsbereich
      und Zeitfenster berechnet, mit einstellbarer Bin-Anzahl zwischen 1 und 200 (Standard 30).
      Die zugrundeliegende Metrik ist Tier-1-deterministisch (WP-002 §3). Praktische Hinweise:
      (1) sehr lange Artikel (> 2000 Wörter) können den rechten Tail dominieren und die
      visuelle Dichte der Hauptverteilung komprimieren; die Benutzeroberfläche bietet optionale
      rechte-Tail-Kürzung; (2) die optimale Bin-Anzahl hängt vom Korpusumfang ab — bei weniger
      als 100 Artikeln erzeugt feine Unterteilung verrauschte Schätzungen; (3) Sonde-Scope-
      Verteilungen aggregieren alle Quellen und können bimodale Struktur verbergen, die nur
      auf Quellenebene sichtbar ist. Zur Untersuchung von Per-Quellen-Formen die
      Quellbereichseingrenzung verwenden.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

