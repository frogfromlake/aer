entityId: distribution_publication_weekday
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Veröffentlichungswochentag-Verteilung. Zeigt das vollständige Wochenmuster, wann eine Quelle veröffentlicht — die direkteste Ansicht der redaktionellen Arbeitswoche."
    long: >
      Die Verteilungsansicht für publication_weekday stellt das Veröffentlichungsvolumen
      über die sieben Wochentage als Balkendiagramm dar. Dies ist typischerweise die
      interpretierbarste Ansicht für diese Metrik: ein einzelnes Balkendiagramm zeigt die
      redaktionelle Woche einer Quelle auf einen Blick. Starke Montag–Freitag-Balken mit
      flachen Samstag–Sonntag-Balken sind die Signatur institutioneller redaktioneller
      Produktion. Eine gleichmäßige Verteilung zeigt Dauerredaktionsbetrieb an. Eine
      markante Mittwoch-Spitze kann auf eine geplante wöchentliche Berichtsreihe hinweisen.
      Im Vergleich zwischen Quellen einer Sonde zeigt diese Verteilung, ob alle Quellen
      denselben strukturellen Kalender teilen oder ob einige Quellen in einem anderen Rhythmus
      arbeiten — ein struktureller Befund über ihre jeweiligen institutionellen Kontexte.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "Balkendiagramm über publication_weekday (ISO 1=Mo, 7=So). Tier 1. Bei Vergleichen zwischen Quellen unterschiedlicher Aktivitätsniveaus nach Korpusgröße normieren. UTC-Datumsgrenze gilt (siehe Metrik-Eintrag)."
    long: >
      Die Verteilung ist eine Häufigkeitsauszählung über die sieben ganzzahligen Werte von
      publication_weekday (ISO 8601: 1 = Montag, 7 = Sonntag). Tier 1 deterministisch
      (WP-002 §3). Methodologische Hinweise: (1) Rohzählungen sind proportional zum
      Aktivitätsniveau der Quelle; bei Vergleichen einer aktiven Quelle mit einer
      volumenarmen normieren (Artikel pro Wochentag); (2) der UTC-Datumsgrenze-Vorbehalt
      gilt — siehe den Metrik-Eintrag für publication_weekday; für Sonde-0-Quellen betrifft
      dies nur einen kleinen Anteil der Artikel, die nahe Mitternacht UTC veröffentlicht werden;
      (3) im Sonde-Scope aggregiert die Verteilung über alle Quellen — ein Sonde-weiter
      Montag-Gipfel spiegelt aggregiertes Montags-Volumen wider, was verbergen kann, dass eine
      Quelle stark am Montag veröffentlicht, während eine andere am Donnerstag gipfelt.
      Quellbereichseingrenzung offenbart Per-Quellen-Muster.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

