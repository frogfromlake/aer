entityId: cooccurrence_network_entity_count
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Entitäts-Co-Occurrence-Netzwerk. Zeigt, welche benannten Entitäten gemeinsam in denselben Artikeln auftreten — und damit, welche Akteure, Orte und Organisationen im Diskurs strukturell verbunden sind."
    long: >
      Die Co-Occurrence-Netzwerkansicht rendert einen kräftegerichteten Graphen, in dem
      Knoten benannte Entitäten und Kanten Entitäten verbinden, die im selben Artikel
      auftreten. Die Knotengröße spiegelt wider, wie häufig eine Entität im Korpus erscheint;
      das Kantengewicht, wie oft das verbundene Paar gemeinsam auftritt. Diese Ansicht ist
      die primäre Netzwissenschafts-Perspektive auf Diskurs: Sie offenbart nicht, welche
      Entitäten erwähnt werden, sondern welche gemeinsam erwähnt werden — die relationale
      Struktur des Diskurses. Dichte Cluster zeigen Themenbereiche mit eng verbundenen
      Akteursmengen an. Isolierte Knoten sind Entitäten, die in Ein-Entitäts-Artikeln
      erscheinen. Diese Ansicht ergänzt entity_count: Während entity_count sagt, wie viele
      Entitäten erscheinen, zeigt das Netzwerk, wie sie organisiert sind.

      Komposition — composition='merged' berechnet einen
      Entitäts-Ko-Vorkommen-Graphen über den gemeinsamen Korpus; Knoten erben
      Salienz aus der Vereinigung, Kantengewichte ergeben sich aus der
      gemeinsamen Erwähnungshäufigkeit über alle gewählten Quellen.
      composition='split' rendert einen Graphen pro Quelle. Mehrsprachige
      merged-Bereiche werden in der BFF verweigert (422
      cross_language_merge_unsupported), weil die zugrunde-liegenden
      NER-Modelle (spaCy/HanLP) sprachgebunden sind und Kantengewichte über
      Sprach-Partitionen nicht vergleichbar wären; Split-Komposition mit einer
      Sprache pro Zelle ist der unterstützte Weg, mehrsprachige
      Entitätsnetzwerke zu inspizieren.

  methodological:
    short: "Kräftegerichteter Graph aus aer_gold.entity_cooccurrences. Berechnet vom EntityCoOccurrenceExtractor über ein konfiguriertes Zeitfenster pro Quelle. Knoten: Entität; Kante: Co-Occurrence-Anzahl. Vorläufig (Tier 3)."
    long: >
      Das Co-Occurrence-Netzwerk basiert auf der Tabelle aer_gold.entity_cooccurrences,
      die vom Corpus-Level-Aggregator EntityCoOccurrenceExtractor befüllt wird. Paarordnung
      ist lexikografisch; Selbstpaare sind ausgeschlossen; Zählungen spiegeln
      innerdokumentäre Co-Occurrence innerhalb des konfigurierten Zeitfensters wider. Tier 3
      (vorläufig) gemäß WP-002 §5, da alle NER-Einschränkungen des NamedEntityExtractors
      vererbt werden. Kritische Hinweise: (1) der Graph visualisiert Co-Erwähnung, keine
      Kausalität oder semantische Beziehung — häufiges gemeinsames Auftreten zweier Entitäten
      bedeutet nicht, dass sie kausal verknüpft sind; (2) hochfrequente Entitäten (Eigennamen
      wichtiger politischer Akteure, häufig erwähnte Orte) haben viele Kanten und dominieren
      den Graphen — topN-Filterung verwenden, um strukturell interessante Beziehungen zu
      fokussieren; (3) im Sonde-Scope aggregiert das Netzwerk Co-Occurrences über Quellen,
      was getrennte Diskursgemeinschaften zu einem scheinbaren Netzwerk zusammenführen kann;
      (4) Entitätsnamen-Auflösung erfolgt durch exakte Zeichenkettenübereinstimmung — dieselbe
      Entität, die unter zwei verschiedenen Bezeichnungen erscheint (z. B. „Scholz" vs.
      „Bundeskanzler Scholz"), erscheint als zwei Knoten.

      Komposition (Phase 122i / ADR-034) — merged-Komposition führt eine
      Entitäts-Ko-Vorkommen-Aggregation (POST /entities/cooccurrence/query)
      über den vereinigten Geltungsbereich aus (mit den
      100-Quellen-/25-Entitäten-Caps gemäß ADR-034). Kantengewichte leiten
      sich aus sprach-spezifischem NER ab (spaCy de_core_news_lg,
      en_core_web_lg; HanLP für ZH gemäß ADR-024) und SIND innerhalb einer
      Sprach-Partition vergleichbar. Mehrsprachige merged-Bereiche werden in
      der BFF verweigert (HTTP 422 cross_language_merge_unsupported,
      anchor=ADR-034#cross-language), weil NER-Tag-Mengen und
      Entitäts-Frequenzen über Sprach-Pipelines hinweg nicht kommensurabel
      sind. Split-Komposition rendert einen Graphen pro Quelle — geeignet für
      strukturellen Quell-Vergleich innerhalb einer Sprache.

