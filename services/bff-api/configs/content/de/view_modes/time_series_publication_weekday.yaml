entityId: time_series_publication_weekday
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Veröffentlichungswochentag über die Zeit. Für die meisten stabilen Quellen ist diese Kurve flach — Abweichungen signalisieren reale Verschiebungen in der redaktionellen Planung, etwa eine Ausweitung der Wochenendberichterstattung."
    long: >
      Diese Ansicht stellt den Veröffentlichungswochentag als gleitenden Durchschnitt über das
      Beobachtungsfenster dar. Da Wochentag eine wöchentliche Zyklusgröße ist, ist die
      Zeitreihe am aussagekräftigsten über Mehrwochen- oder Mehrmonatszeiträume, in denen
      sich der gleitende Mittelwert stabilisiert. Für institutionelle Quellen mit starker
      Montag–Freitag-Konzentration schwankt der mittlere Veröffentlichungswochentag nahe 3
      (Mittwoch). Verschiebungen hin zu höheren Werten (mehr Wochenendveröffentlichungen)
      oder niedrigeren Werten (Vorziehen in die Wochenmitte) sind bedeutsame strukturelle
      Veränderungen. Diese Ansicht eignet sich besser für langfristige Trendanalysen als
      für kurze Fenster, in denen einzelne Wochen den Mittelwert dominieren.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "5-Minuten-Downsampling-Mittelwert des Veröffentlichungswochentags (ISO 1–7). Tier 1. Hinweis: die Interpretation eines Mittelwerts einer wöchentlichen Zyklusgröße erfordert Mehrwochen-Beobachtungsfenster."
    long: >
      Der Veröffentlichungswochentag ist eine deterministische Tier-1-Metrik (WP-002 §3). In dieser
      Zeitreihenansicht wird sie als Downsampling-Mittelwert dargestellt — was sorgfältige
      Interpretation erfordert. Der Veröffentlichungswochentag ist eine kategorische Größe mit wöchentlicher
      Periodizität; ihr arithmetisches Mittel ist nur sinnvoll, wenn es über Zeitspannen
      berechnet wird, die lang genug sind, um mehrere vollständige Wochen zu mitteln. Über
      kurze Fenster (Tage bis eine Woche) wird der scheinbare Trend dadurch dominiert, an
      welchem Tag das Fenster beginnt und endet, nicht durch eine strukturelle redaktionelle
      Änderung. Die Verteilungsansicht eignet sich besser, um das Wochentags-Muster einer
      Quelle in einem festen Fenster zu charakterisieren; diese Zeitreihenansicht ist für
      die Erkennung von Verschiebungen dieses Musters über ausgedehnte Beobachtungszeiträume
      gedacht.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

