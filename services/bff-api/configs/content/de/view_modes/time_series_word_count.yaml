entityId: time_series_word_count
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Wortanzahl über die Zeit. Zeigt, wie sich die Artikellänge im Beobachtungsfenster verändert — hilfreich, um Verschiebungen im redaktionellen Umfang oder Formatänderungen zu erkennen."
    long: >
      Diese Ansicht stellt die Wortanzahl als Zeitreihe dar und zeigt, wie sich die durchschnittliche
      Artikellänge im ausgewählten Zeitraum und Geltungsbereich verändert. Anhaltende Anstiege
      können auf redaktionelle Expansion oder eine Verschiebung zu Long-form-Berichterstattung
      hinweisen; anhaltende Rückgänge können Formatverdichtung, Automatisierung oder
      Ressourcenengpässe widerspiegeln. Abrupte Spitzen korrelieren häufig mit spezifischen
      Ereignissen, die ausführliche Berichterstattung erfordern. Der Vergleich zwischen Quellen
      ermöglicht es, strukturelle (probenweite) von redaktionellen (quellenspezifischen)
      Längenmuster zu unterscheiden.

      Komposition — komponiert das Panel mehr als eine Quelle unter
      composition='merged', rendert diese Ansicht EINE Grafik über den
      vereinigten Korpus (BFF-Abfrage ?sourceIds=a,b,...); unter
      composition='split' fächert dieselbe Quellenmenge in eine Grafik pro
      Quelle auf, nebeneinander bei split-direction='horizontal' oder
      gestapelt bei 'vertical'. Die merged-Lesart ist angemessen, wenn die
      analytische Frage die Vereinigung betrifft (z. B. 'was zeigt die
      institutionelle Presse insgesamt?'); die split-Lesart ist angemessen,
      wenn Quellen-spezifische Unterscheidung die Frage ist. Mehrsprachige
      merged-Bereiche sind in Aleph erlaubt und blenden einen weichen
      Methodikhinweis ein (WP-004 §3.4) statt einer Verweigerung.

  methodological:
    short: "5-Minuten-Downsampling-Mittelwert der Wortanzahl. Tier 1 — keine bekannten Einschränkungen für deutsches RSS. Unsicherheitsbänder zeigen Stichprobenvarianz pro Bucket."
    long: >
      Die Zeitreihenansicht wendet 5-Minuten-Bucket-Downsampling auf die Werte der Wortanzahl an und
      stellt den Mittelwert pro Bucket dar. Unsicherheitsbänder spiegeln die Varianz innerhalb
      jedes Buckets wider. Die Wortanzahl ist eine deterministische Tier-1-Metrik (WP-002 §3);
      zeitliche Muster in der Reihe sind strukturell zuverlässig für gut gestempelte
      RSS-Quellen. Wichtigster Interpretationsvorbehalt: Wortanzahl misst Länge, nicht Tiefe —
      ein längerer Artikel ist nicht zwangsläufig informativer. Quellenübergreifende Vergleiche
      setzen voraus, dass alle Quellen Inhalte in Sprachen produzieren, für die
      Leerzeichen-Tokenisierung geeignet ist. Für Sonde 0 (deutsches institutionelles RSS)
      bestehen keine aktiven Einschränkungen.

      Komposition (Phase 122i / ADR-034) — für composition='merged' führt der
      Handler einen einzelnen BFF-Aufruf mit den vereinigten sourceIds aus,
      und die Zelle rendert eine Grafik; für 'split' führt die Zelle eine
      Abfrage pro Quelle aus und rendert eine Grafik pro Quelle.
      Split-Direction ist ein reiner Layout-Schalter (horizontale Reihe vs.
      vertikaler Stapel) und beeinflusst die Abfrageform nicht. Mehrsprachige
      merged-Bereiche werden in Aleph NICHT verweigert — das
      MethodologyBanner-Primitive rendert einen weichen
      Cross-Frame-Vergleichbarkeit-Hinweis (WP-004 §3.4), sobald
      composition='merged' AND sources.length > 1, weil Aleph-Metriken
      (lexikon-basierte Polarität, strukturelle Zählungen) sprachunabhängig
      genug sind, dass eine Aggregation mit Vorbehalten sinnvoll bleibt. Die
      Asymmetrie gegenüber Episteme/Rhizome (die verweigern) ist beabsichtigt
      und in WP-005 §6.2 §8b dokumentiert.

