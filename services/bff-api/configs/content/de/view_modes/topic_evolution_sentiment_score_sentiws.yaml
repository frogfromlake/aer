entityId: topic_evolution_sentiment_score_sentiws
entityType: view_mode
locale: de
registers:
  semantic:
    short: "Themenentwicklung. Stream-Graph des BERTopic-Themenvolumens über die Zeit — wie sich die Grenzen des Sagbaren über das beobachtete Fenster verschieben."
    long: >
      Die Themenentwicklungsansicht stapelt das Artikelvolumen pro Thema über das ausgewählte
      Zeitfenster, einen Stream pro Thema. Während die Themenverteilungsansicht "worüber wird
      gerade gesprochen?" beantwortet, beantwortet die Entwicklung die Episteme-Frage direkt:
      wie verschieben sich die Diskurs-Themengrenzen über den beobachteten Zeitraum? Ein Thema,
      das im Fenster verschwindet, sich aufspaltet oder mit einem anderen verschmilzt, ist der
      sichtbare Schatten einer Veränderung dessen, was der Korpus überhaupt erfassen konnte.
      Die aktive Metrik (sentiment_score_sentiws) ist der analytische Rahmen der Lane — der Stream-Graph
      selbst konsumiert die Metrik nicht, aber das Lesen der Streams neben der Zeitreihe der
      Metrik in derselben Lane verbindet beide Ebenen. Die Themenfarbe folgt einer
      Viridis-Rampe und trägt keine Valenz; die Ausreißerklasse ("unkategorisiert") wird grau
      dargestellt. Bei prefers-reduced-motion fällt die Stream-Silhouette auf ein statisches
      gestapeltes Balkendiagramm zurück, damit keine animierte Wellenbewegung entsteht.

      Komposition — composition='merged' passt das Themenmodell auf den
      gemeinsamen Korpus aller ausgewählten Quellen an; die entstehenden
      Themen sind eine Eigenschaft der Vereinigung, keine Aggregation von
      Pro-Quelle-Themen. Das Dashboard rendert über der Ansicht einen
      Joint-Corpus-Methodikhinweis (WP-005 §6.2), damit der Leser nicht still
      zwischen 'worüber diese Quellen gemeinsam sprechen' und 'worüber jede
      Quelle spricht' wechselt. composition='split' passt ein Modell pro
      Quelle an und rendert die jeweiligen Themenmengen nebeneinander —
      angemessen, wenn Quellen-spezifische Rahmung die Frage ist.
      Mehrsprachige merged-Bereiche werden in der BFF verweigert (422
      cross_language_merge_unsupported), da die Einbettungs-geometrie
      sprachgebunden ist.

  methodological:
    short: "Komposition mehrerer GET /api/v1/topics/distribution-Aufrufe pro Sub-Fenster (Phase-120-Endpunkt). BERTopic Tier 2 — gepinnte multilingual-e5-large-Embeddings, geseedete UMAP/HDBSCAN. Per-Sprach-Partitionierung erhalten (WP-004 §3.4)."
    long: >
      Die Zelle stellt eine BFF-Anfrage pro zeitlichem Sub-Fenster über den aktiven Bereich
      (typischerweise 8 bis 14 Buckets) und komponiert die Per-Bucket-Per-Topic-Artikelzahlen
      zu einem gestapelten Flächen- bzw. Stream-Graphen. Top-K-Themen werden nach
      Gesamtartikelvolumen über das Vollfenster ausgewählt, damit der Stapel stabil bleibt;
      Themen mit geringerem Volumen werden zu einem einzelnen "andere"-Stream zusammengefasst,
      damit das Bild nicht explodiert. Die Ausreißerklasse (topic_id = -1) bleibt als separater
      grauer Stream erhalten — sie ist Beobachtung, kein Rauschen. Themen werden pro
      Sprachpartition von BERTopic gefittet; sprachübergreifende Themen-Alignment ist gemäß
      WP-004 §3.4 explizit ausgeschlossen und wird auf der Rendering-Ebene verweigert
      (Mehrsprach-Geltungsbereiche rendern einen Stream-Stapel pro Sprache). Reproduzierbarkeit
      folgt WP-002 §8.1 Option C: gepinnte Modellversion, geseedete Clusterung, model_hash pro
      Zeile aufgezeichnet.

      Komposition (Phase 122i / ADR-034) — merged-Komposition passt BERTopic
      (intfloat/multilingual-e5-large → UMAP → HDBSCAN, min_cluster_size=10,
      n_neighbors=15) auf die Vereinigung der ausgewählten Quellen im
      aufgelösten Geltungsbereich an. Das Modell sieht die Vereinigung als
      einen einzigen Korpus; pro-Quelle-Struktur ist in den Themen-Labels
      nicht erhalten (wiederherstellbar aus den Pro-Dokument-Zuordnungen).
      Split-Komposition passt ein Modell pro Quelle an; Themen-IDs sind über
      Zellen hinweg nicht vergleichbar. Mehrsprachige merged-Bereiche werden
      in der BFF verweigert (HTTP 422 cross_language_merge_unsupported,
      anchor=ADR-034#cross-language), da UMAP+HDBSCAN-Clustering über
      Sprach-Partitionen auch mit mehrsprachigem Embedding-Modell instabil
      ist. Small-Corpus-Warnung greift unter 500 Dokumenten pro
      Sprachpartition (Engineering-Schwelle,
      src/lib/config/topic-thresholds.ts). Siehe WP-005 §6.2.

