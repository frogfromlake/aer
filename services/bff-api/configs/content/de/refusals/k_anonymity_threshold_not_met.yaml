entityId: k_anonymity_threshold_not_met
entityType: refusal
locale: de
registers:
  semantic:
    short: "Den Volltext dieses Artikels zu lesen erfordert genug Artikel derselben Quelle am selben Tag, damit eine Einzelperson nicht identifizierbar bleibt. Das Gate gilt nur für Korpora, in denen eine Person re-identifizierbar wäre — öffentliche institutionelle Publisher sind ausgenommen."
    long: >
      Sie haben den Volltext eines einzelnen Artikels angefordert. Für Korpora, in denen ein
      Autor re-identifizierbar wäre, hält AĒR ihn zurück, bis der Artikel in einer ausreichend
      großen Gruppe von Artikeln derselben Quelle am selben Tag liegt — eine zu kleine Gruppe
      könnte einem Angreifer mit Außenwissen erlauben, einen bestimmten Autor zu isolieren. Das
      ist eine prinzipielle, keine technische Grenze (WP-006 §7). Sie greift nur dort, wo sie
      zählt: ein ÖFFENTLICHER institutioneller Publisher — eine Regierungs-Pressestelle, eine
      Redaktion mit öffentlicher Artikel-URL — ist ausgenommen, weil der Text bereits öffentlich
      ist und der „Autor" eine Institution ist, keine Privatperson. Für betroffene Korpora:
      erweitern Sie den Zeitraum, um mehr Artikel desselben Tages zu sammeln, oder nutzen Sie
      die stets verfügbaren Aggregatansichten.
  methodological:
    short: "HTTP 403: k-Anonymitäts-Gate (WP-006 §7). Zählt Artikel in der (Quelle, Metrik, Tag)-Aggregationsgruppe, nicht eindeutige Quellen. Corpus-Class-skopiert — öffentliche institutionelle Quellen sind ausgenommen. Keine Einzelartikel-Daten exponiert."
    long: >
      Diese Verweigerung greift bei einem Layer-5-Lesezugriff (Einzelartikel-Detail), wenn die
      Aggregationsgruppe des Artikels — die eindeutigen Artikel mit demselben (Quelle, Metrik,
      UTC-Tag)-Schlüssel in `aer_gold.metrics` — weniger als k_min Dokumente enthält
      (konfigurierbar; Standard 10). Gezählt werden ARTIKEL in dieser Gruppe, nicht eindeutige
      Quellen. Das Gate existiert, weil die Exposition von Einzelartikel-Text aus einer zu
      kleinen Gruppe einem Angreifer mit Außenwissen erlauben könnte, einen bestimmten Autor zu
      re-identifizieren. Seit Phase 133 ist das Gate CORPUS-CLASS-SKOPIERT: Quellen einer
      öffentlich-institutionellen Klasse (`institutional-web` — Regierungs-Pressestellen,
      Redaktionen mit öffentlichen kanonischen URLs) sind ausgenommen (effektiv k_min = 1), da
      ihr Text bereits öffentlich und die Autorschaft institutionell statt individuell ist. Für
      Klassen, in denen Einzelpersonen deanonymisiert werden könnten (soziale Medien,
      nutzergenerierte Inhalte, später ergänzt), bleibt das Gate voll aktiv. Es wird serverseitig
      vom BFF durchgesetzt. Auflösung für betroffene Korpora: Zeitraum erweitern oder die stets
      verfügbaren Layer-3–4-Aggregatansichten nutzen. WP-006 §7 dokumentiert die Begründung und
      die Corpus-Class-Skopierung.
