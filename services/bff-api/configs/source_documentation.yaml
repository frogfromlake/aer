# source_documentation.yaml — static mirror of the PostgreSQL `sources`
# table (name, type, url) plus the `documentation_url` column added in
# migration 000007. BFF serves /api/v1/sources from this file so the BFF
# stays ClickHouse-only and does not require a direct Postgres connection.
#
# Keep in sync with infra/postgres/migrations/000002, 000003, and 000007.

sources:
  - name: bundesregierung
    type: rss
    url: https://www.bundesregierung.de/breg-de/aktuelles.rss
    documentation_url: docs/methodology/probe0_bias_profile.md

  - name: tagesschau
    type: rss
    url: https://www.tagesschau.de/index~rss2.xml
    documentation_url: docs/methodology/probe0_bias_profile.md

  - name: wikipedia
    type: scraper
    url: https://en.wikipedia.org/api/rest_v1/page/random/summary
    documentation_url: null
