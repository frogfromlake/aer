get:
  tags: [Reference]
  summary: List known data sources with methodology documentation
  description: >
    Returns the canonical list of data sources configured in AĒR together
    with optional links to their methodological documentation (e.g. bias
    profiles under `docs/methodology/`). When `silverOnly=true` (Phase
    103) the response is filtered to sources whose `silver_eligible`
    flag is set, so the dashboard's Silver-layer source picker avoids
    surfacing sources that the eligibility gate would refuse.
  operationId: getSources
  parameters:
    - $ref: '../parameters/silverOnly.yaml'
  responses:
    '200':
      description: The list of known sources.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Source'
    '500':
      $ref: '../responses/InternalServerError.yaml'
