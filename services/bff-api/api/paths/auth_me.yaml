get:
  tags: [Auth]
  summary: The currently authenticated user (ADR-040)
  description: >
    Returns the user bound to the session cookie. Used by the dashboard to
    hydrate the current-user store and gate the UI. Returns 401 when there is
    no valid session (e.g. a machine X-API-Key caller has no user identity).
  operationId: getAuthMe
  responses:
    '200':
      description: The authenticated user.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthUser.yaml'
    '401':
      description: No valid session.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
delete:
  tags: [Auth]
  summary: Delete the current user's account (DSGVO right to erasure) (ADR-040)
  description: >
    Right to erasure (DSGVO Art. 17). Permanently deletes the authenticated
    user; sessions and pending tokens cascade-delete. Clears the session cookie.
    Irreversible. Requires a session.
  operationId: deleteAuthMe
  responses:
    '204':
      description: Account deleted; session cookie cleared.
    '401':
      description: No valid session.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
