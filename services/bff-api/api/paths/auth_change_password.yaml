post:
  tags: [Auth]
  summary: Change password (authenticated, knows current password) (ADR-040)
  description: >
    Changes the password for the authenticated user after verifying the
    current password. No email round-trip. On success all OTHER sessions are
    invalidated; the current session stays valid. Requires a session.
  operationId: postAuthChangePassword
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ChangePasswordRequest.yaml'
  responses:
    '204':
      description: Password changed; other sessions invalidated.
    '400':
      description: Password fails the policy (`weak_password`).
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '401':
      description: Not authenticated, or the current password is wrong.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
