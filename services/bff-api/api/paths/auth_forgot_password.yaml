post:
  tags: [Auth]
  summary: Request a password reset (ADR-040)
  description: >
    Issues a single-use, short-lived password-reset token for the account (if
    one exists) and hands it to the configured email sender. The response is
    ALWAYS 202 regardless of whether the email maps to an account — no user
    enumeration. Pre-auth endpoint.
  operationId: postAuthForgotPassword
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ForgotPasswordRequest.yaml'
  responses:
    '202':
      description: Accepted. If an account exists, a reset link was dispatched.
    '500':
      $ref: '../responses/InternalServerError.yaml'
