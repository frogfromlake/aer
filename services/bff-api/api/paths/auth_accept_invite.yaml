post:
  tags: [Auth]
  summary: Accept an invitation — set password + record consent (ADR-040)
  description: >
    Exchanges a single-use invite token for an activated account: the invitee
    sets their own password and records the responsible-use agreement
    (LICENSE §3.2.b). On success the account becomes active, the token is
    consumed, and a session is established (auto-login) — the session cookie
    is set and the user is returned. Pre-auth endpoint.
  operationId: postAuthAcceptInvite
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/AcceptInviteRequest.yaml'
  responses:
    '200':
      description: Account activated. Sets the session cookie; returns the user.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthUser.yaml'
    '400':
      description: >
        Invalid/expired/consumed token, missing consent (`consent_required`),
        or a password that fails the policy (`weak_password`).
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
