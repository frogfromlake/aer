post:
  tags: [Auth]
  summary: Complete a password reset (ADR-040)
  description: >
    Exchanges a single-use reset token for a new password. On success the
    token is consumed and ALL existing sessions for the user are invalidated.
    Pre-auth endpoint (the token is the credential).
  operationId: postAuthResetPassword
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ResetPasswordRequest.yaml'
  responses:
    '204':
      description: Password reset; all sessions invalidated.
    '400':
      description: >
        Invalid/expired/consumed token (`invalid_token`) or a password that
        fails the policy (`weak_password`).
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
