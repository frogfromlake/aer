get:
  tags: [Metrics]
  summary: Cross-tab of a categorical metadata field against a numeric metric
  description: >
    For one categorical metadata `field` (e.g. `section`, `author`) and one
    numeric `metric` (e.g. `sentiment_score_sentiws`, `word_count`), returns —
    per category value — the number of distinct in-scope articles carrying both,
    and the mean and spread of the metric among them. Top-N by article count;
    `distinctValues` discloses the full cardinality.

    Joins `aer_gold.article_metadata` (the field, arrayJoin-expanded, FINAL) with
    `aer_gold.metrics` (the metric, pivoted per article) on `article_id`. Scope
    is resolved from the union of `scope`/`scopeId`, `probeIds`, `sourceIds`; at
    least one must be present. A cross-frame (multi-language) request requires a
    validated equivalence grant for the metric; absent that, a 400 refusal with a
    Level-1 alternative (WP-004 §5.2).
  operationId: getMetadataCrossTab
  parameters:
    - name: field
      in: path
      required: true
      description: Categorical metadata field name (e.g. `section`, `author`).
      schema:
        type: string
        minLength: 1
    - name: metric
      in: path
      required: true
      description: Numeric metric name (e.g. `sentiment_score_sentiws`, `word_count`).
      schema:
        type: string
        minLength: 1
    - $ref: '../parameters/scope.yaml'
    - name: scopeId
      in: query
      description: >
        Single scope target (probe id or source name). Required when `probeIds`
        and `sourceIds` are absent; optional otherwise.
      required: false
      schema:
        type: string
        minLength: 1
    - $ref: '../parameters/probeIds.yaml'
    - $ref: '../parameters/sourceIds.yaml'
    - $ref: '../parameters/windowStart.yaml'
    - $ref: '../parameters/windowEnd.yaml'
    - name: topN
      in: query
      description: Maximum number of categories to return (ranked by article count). Default 20, clamped to [1, 200].
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
  responses:
    '200':
      description: Cross-tab payload.
      content:
        application/json:
          schema:
            $ref: '../schemas/CrossTabResponse.yaml'
    '400':
      description: Invalid scope, malformed window, or a cross-frame equivalence refusal.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '404':
      description: Probe or source not found.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
