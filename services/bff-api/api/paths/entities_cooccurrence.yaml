get:
  tags: [Analysis]
  summary: Entity co-occurrence graph (Network Science x force-directed graph)
  description: >
    Aggregates `aer_gold.entity_cooccurrences` over the window, returns the
    top-N edges by summed `cooccurrence_count` plus the union of incident
    nodes. Backs the Network Science discipline view-mode cell.

    Scope is resolved from the union of `scopeId`, `probeIds`, and `sourceIds`.
    At least one must be present. Each node carries a `presence` field listing
    the resolved sources where it appears, enabling per-source shading in the
    force-directed graph (Phase 114).

    Edge cap: `topN` (default 50, max 6000 — Phase 125b raised the ceiling for
    the large-scale renderer). `minWeight` drops edges below a weight floor.
  operationId: getEntityCoOccurrence
  parameters:
    - $ref: '../parameters/scope.yaml'
    - name: scopeId
      in: query
      description: >
        Single scope target (probe id or source name). Required when `probeIds`
        and `sourceIds` are absent; optional otherwise.
      required: false
      schema:
        type: string
        minLength: 1
    - $ref: '../parameters/probeIds.yaml'
    - $ref: '../parameters/sourceIds.yaml'
    - $ref: '../parameters/windowStart.yaml'
    - $ref: '../parameters/windowEnd.yaml'
    - $ref: '../parameters/topN.yaml'
    - $ref: '../parameters/minWeight.yaml'
    - $ref: '../parameters/viewerLanguage.yaml'
    - name: nodeMetric
      in: query
      required: false
      description: >
        Phase 125 — when set, each node carries `metricValue` = the mean of this
        per-article metric over the articles where the entity appears, so the
        network cell can size/colour nodes by a metric. This is the SIZE channel
        metric when size and colour bind to different metrics.
      schema:
        type: string
        minLength: 1
    - name: nodeColorMetric
      in: query
      required: false
      description: >
        Phase 125 / ISSUE 7 — optional SECOND per-article metric for the COLOUR
        channel, so size (`nodeMetric`) and colour can bind to different metrics.
        When set and different from `nodeMetric`, each node carries
        `metricValueColor` = the mean of this metric. Omit (or set equal to
        `nodeMetric`) to colour by the same metric as size.
      schema:
        type: string
        minLength: 1
    - name: negativeSpaceOverlay
      in: query
      required: false
      description: >
        Phase 122d.2 — when `ghost`, each edge carries `nsSupport` = the number
        of its contributing articles whose timestamp is the crawler fetch time,
        not a real publication date (`timestamp_source='fetch_at_fallback'`). A
        reflexive disclosure ("this connection leans on undated articles", WP-005
        §3.1) — the edges are NOT filtered out. Default off (`nsSupport`=0).
      schema:
        type: string
        enum: [ghost]
  responses:
    '200':
      description: Top-N co-occurrence subgraph.
      content:
        application/json:
          schema:
            $ref: '../schemas/CoOccurrenceGraph.yaml'
    '400':
      description: Invalid scope or window.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '404':
      description: Probe or source not found.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
