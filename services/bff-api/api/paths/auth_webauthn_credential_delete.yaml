delete:
  tags: [Auth]
  summary: Delete one of the current user's passkeys (ADR-040)
  description: Removes a registered passkey by its id. Requires a session.
  operationId: deleteAuthWebauthnCredential
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    '204':
      description: Passkey removed.
    '401':
      description: No valid session.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '404':
      description: No such passkey for this user.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
