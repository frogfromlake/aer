get:
  tags: [Auth]
  summary: List the current user's passkeys (ADR-040)
  description: Returns the authenticated user's registered passkeys (no key material). Requires a session.
  operationId: getAuthWebauthnCredentials
  responses:
    '200':
      description: The user's passkeys.
      content:
        application/json:
          schema:
            $ref: '../schemas/WebAuthnCredentialsList.yaml'
    '401':
      description: No valid session.
      content:
        application/json:
          schema:
            $ref: '../schemas/AuthError.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
