get:
  tags: [Metrics]
  summary: Retrieve aggregated time-series metrics
  description: >
    Fetches gold-layer metrics for the dashboard's "weather map" visualization.
    The optional `source` parameter filters to a single source
    (backward-compatible); `sourceIds` accepts a comma-separated list and
    is unioned with `source` when both are present. When `normalization`
    is `zscore` or `percentile` (Phase 115) and the resolved scope spans
    multiple cultural-linguistic frames, the request additionally requires
    a deviation-level entry in `aer_gold.metric_equivalence`; absent that,
    the response is HTTP 400 with a `RefusalPayload`
    (gate=`metric_equivalence`).
  operationId: getMetrics
  parameters:
    - $ref: '../parameters/startDate.yaml'
    - $ref: '../parameters/endDate.yaml'
    - $ref: '../parameters/source.yaml'
    - $ref: '../parameters/sourceIds.yaml'
    - $ref: '../parameters/metricName.yaml'
    - $ref: '../parameters/normalization.yaml'
    - $ref: '../parameters/resolution.yaml'
  responses:
    '200':
      description: Envelope containing the time-series data points and query metadata.
      content:
        application/json:
          schema:
            $ref: '../schemas/MetricsResponse.yaml'
    '400':
      description: >
        Missing or invalid parameters; or a normalization request was refused
        by a methodological gate (Phase 115 cross-frame equivalence). When
        the 400 is a methodological refusal, the body's optional `gate`,
        `workingPaperAnchor`, and `alternatives` fields carry the same
        information a `RefusalPayload` would.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
