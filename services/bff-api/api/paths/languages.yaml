get:
  summary: Retrieve aggregated language detections
  description: Fetches detected languages aggregated across processed documents. Only rank-1 (top candidate) detections are included in the aggregation.
  operationId: getLanguages
  parameters:
    - $ref: '../parameters/startDate.yaml'
    - $ref: '../parameters/endDate.yaml'
    - $ref: '../parameters/source.yaml'
    - $ref: '../parameters/language.yaml'
    - $ref: '../parameters/limit.yaml'
  responses:
    '200':
      description: A list of aggregated language detection results.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/LanguageDetectionResult.yaml'
    '400':
      description: Missing required parameters.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
