get:
  tags: [Metrics]
  summary: Per-probe equivalence summary
  description: >
    Returns per-metric Level-1 / Level-2 / Level-3 availability (Phase 115).
    Drives the Probe Dossier "what comparisons are valid here" panel. With the
    optional `comparedTo=<otherProbeId>` parameter (Phase 124) the scope is the
    UNION of both probes' sources, so the matrix reports what is valid for the
    cross-probe pair — e.g. the temporal Level-1 grant reports `validated`.
  operationId: getProbeEquivalence
  parameters:
    - name: probeId
      in: path
      required: true
      description: >
        Probe identifier — the canonical string registered in the probe
        registry (e.g. `probe-0-de-institutional-web`), matching the
        `probeId` shape used by `/probes` and `/probes/{id}/dossier`.
      schema:
        type: string
        minLength: 1
    - name: comparedTo
      in: query
      required: false
      description: >
        Optional second probe id (Phase 124). When present, equivalence is
        evaluated over the union of both probes' source sets, giving the
        cross-probe pair's valid-comparison matrix.
      schema:
        type: string
        minLength: 1
  responses:
    '200':
      description: Per-metric equivalence availability for the probe.
      content:
        application/json:
          schema:
            $ref: '../schemas/ProbeEquivalenceSummary.yaml'
    '404':
      description: No probe with that id is registered.
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
    '500':
      $ref: '../responses/InternalServerError.yaml'
