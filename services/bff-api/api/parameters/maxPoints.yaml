name: maxPoints
in: query
description: >
  Maximum number of per-article points to return for the scatter cloud,
  ordered deterministically by article id. Server clamps values outside
  [1, 10000] to the nearest bound. When the in-window article set exceeds
  this cap the response sets `truncated=true` so the dashboard can surface a
  "showing N of M" note rather than implying the cloud is exhaustive.
required: false
schema:
  type: integer
  default: 2000
  minimum: 1
  maximum: 10000
