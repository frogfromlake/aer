name: resolution
in: query
description: >
  Temporal aggregation resolution for the returned series.
  Maps to ClickHouse bucketing functions: 5min → toStartOfFiveMinute,
  hourly → toStartOfHour, daily → toStartOfDay, weekly → toStartOfWeek,
  monthly → toStartOfMonth.
  Wider buckets relax the per-request row cap proportionally.
required: false
schema:
  type: string
  enum:
    - 5min
    - hourly
    - daily
    - weekly
    - monthly
  default: 5min
