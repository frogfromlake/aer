name: topN
in: query
description: >
  Maximum number of co-occurrence edges to return, ranked by aggregated
  weight. Server clamps values outside [1, 6000] to the nearest bound. The
  default SVG renderer requests a small value (~60); the large-scale WebGL
  renderer (maximized single-cell view, Phase 125b) requests a high value.
required: false
schema:
  type: integer
  default: 50
  minimum: 1
  maximum: 6000
