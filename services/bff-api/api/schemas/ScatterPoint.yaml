type: object
description: >
  One per-article point in a paired-metric scatter. `x` and `y` are always
  present (the article carried both position metrics); `size` and `color`
  are present only when the request bound those visual channels AND the
  article carried the corresponding metric.
required:
  - x
  - y
  - source
  - timestamp
properties:
  x:
    type: number
    format: double
    description: Value of the request's `xMetric` for this article.
  y:
    type: number
    format: double
    description: Value of the request's `yMetric` for this article.
  size:
    type: number
    format: double
    description: >
      Value of the request's `sizeMetric` for this article. Absent when the
      size channel is unbound or the article lacks that metric.
  color:
    type: number
    format: double
    description: >
      Value of the request's `colorMetric` for this article. Absent when the
      colour channel is unbound or the article lacks that metric.
  source:
    type: string
    description: The source that produced the article.
  articleId:
    type: string
    description: >
      The article identifier, when available (used for the publication-ready
      data export so a point traces back to its document).
  timestamp:
    type: string
    format: date-time
    description: The article's publication timestamp.
