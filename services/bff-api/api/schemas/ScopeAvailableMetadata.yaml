type: object
description: >
  Per-scope categorical-metadata availability (Phase 133) — the categorical
  analog of ScopeAvailableMetrics. Drives the dimension picker's metadata
  group so a cross-probe panel never binds a field absent on some scoped source.
required:
  - scopedSources
  - available
  - partial
properties:
  scopedSources:
    type: array
    description: The resolved source names the availability was computed over.
    items:
      type: string
  available:
    type: array
    description: >
      Categorical metadata fields that have data for EVERY scoped source in the
      window. The only fields safe to bind on a panel spanning the whole scope.
    items:
      type: string
  partial:
    type: array
    description: >
      Fields present for SOME but not all scoped sources, with the subset of
      sources that carry them. Surfaced as an explanatory hint, never offered
      for binding (unless the user opts in).
    items:
      type: object
      required:
        - field
        - sources
      properties:
        field:
          type: string
        sources:
          type: array
          description: The scoped sources that have data for this field.
          items:
            type: string
  degenerate:
    type: array
    description: >
      Categorical fields whose value is CONSTANT across the whole scope (exactly
      one distinct value) — present, but carrying no signal: grouping/cross-tab
      by a constant field is meaningless. The dashboard drops these from the
      dimension picker, but they are disclosed here with the constant value so
      the omission is never silent (ADR-039 DISCLOSE-NEVER-COERCE). Self-
      maintaining: a future source that introduces real variance removes the
      field from this list automatically.
    items:
      type: object
      required:
        - field
        - value
      properties:
        field:
          type: string
        value:
          type: string
          description: The single constant value observed across the scope.
  lowSignal:
    type: array
    description: >
      Available fields with ≥2 distinct values but a strongly DOMINANT value
      (near-constant: dominantShare ≥ the disclosed display threshold). Unlike
      `degenerate` these are NOT dropped — a rare-but-real minority category must
      stay reachable — only DISCLOSED so a cell/picker can flag "effectively
      constant — NN% <value>". This carries the raw concentration measurement;
      the backend only measures, it does not drop. The threshold that decides
      membership is an engineering-default *display* cutoff (provisional), not a
      methodological constant.
    items:
      type: object
      required:
        - field
        - distinctValues
        - dominantShare
        - dominantValue
      properties:
        field:
          type: string
        distinctValues:
          type: integer
          description: Number of distinct values for the field across the scope.
        dominantShare:
          type: number
          description: >
            Fraction of in-scope articles carrying the single most common value
            (0..1). A value near 1 means the field is effectively constant.
        dominantValue:
          type: string
          description: The single most common value for the field across the scope.
  windowStart:
    type: string
    format: date-time
  windowEnd:
    type: string
    format: date-time
