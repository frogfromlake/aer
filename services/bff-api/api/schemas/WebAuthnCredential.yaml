type: object
description: A registered passkey, for display (no key material) (ADR-040).
required: [id, createdAt]
properties:
  id:
    type: string
    description: Opaque credential row id (used to delete it).
  name:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
  lastUsedAt:
    type: string
    format: date-time
    nullable: true
