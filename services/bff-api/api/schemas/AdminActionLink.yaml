type: object
description: >
  The one-time link produced by an admin action (invite or admin-initiated
  password reset). The same link is dispatched through the configured
  transactional-email relay (Phase 153) and ALSO returned here as the
  break-glass channel: when `delivered` is false the admin delivers `link`
  manually (relay unconfigured or send failed).
required:
  - userId
  - email
  - kind
  - link
properties:
  userId:
    type: string
  email:
    type: string
    format: email
  kind:
    type: string
    description: One of `invite`, `password_reset`.
  link:
    type: string
    description: The accept-invite / reset-password link carrying the single-use token.
  delivered:
    type: boolean
    description: >
      Whether the link was dispatched through a real transactional-email relay
      (Phase 153). False when the relay is not configured (LogSender fallback)
      or the send failed — the admin must then deliver `link` manually.
