type: object
description: >
  Composite payload backing Surface II's Probe Dossier (Design Brief §4.2.1
  in the Iteration 5 rewrite). The dossier answers a serious user's first
  question — *what is actually in this probe?* — by combining the probe's
  structural identity with the per-source counts and frequencies needed to
  drive the source cards on the Dossier landing.

  The payload is composed server-side rather than fetched as separate
  resources because the Dossier is the canonical Surface II landing and the
  client must avoid request waterfalls on first paint.
required:
  - probeId
  - language
  - sources
  - functionCoverage
properties:
  probeId:
    type: string
    description: Canonical probe identifier (matches `/probes` and `/content/probe/{probeId}`).
    example: probe-0-de-institutional-rss
  language:
    type: string
    description: Primary publication language (ISO 639-1).
    example: de
  windowStart:
    type: string
    format: date-time
    nullable: true
    description: >
      Start of the window over which per-source `articlesInWindow` counts
      were computed. Null when no window was supplied.
  windowEnd:
    type: string
    format: date-time
    nullable: true
    description: End of the article-count window. Null when no window was supplied.
  functionCoverage:
    type: object
    description: >
      Probe-level WP-001 §5.1 function coverage — how many of the four
      discourse functions the probe's sources collectively address. A
      derived property; not a constraint on the probe.
    required:
      - covered
      - total
      - functions
    properties:
      covered:
        type: integer
        minimum: 0
        maximum: 4
        description: Number of distinct primary functions present.
        example: 2
      total:
        type: integer
        description: Total catalog size (always 4 — the WP-001 functions).
        example: 4
      functions:
        type: array
        description: The distinct primary functions present in this probe.
        items:
          type: string
          enum: [epistemic_authority, power_legitimation, cohesion_identity, subversion_friction]
  sources:
    type: array
    description: One card per source in the probe, ordered by source name.
    items:
      $ref: './ProbeDossierSource.yaml'
