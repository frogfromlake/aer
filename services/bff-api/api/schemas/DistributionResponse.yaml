type: object
description: >
  Per-scope distribution of a metric over a time window. Includes both
  histogram bins and a quantile summary so the frontend can render
  histogram, density, ridgeline, or violin without a second round-trip.
required:
  - metricName
  - bins
  - summary
  - clampedUpper
  - overflowCount
properties:
  metricName:
    type: string
    description: The metric name that was queried.
  scope:
    type: string
    description: The resolved scope (`probe` or `source`).
  scopeId:
    type: string
    description: The resolved scope identifier.
  windowStart:
    type: string
    format: date-time
    nullable: true
    description: Resolved lower window bound; null when the query was unbounded (whole dataset).
  windowEnd:
    type: string
    format: date-time
    nullable: true
    description: Resolved upper window bound; null when unbounded.
  clampedUpper:
    type: number
    format: double
    description: >
      Upper bound of the histogram bin domain. Equals `summary.max` when no
      outliers were detected; otherwise the Tukey upper fence
      (p75 + 1.5·IQR), with values above it diverted into `overflowCount` so
      a single extreme value cannot collapse the visible distribution into
      one bar (Phase 133 B). The `summary` still reports the true max.
  overflowCount:
    type: integer
    format: int64
    minimum: 0
    description: >
      Number of articles whose value exceeds `clampedUpper`. Zero when the
      distribution was not clamped. Disclosed so the robust clamp is never a
      silent truncation.
  bins:
    type: array
    description: >
      Histogram bins ordered ascending by `lower`, spanning `[summary.min,
      clampedUpper]`. Values above `clampedUpper` are NOT in these bins —
      see `overflowCount`.
    items:
      type: object
      required: [lower, upper, count]
      properties:
        lower:
          type: number
          format: double
          description: Inclusive lower edge of the bin.
        upper:
          type: number
          format: double
          description: Exclusive upper edge of the bin (inclusive on the last bin).
        count:
          type: integer
          format: int64
          minimum: 0
  summary:
    type: object
    required: [count, min, max, mean, median, p05, p25, p75, p95]
    description: Quantile and basic statistics for the same window.
    properties:
      count:
        type: integer
        format: int64
        minimum: 0
      min:
        type: number
        format: double
      max:
        type: number
        format: double
      mean:
        type: number
        format: double
      median:
        type: number
        format: double
      p05:
        type: number
        format: double
      p25:
        type: number
        format: double
      p75:
        type: number
        format: double
      p95:
        type: number
        format: double
  streams:
    type: array
    description: >
      Per-segment payloads populated when `segmentBy` is set. Absent when
      `segmentBy` is not requested. The aggregate `bins` and `summary` are
      always present and reflect the full union scope (Phase 114).
    items:
      $ref: 'DistributionStream.yaml'
