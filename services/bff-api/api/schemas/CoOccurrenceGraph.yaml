type: object
description: >
  Aggregated entity-pair co-occurrence graph for the Network Science x
  force-directed-graph view mode. Edges are the top-N pairs by summed
  cooccurrence_count over the window; nodes are the union of incident
  entities, sized by their per-window total mention count.
required:
  - topN
  - nodes
  - edges
properties:
  scope:
    type: string
  scopeId:
    type: string
  windowStart:
    type: string
    format: date-time
    nullable: true
    description: Resolved lower window bound; null when the query was unbounded (whole dataset).
  windowEnd:
    type: string
    format: date-time
    nullable: true
    description: Resolved upper window bound; null when unbounded.
  topN:
    type: integer
    format: int64
    description: The effective top-N applied (post-clamp).
  nodes:
    type: array
    items:
      type: object
      required: [text, label, degree, totalCount]
      properties:
        text:
          type: string
        label:
          type: string
        degree:
          type: integer
          format: int64
          minimum: 0
          description: Number of distinct neighbours in the returned edge set.
        totalCount:
          type: integer
          format: int64
          minimum: 0
          description: Sum of edge weights incident on this node.
        presence:
          type: array
          description: >
            Source names where this entity appears within the returned edge set
            and window. Populated when the scope covers multiple sources, so
            the frontend can render per-source incident shading without a
            follow-up call (Phase 114).
          items:
            type: string
        wikidataQid:
          type: string
          nullable: true
          description: >
            Canonical Wikidata QID resolved by the Phase 118 entity-linking
            step, or null when the node could not be linked. Lets the frontend
            surface Wikipedia/Wikidata external links on graph nodes without a
            follow-up call.
        viewerLabel:
          type: string
          nullable: true
          description: >
            Phase 123b cross-lingual relabel. The QID's display label in the
            requested `viewerLanguage`, or null when no viewer language was
            requested, the node has no QID, or no label exists for that
            language. The frontend relabels a node only when this is present;
            otherwise it keeps the source surface form (`text`). This is the
            per-language rdfs:label Wikidata publishes — never a machine
            translation.
        metricValue:
          type: number
          format: double
          nullable: true
          description: >
            Phase 125 node-metric binding. The mean of the requested `nodeMetric`
            over the articles where this entity appears, or null when no
            `nodeMetric` was requested or no article carrying it mentions the
            entity. Lets the network cell size/colour nodes by a metric (e.g.
            mean sentiment of the mentioning articles) rather than only
            graph-intrinsic degree/weight.
  edges:
    type: array
    items:
      type: object
      required: [a, b, weight, articleCount]
      properties:
        a:
          type: string
          description: Lexicographically smaller entity text in the pair.
        b:
          type: string
        aLabel:
          type: string
        bLabel:
          type: string
        weight:
          type: integer
          format: int64
          minimum: 1
          description: Sum of cooccurrence_count over articles in the window.
        articleCount:
          type: integer
          format: int64
          minimum: 1
          description: Number of distinct articles contributing to this edge.
        presence:
          type: array
          description: >
            Source names this edge was observed in within the returned window
            (Phase 131a). Lets the frontend render a source-coloured overlay on
            a merged multi-source graph without a follow-up call. Populated
            whenever the scope covers multiple sources; omitted (or a single
            entry) for single-source scopes.
          items:
            type: string
  articlesInScope:
    type: integer
    format: int64
    minimum: 0
    description: >
      Count of distinct articles in the window whose `aer_gold.entities`
      contain ≥2 entities for the resolved scope. The Phase 131a
      pipeline-gap diagnostic: when `articlesInScope > 0` but `edges` is
      empty, the dashboard surfaces a "pipeline gap" hint instead of
      "sparse corpus" — distinguishing missing data from a missing
      sweep. Always populated.
  linkedNodeCount:
    type: integer
    format: int64
    minimum: 0
    description: >
      Phase 123b — how many returned nodes carry a Wikidata QID (the subset
      the cross-lingual relabel toggle can act on). The dashboard shows the
      linked-vs-unlinked coverage ratio against `len(nodes)` so a reader knows
      how much of a foreign-language graph the toggle can relabel (WP-006
      no-silent-gaps). Always populated.
  labeledNodeCount:
    type: integer
    format: int64
    minimum: 0
    description: >
      Phase 123b — how many nodes received a `viewerLabel` in the requested
      `viewerLanguage` (always ≤ `linkedNodeCount`; a linked QID may lack a
      label in that language). Zero when no viewer language was requested.
