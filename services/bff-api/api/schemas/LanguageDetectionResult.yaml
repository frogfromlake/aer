type: object
required:
  - detectedLanguage
  - count
  - avgConfidence
  - sources
properties:
  detectedLanguage:
    type: string
    description: ISO 639-1 language code (e.g., "de", "en").
  count:
    type: integer
    format: int64
    description: Number of documents where this language was detected as the top candidate.
  avgConfidence:
    type: number
    format: double
    description: Average confidence score for this language across matched documents.
  sources:
    type: array
    items:
      type: string
    description: Distinct data sources that produced this language detection.
