type: object
description: >
  Multi-scope CoOccurrence query body (Phase 122i / ADR-034). Each
  `ScopeGroup` is a `(probeIds, sourceIds)` slice of the corpus; the
  handler unions all groups before issuing the underlying ClickHouse
  query. Empty `sourceIds` on a group means "all sources of the group's
  probes".
required:
  - scopes
properties:
  scopes:
    type: array
    minItems: 1
    description: >
      One or more ScopeGroups. The handler unions the resolved sources
      across groups and asserts the 100-source / 25-probe cap on the
      union (not on the individual group).
    items:
      type: object
      required: [probeIds, sourceIds]
      properties:
        probeIds:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        sourceIds:
          type: array
          description: Empty array = all sources of the group's probes.
          items:
            type: string
            minLength: 1
  windowStart:
    type: string
    format: date-time
    description: >
      Inclusive start of the query window (RFC 3339). Optional — omit BOTH
      windowStart and windowEnd for the whole dataset (no time filter);
      supplying one without the other is rejected.
  windowEnd:
    type: string
    format: date-time
    description: >
      Exclusive end of the query window (RFC 3339). Optional — see windowStart.
  topN:
    type: integer
    minimum: 1
    maximum: 6000
    default: 50
    description: >
      Maximum number of co-occurrence edges to return. Server clamps
      values outside [1, 6000] to the nearest bound (same ceiling as the
      GET endpoint and the cooccurrence-network config UI).
  viewerLanguage:
    type: string
    minLength: 2
    maxLength: 8
    description: >
      Optional viewer-language code (e.g. `de`) for the cross-lingual relabel
      toggle (Phase 123b). When present, each node's resolved QID is looked up
      in `aer_gold.wikidata_labels` and the display label in that language is
      attached as `viewerLabel`; unlinked nodes (and QIDs lacking a label in
      this language) keep their source surface form. Absent = no relabelling.
      Swaps in the per-language Wikidata label, never a machine translation.
