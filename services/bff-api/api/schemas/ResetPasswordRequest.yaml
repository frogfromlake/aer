type: object
description: >
  Completes a password reset (ADR-040) with a single-use reset token. On
  success every existing session for the user is invalidated.
required:
  - token
  - password
properties:
  token:
    type: string
    description: The single-use password-reset token from the reset link.
  password:
    type: string
    minLength: 12
    description: The new password. Minimum length re-checked server-side.
