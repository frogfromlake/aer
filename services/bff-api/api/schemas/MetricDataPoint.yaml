type: object
required:
  - timestamp
  - value
  - source
  - metricName
properties:
  timestamp:
    type: string
    format: date-time
    description: The UTC timestamp of the aggregation interval.
  value:
    type: number
    format: double
    description: The aggregated sociological metric value.
  source:
    type: string
    description: The data source that produced this metric (e.g., "tagesschau", "bundesregierung").
  metricName:
    type: string
    description: The name of the metric (e.g., "word_count", "sentiment_score").