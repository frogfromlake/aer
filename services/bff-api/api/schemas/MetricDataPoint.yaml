type: object
required:
  - timestamp
  - value
  - source
  - metricName
properties:
  timestamp:
    type: string
    format: date-time
    description: The UTC timestamp of the aggregation interval.
  value:
    type: number
    format: double
    description: The aggregated sociological metric value.
  source:
    type: string
    description: The data source that produced this metric (e.g., "tagesschau", "bundesregierung").
  metricName:
    type: string
    description: The name of the metric (e.g., "word_count", "sentiment_score").
  count:
    type: integer
    format: int64
    minimum: 0
    description: >
      Number of gold-layer rows (i.e. per-document metric emissions) that
      contributed to `value` in this bucket. Distinct from `value`, which
      is the aggregated statistic (typically avg). Callers needing a
      document rate — e.g. the Atmosphere's per-probe pulse — must use
      `count / window_hours`, not the metric value itself, because most
      metrics store a per-document *measurement* (hour-of-day, sentiment,
      word count), not a document tally.
  stddev:
    type: number
    format: double
    minimum: 0
    description: >
      Sample standard deviation (Bessel-corrected) of the per-document
      metric values that contributed to `value` in this bucket. Populated
      only when the request set `includeStddev=true` (Phase 131); absent
      otherwise. Powers the time-series uncertainty band (±1σ around
      `value`). Computed from the raw `aer_gold.metrics` table — the
      pre-aggregated resolution MVs do not carry a variance state — so a
      spread-bearing request always reads the raw layer regardless of
      resolution. Buckets with fewer than two contributing rows report 0
      (the sample stddev is undefined for n<2).