type: object
description: A saved Workbench analysis as shown in the list (no state blob) (Phase 135).
required: [id, name, description, ownerEmail, createdAt, updatedAt, permission, owned]
properties:
  id: { type: string }
  name: { type: string }
  description: { type: string }
  ownerEmail: { type: string, format: email, description: The creator's email. }
  createdAt: { type: string, format: date-time }
  updatedAt: { type: string, format: date-time }
  permission: { type: string, description: "The viewer's effective permission — `editable` or `readable`." }
  owned: { type: boolean, description: True when the viewer is the owner. }
