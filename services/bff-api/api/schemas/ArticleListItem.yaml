type: object
description: >
  Light-weight article reference returned by the article-browsing endpoint.
  Carries enough metadata for a list view without leaking cleaned text.
  Cleaned text and full provenance are served from `/articles/{id}` and are
  subject to the k-anonymity gate (WP-006 §7).
required:
  - articleId
  - source
  - timestamp
properties:
  articleId:
    type: string
    description: SHA-256 hash of source + bronze_object_key (worker-derived).
    example: 7c1c1f...
  source:
    type: string
    description: Canonical source name.
  timestamp:
    type: string
    format: date-time
    description: Publication timestamp from SilverCore.
  timestampSource:
    type: string
    nullable: true
    description: >
      Phase 122d.2 — provenance of `timestamp`. `fetch_at_fallback` means the
      timestamp is the crawler fetch time, not a real publication date (the
      Temporal-Provenance-Absence Negative-Space class — WP-005 §3.1: "a
      publication gap is an observation gap, not a discourse gap"). Other values
      (`json_ld_published`, `open_graph_published`, …) are real dates; absent/
      empty = a legacy/non-web row predating this provenance dimension.
  language:
    type: string
    nullable: true
    description: Top language detection result for the article (ISO 639-1).
  wordCount:
    type: integer
    nullable: true
    description: Word count from `aer_gold.metrics`.
  sentimentScore:
    type: number
    nullable: true
    description: Sentiment score from `aer_gold.metrics` (provisional, WP-002).
  chainLength:
    type: integer
    nullable: true
    description: >
      Number of archived CAPTURES detected for this article (Wayback CDX
      snapshots + republication triggers) — a coverage/tooling count, NOT a
      revision count (most captures are identical re-archivals). Only present
      when the request opts in via `?includeRevisions=true`. For "how often
      the article was actually edited", use `editorialChangeCount`.
  editorialChangeCount:
    type: integer
    nullable: true
    description: >
      Phase 133 — number of CONFIRMED editorial changes for this article
      (content/headline changed between consecutive observed states, incl.
      newest-snapshot → current). This is the only count surfaced as
      "revisions". 0 = observed but never edited. Only present when the
      request opts in via `?includeRevisions=true`.
  hasHeadlineChange:
    type: boolean
    nullable: true
    description: >
      Phase 122d.1 — true iff at least one revision in this article's
      chain reports `headline_changed=true`. Only present when the
      request opts in via `?includeRevisions=true`.
  latestRevisionAt:
    type: string
    format: date-time
    nullable: true
    description: >
      Phase 122d.1 — timestamp of the most recent revision in this
      article's chain. Only present when the request opts in via
      `?includeRevisions=true`.
