type: string
description: >
  Temporal aggregation resolution. "5min" is computed at query time from
  `aer_gold.metrics` (raw, 365-day TTL); "hourly" / "daily" / "monthly"
  resolve to pre-aggregated AggregatingMergeTree materialized views
  (`metrics_hourly` 365 d TTL / `metrics_daily` 1825 d TTL / `metrics_monthly`
  no TTL) activated in Phase 122c per WP-005 ôÏ5.4. "weekly" rebins the
  daily MV via `toStartOfWeek` at query time. The enum and request shape
  are unchanged from Phase 66; the routing is invisible to the client.
enum:
  - 5min
  - hourly
  - daily
  - weekly
  - monthly
example: hourly
