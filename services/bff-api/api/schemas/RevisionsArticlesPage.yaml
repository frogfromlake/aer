type: object
description: >
  Paginated list of articles with at least one revision in the
  active window (Phase 122d.1 / ADR-032 amendment). Powers the
  Workbench drill-down from a `revision_activity` bar or a
  `revision_timeline` bucket-point into the article list backing
  the signal. Cursor-based pagination identical to
  `/sources/{id}/articles` for consistency.
required:
  - items
  - hasMore
properties:
  items:
    type: array
    items:
      type: object
      required:
        - articleId
        - source
        - timestamp
        - chainLength
        - editorialChangeCount
        - hasHeadlineChange
      properties:
        articleId:
          type: string
        source:
          type: string
        timestamp:
          type: string
          format: date-time
          description: Article's published date.
        language:
          type: string
          nullable: true
        wordCount:
          type: integer
          nullable: true
        chainLength:
          type: integer
          minimum: 1
          description: >
            Total archived CAPTURES detected for this article in the window
            (Wayback CDX snapshots + republication triggers). This is a
            tooling/coverage count — most captures are identical
            re-archivals, NOT source edits. For "how often was the article
            actually changed", use `editorialChangeCount`.
        editorialChangeCount:
          type: integer
          minimum: 0
          description: >
            Number of captures whose content differs editorially from the
            previous one (paragraph/headline change after extraction) — i.e.
            how many times the source actually revised the article, as
            witnessed. Excludes identical re-archivals. A lower bound while
            some pairs are still being diffed (Phase 133).
        hasHeadlineChange:
          type: boolean
          description: >
            True iff at least one revision in the chain reports
            `headline_changed=true`.
        latestRevisionAt:
          type: string
          format: date-time
          description: Timestamp of the most recent revision in the chain.
  hasMore:
    type: boolean
  nextCursor:
    type: string
    description: Opaque cursor token; pass back on the next request.
