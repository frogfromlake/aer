type: object
required:
  - metricName
  - validationStatus
properties:
  metricName:
    type: string
    description: The name of the metric.
    example: word_count
  displayLabel:
    type: string
    nullable: true
    description: >
      Human-friendly label for the metric in the requested `locale` (Task B),
      e.g. "Sentiment Score · BERT Multilingual" for
      `sentiment_score_bert_multilingual`. Resolved from the per-locale content
      catalogue; null when the metric has no catalogue entry yet — the client
      then falls back to `metricName` so a newly-added extractor never renders
      a blank label.
    example: Word Count
  validationStatus:
    $ref: './ValidationStatus.yaml'
  eticConstruct:
    type: string
    nullable: true
    description: >
      The etic construct this metric maps to in the equivalence registry
      (e.g., "evaluative_polarity"). Null if no equivalence entry exists.
    example: null
  equivalenceLevel:
    nullable: true
    deprecated: true
    description: >
      DEPRECATED (Phase 115): superseded by `equivalenceStatus.level`.
      Retained for one release cycle so existing dashboard URL state and
      tests do not break in the same commit. Mirrors
      `equivalenceStatus.level`.
    allOf:
      - $ref: './EquivalenceLevel.yaml'
  equivalenceStatus:
    nullable: true
    description: >
      Structured equivalence status (Phase 115) — level, validatedBy,
      validationDate, and `notes` rationale summary mirrored from
      `aer_gold.metric_equivalence.notes`. Null if no equivalence entry
      exists for this metric.
    allOf:
      - $ref: './EquivalenceStatus.yaml'
  minMeaningfulResolution:
    nullable: true
    description: >
      The finest temporal resolution at which this (metric, source) pair
      yields statistically meaningful aggregates. Derived from a static
      BFF config map seeded by Probe 0 publication rates. Null if no
      heuristic has been recorded for the metric-source pair.
    allOf:
      - $ref: './Resolution.yaml'
