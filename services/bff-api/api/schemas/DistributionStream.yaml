type: object
description: >
  Per-segment distribution payload returned when `segmentBy` is set.
  Each stream carries the same histogram and quantile fields as the
  aggregate DistributionResponse, scoped to the individual segment.
required:
  - id
  - label
  - scopeKind
  - bins
  - summary
properties:
  id:
    type: string
    description: Segment identifier (source name or probe id).
  label:
    type: string
    description: Display label for the segment.
  scopeKind:
    type: string
    description: "Segment kind: `source` or `probe`."
  bins:
    type: array
    description: Histogram bins ordered ascending by `lower`.
    items:
      type: object
      required: [lower, upper, count]
      properties:
        lower:
          type: number
          format: double
        upper:
          type: number
          format: double
        count:
          type: integer
          format: int64
          minimum: 0
  summary:
    type: object
    required: [count, min, max, mean, median, p05, p25, p75, p95]
    properties:
      count:
        type: integer
        format: int64
        minimum: 0
      min:
        type: number
        format: double
      max:
        type: number
        format: double
      mean:
        type: number
        format: double
      median:
        type: number
        format: double
      p05:
        type: number
        format: double
      p25:
        type: number
        format: double
      p75:
        type: number
        format: double
      p95:
        type: number
        format: double
