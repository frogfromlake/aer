type: object
description: A user row as seen by an admin (ADR-040, Phase 134).
required:
  - id
  - email
  - firstName
  - lastName
  - role
  - status
  - createdAt
properties:
  id:
    type: string
    description: Opaque user id.
  email:
    type: string
    format: email
  firstName:
    type: string
    description: Given name (Phase 148e). May be empty for a pre-names account.
  lastName:
    type: string
    description: Family name (Phase 148e). May be empty for a pre-names account.
  role:
    type: string
    description: One of `admin`, `researcher`.
  status:
    type: string
    description: One of `invited`, `active`, `suspended`.
  createdAt:
    type: string
    format: date-time
