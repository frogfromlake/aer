type: object
description: >
  Paragraph-aligned diff for one article-revision pair (Phase 122d.1 /
  ADR-032 amendment, BUG-11 amendment). Two pair kinds exist:

    * `revisionIndex=0` (chain_head): pair is `current Silver body →
      Wayback[0]` — answers "what has the publisher changed since
      the last Wayback archive". Makes articles with chainLength=1
      diffable.
    * `revisionIndex>0` (mid_chain): pair is `Wayback[n-1] →
      Wayback[n]` — diff between two consecutive archived snapshots.

  Equal paragraphs are intentionally not included — the payload is
  sparse; the consumer should not expect a complete document
  reconstruction. When the two snapshots parse to identical
  paragraph content, `identical=true` and `diffParagraphs` is empty
  (BUG-10 distinct from `404 pending`).
required:
  - articleId
  - revisionIndex
  - snapshotAtAfter
  - headlineChanged
  - diffParagraphs
  - pairKind
  - identical
properties:
  articleId:
    type: string
    description: SHA-256 article identifier.
  revisionIndex:
    type: integer
    minimum: 0
    description: >
      Zero-based position of the LATER snapshot. `0` is the chain
      head (current Silver → Wayback[0]); values > 0 compare
      consecutive Wayback snapshots.
  pairKind:
    type: string
    enum: [chain_head, mid_chain]
    description: >
      `chain_head` when `revisionIndex=0` (Silver-now → Wayback[0]).
      `mid_chain` otherwise.
  identical:
    type: boolean
    description: >
      True when the worker computed the diff and found the two
      snapshots parsed to identical paragraph content. The
      `diffParagraphs` array is empty in that case — the dashboard
      surfaces this as "snapshots identical after extraction",
      distinct from a 404 "diff pending".
  snapshotAtBefore:
    type: string
    format: date-time
    nullable: true
    description: >
      Wayback capture time of the earlier snapshot. Null for
      `chain_head` pairs (the "before" side is the live Silver
      body, with no archive timestamp).
  snapshotAtAfter:
    type: string
    format: date-time
    description: Wayback capture time of the later snapshot.
  headlineChanged:
    type: boolean
    description: >
      True iff the article's headline (extracted via trafilatura
      metadata with a Wayback-toolbar-stripping fallback) differs
      between the two snapshots. Engineering-derived signal — not a
      methodological canon; see ADR-037 for the disclosure prose.
  headlineBefore:
    type: string
    description: Title at the earlier snapshot; empty when `headlineChanged=false`.
  headlineAfter:
    type: string
    description: Title at the later snapshot; empty when `headlineChanged=false`.
  diffParagraphs:
    type: array
    description: >
      Ordered list of paragraph-level ops. Equal paragraphs are not
      included — the payload is sparse. Op vocabulary:
      `add` (paragraph inserted), `del` (paragraph removed),
      `mod` (paragraph modified — similarity ≥ 0.4 between before
      and after).
    items:
      type: object
      required:
        - op
      properties:
        op:
          type: string
          enum: [add, del, mod]
          description: Op type.
        before:
          type: string
          description: Original paragraph text (`del`, `mod`).
        after:
          type: string
          description: Replacement paragraph text (`add`, `mod`).
