type: object
description: >
  A probe is a bundle of one or more data sources that share a
  methodological identity (language, institutional role, classification
  tier). Probes are the unit of rendering on the Atmosphere surface.

  This schema intentionally carries no `reach` field. A probe's reach —
  where its content is consumed and discursively effective — cannot be
  measured from emission data alone and is not claimed by AĒR. Only the
  emission origin(s) are asserted here.

  Dual-Register content (emic designation, methodological register) is
  served separately via `/content/probe/{probeId}` and composed on the
  client. Keeping structural data and editorial content on different
  endpoints lets the content catalog evolve (versioning, locale
  switching) without perturbing the typed geometry feed.
required:
  - probeId
  - displayName
  - shortName
  - language
  - emissionPoints
  - sources
properties:
  probeId:
    type: string
    description: >
      Canonical machine identifier, matching the dossier directory under
      `docs/probes/` and the `probe` content-catalog key. Stable and
      load-bearing (URL state, content keys); follows the convention
      `probe-<n>-<iso2>-<corpus-class>`. Not intended for display — use
      `displayName` / `shortName` in the UI.
    example: probe-0-de-institutional-web
  displayName:
    type: string
    description: >
      Human-friendly probe name for UI display (globe banner, dossier
      headers, comparison strip). Set in the probe config; the server falls
      back to `probeId` when it is omitted, so this field is always present.
    example: "Germany — Institutional Web"
  shortName:
    type: string
    description: >
      Compact label for dense UI (globe markers, comparison chips). The
      server falls back to `displayName` (then `probeId`) when omitted.
    example: "DE · Institutional"
  language:
    type: string
    description: >
      Primary publication language as an ISO 639-1 code. Used by the
      client for content catalog locale fallback and for future
      language-scoped aggregations. Not a reach claim.
    example: de
  country:
    type: string
    nullable: true
    description: >
      Operator-declared primary country of the probe's emission origin(s),
      as an ISO 3166-1 alpha-2 code (e.g. `DE`, `FR`). This is an explicit,
      auditable classification set when the probe is registered — NOT inferred
      from language or coordinates. A universal facet for the Dossier search
      overlay (probe / source / language / country); never a reach claim.
    example: DE
  emissionPoints:
    type: array
    minItems: 1
    description: >
      Geographic origins of the probe's bound publishers. Each point is
      rendered as a glowing marker on the globe. Multiple points allow
      federated broadcasters or multi-publisher probes to render
      correctly without implying a reach region between them.
    items:
      $ref: './EmissionPoint.yaml'
  sources:
    type: array
    description: >
      Canonical source names bound to this probe. Each entry corresponds
      to a row in the `sources` registry served by `/sources`. The
      client uses this to join per-source metrics back onto the probe
      marker (e.g., aggregating publication rates across
      `tagesschau` + `bundesregierung` into one pulse).
    items:
      type: string
    example:
      - tagesschau
      - bundesregierung
