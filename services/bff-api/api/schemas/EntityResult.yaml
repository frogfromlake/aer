type: object
required:
  - entityText
  - entityLabel
  - count
  - sources
properties:
  entityText:
    type: string
    description: The extracted entity text (e.g., "Bundesregierung", "Berlin").
  entityLabel:
    type: string
    description: The NER label (PER, ORG, LOC, MISC).
  count:
    type: integer
    format: int64
    description: Number of occurrences within the queried time range.
  sources:
    type: array
    items:
      type: string
    description: Distinct data sources that produced this entity.
  wikidataQid:
    type: string
    nullable: true
    description: >
      Canonical Wikidata QID resolved by the Phase 118 entity-linking step,
      or null when no candidate above the heuristic confidence threshold
      was found. The link is the highest-confidence match across all
      occurrences of this (entityText, entityLabel) pair in the window;
      ties broken by sitelink count via the alias index.
  linkConfidence:
    type: number
    format: float
    nullable: true
    description: >
      Confidence (0.7–1.0) of the resolved link, or null when no link was
      established. Heuristic Tier-1.5 weights — see `aer_gold.metric_validity`
      for `entity_link_confidence` and WP-002 §4.2.
