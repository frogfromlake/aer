components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Static API key. Compared via `crypto/subtle.ConstantTimeCompare` in
        `pkg/middleware/apikey.go`. Phase 134 / ADR-040 demoted this to a
        MACHINE credential (CI / internal callers reaching the BFF directly):
        Traefik no longer injects it for browsers, which authenticate by the
        session cookie below. The BFF middleware accepts a valid session
        cookie OR a valid X-API-Key; health probes are exempt.
    CookieAuth:
      type: apiKey
      in: cookie
      name: __Host-aer_session
      description: >
        Opaque, server-side session id (ADR-040). httpOnly + Secure +
        SameSite=Strict + the `__Host-` prefix; JavaScript cannot read it.
        The session state lives in Postgres so revocation is immediate
        (LICENSE §3.3). This is how browsers authenticate; the name drops the
        `__Host-` prefix when BFF_SECURE_COOKIES is false (local http / tests).
