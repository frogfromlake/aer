openapi: 3.0.3
info:
  title: AĒR BFF API
  description: Backend-for-Frontend serving aggregated societal metrics to the UI.
  version: 2.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

security:
  - ApiKeyAuth: []

tags:
  - name: Metrics
    description: Time-series metrics, available metric discovery, and provenance metadata.
  - name: Analysis
    description: Named entity and language detection aggregations.
  - name: Content
    description: Dual-Register semantic and methodological content for UI entities.
  - name: Reference
    description: Source registry and static reference data.
  - name: Health
    description: Liveness and readiness probes (no authentication required).
  - name: Auth
    description: >
      Session-based access control (ADR-040). BFF-driven opaque sessions; no
      token ever reaches the client. login/accept-invite/forgot-password/
      reset-password are pre-auth; the rest require a session.
  - name: Admin
    description: >
      Admin-only user management (ADR-040). Invite/approval-based account
      creation, suspend/reactivate, admin-initiated reset. Requires the
      `admin` role.
  - name: Analyses
    description: >
      Saved Workbench analyses + identity-based sharing (Phase 135 / ADR-040).
      Owner-scoped CRUD; shares grant named users readable/editable access —
      never a capability link, never share-with-all.

