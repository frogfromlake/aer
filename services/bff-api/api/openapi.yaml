openapi: 3.0.3
info:
  title: AĒR BFF API
  description: Backend-for-Frontend serving aggregated societal metrics to the UI.
  version: 2.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

security:
  - ApiKeyAuth: []

tags:
  - name: Metrics
    description: Time-series metrics, available metric discovery, and provenance metadata.
  - name: Analysis
    description: Named entity and language detection aggregations.
  - name: Content
    description: Dual-Register semantic and methodological content for UI entities.
  - name: Reference
    description: Source registry and static reference data.
  - name: Health
    description: Liveness and readiness probes (no authentication required).

paths:
  /metrics:
    $ref: './paths/metrics.yaml'
  /metrics/available:
    $ref: './paths/metrics_available.yaml'
  /metrics/correlation:
    $ref: './paths/metrics_correlation.yaml'
  /metrics/{metricName}/provenance:
    $ref: './paths/metrics_provenance.yaml'
  /metrics/{metricName}/distribution:
    $ref: './paths/metrics_distribution.yaml'
  /metrics/{metricName}/heatmap:
    $ref: './paths/metrics_heatmap.yaml'
  /entities:
    $ref: './paths/entities.yaml'
  /entities/cooccurrence:
    $ref: './paths/entities_cooccurrence.yaml'
  /topics/distribution:
    $ref: './paths/topics_distribution.yaml'
  /languages:
    $ref: './paths/languages.yaml'
  /sources:
    $ref: './paths/sources.yaml'
  /sources/{id}:
    $ref: './paths/source_detail.yaml'
  /silver/documents:
    $ref: './paths/silver_documents.yaml'
  /silver/documents/{id}:
    $ref: './paths/silver_document_detail.yaml'
  /silver/aggregations/{aggregationType}:
    $ref: './paths/silver_aggregations.yaml'
  /probes:
    $ref: './paths/probes.yaml'
  /probes/{id}/dossier:
    $ref: './paths/probe_dossier.yaml'
  /probes/{probeId}/equivalence:
    $ref: './paths/probe_equivalence.yaml'
  /sources/{id}/articles:
    $ref: './paths/source_articles.yaml'
  /articles/{id}:
    $ref: './paths/article_detail.yaml'
  /healthz:
    $ref: './paths/healthz.yaml'
  /readyz:
    $ref: './paths/readyz.yaml'
  /content/{entityType}/{entityId}:
    $ref: './paths/content.yaml'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Static API key. Compared via `crypto/subtle.ConstantTimeCompare` in
        `pkg/middleware/apikey.go`. Required on all data endpoints; health
        probes are exempt.
  schemas:
    ValidationStatus:
      $ref: './schemas/ValidationStatus.yaml'
    Resolution:
      $ref: './schemas/Resolution.yaml'
    EquivalenceLevel:
      $ref: './schemas/EquivalenceLevel.yaml'
    EquivalenceStatus:
      $ref: './schemas/EquivalenceStatus.yaml'
    AvailableMetric:
      $ref: './schemas/AvailableMetric.yaml'
    ProbeEquivalenceSummary:
      $ref: './schemas/ProbeEquivalenceSummary.yaml'
    ProbeEquivalenceSummaryMetric:
      $ref: './schemas/ProbeEquivalenceSummaryMetric.yaml'
    TierClassification:
      $ref: './schemas/TierClassification.yaml'
    MetricProvenance:
      $ref: './schemas/MetricProvenance.yaml'
    Source:
      $ref: './schemas/Source.yaml'
    Probe:
      $ref: './schemas/Probe.yaml'
    EmissionPoint:
      $ref: './schemas/EmissionPoint.yaml'
    ContentRegister:
      $ref: './schemas/ContentRegister.yaml'
    ContentRegisters:
      $ref: './schemas/ContentRegisters.yaml'
    ContentResponse:
      $ref: './schemas/ContentResponse.yaml'
    ProbeDossier:
      $ref: './schemas/ProbeDossier.yaml'
    ProbeDossierSource:
      $ref: './schemas/ProbeDossierSource.yaml'
    ArticleListItem:
      $ref: './schemas/ArticleListItem.yaml'
    ArticlesPage:
      $ref: './schemas/ArticlesPage.yaml'
    ArticleDetail:
      $ref: './schemas/ArticleDetail.yaml'
    RefusalPayload:
      $ref: './schemas/RefusalPayload.yaml'
    DistributionResponse:
      $ref: './schemas/DistributionResponse.yaml'
    HeatmapResponse:
      $ref: './schemas/HeatmapResponse.yaml'
    CorrelationMatrix:
      $ref: './schemas/CorrelationMatrix.yaml'
    CoOccurrenceGraph:
      $ref: './schemas/CoOccurrenceGraph.yaml'
    SourceDetail:
      $ref: './schemas/SourceDetail.yaml'
    SilverDocumentSummary:
      $ref: './schemas/SilverDocumentSummary.yaml'
    SilverDocumentsPage:
      $ref: './schemas/SilverDocumentsPage.yaml'
    SilverDocumentDetail:
      $ref: './schemas/SilverDocumentDetail.yaml'
    SilverAggregationResponse:
      $ref: './schemas/SilverAggregationResponse.yaml'
    TopicDistributionResponse:
      $ref: './schemas/TopicDistributionResponse.yaml'
