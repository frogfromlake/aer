openapi: 3.0.3
info:
  title: AĒR BFF API
  description: Backend-for-Frontend serving aggregated societal metrics to the UI.
  version: 2.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

security:
  - ApiKeyAuth: []

tags:
  - name: Metrics
    description: Time-series metrics, available metric discovery, and provenance metadata.
  - name: Analysis
    description: Named entity and language detection aggregations.
  - name: Content
    description: Dual-Register semantic and methodological content for UI entities.
  - name: Reference
    description: Source registry and static reference data.
  - name: Health
    description: Liveness and readiness probes (no authentication required).

paths:
  /metrics:
    $ref: './paths/metrics.yaml'
  /metrics/available:
    $ref: './paths/metrics_available.yaml'
  /metrics/{metricName}/provenance:
    $ref: './paths/metrics_provenance.yaml'
  /entities:
    $ref: './paths/entities.yaml'
  /languages:
    $ref: './paths/languages.yaml'
  /sources:
    $ref: './paths/sources.yaml'
  /probes:
    $ref: './paths/probes.yaml'
  /healthz:
    $ref: './paths/healthz.yaml'
  /readyz:
    $ref: './paths/readyz.yaml'
  /content/{entityType}/{entityId}:
    $ref: './paths/content.yaml'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Static API key. Compared via `crypto/subtle.ConstantTimeCompare` in
        `pkg/middleware/apikey.go`. Required on all data endpoints; health
        probes are exempt.
  schemas:
    ValidationStatus:
      $ref: './schemas/ValidationStatus.yaml'
    Resolution:
      $ref: './schemas/Resolution.yaml'
    EquivalenceLevel:
      $ref: './schemas/EquivalenceLevel.yaml'
    AvailableMetric:
      $ref: './schemas/AvailableMetric.yaml'
    TierClassification:
      $ref: './schemas/TierClassification.yaml'
    MetricProvenance:
      $ref: './schemas/MetricProvenance.yaml'
    Source:
      $ref: './schemas/Source.yaml'
    Probe:
      $ref: './schemas/Probe.yaml'
    EmissionPoint:
      $ref: './schemas/EmissionPoint.yaml'
    ContentRegister:
      $ref: './schemas/ContentRegister.yaml'
    ContentRegisters:
      $ref: './schemas/ContentRegisters.yaml'
    ContentResponse:
      $ref: './schemas/ContentResponse.yaml'
