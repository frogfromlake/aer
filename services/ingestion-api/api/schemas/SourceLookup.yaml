type: object
description: Resolved source record for the requested `name`.
required:
  - id
  - name
properties:
  id:
    type: integer
    format: int32
    description: Numeric source identifier used by `/ingest`.
    example: 1
  name:
    type: string
    description: Canonical source name (e.g., `tagesschau`).
    example: tagesschau
