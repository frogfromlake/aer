# AĒR Dashboard — Nginx site config.
# Static SvelteKit bundle with SPA fallback. Served as the non-root `nginx`
# user per Phase 84 container hardening.

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tune for static bundle — no upstream proxying happens here.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    # Gzip on; Brotli would need nginx-brotli which isn't in the stock image.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Baseline security headers. Full CSP arrives with Phase 98 when the
    # design-system surface + OTel endpoints are known.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Healthcheck — static 200, no filesystem hit.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Hashed asset chunks are immutable — cache aggressively.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unmatched route serves the prerendered fallback
    # index.html (SvelteKit static adapter `fallback: 'index.html'`).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
