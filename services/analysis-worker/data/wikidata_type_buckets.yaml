# Wikidata type-bucket configuration for the alias-index build (Phase 118).
#
# This file is the system-of-record for the index scope. The build script
# (scripts/build_wikidata_index.py) iterates buckets in the order declared
# here; iteration order is part of the determinism guarantee — re-ordering
# this file changes the build hash even if the resulting alias set is
# unchanged. Sort additions to the end of the list to preserve byte-stable
# rebuilds across releases.
#
# Each bucket carries TWO membership specifications:
#
#   * `where_clause` — SPARQL fragment, kept as human-readable documentation
#     of the entity scope. Phase 118 used this directly against the public
#     SPARQL endpoint; Phase 118b switched to a dump-based pipeline and the
#     SPARQL form is now reference-only. It is not parsed at build time.
#
#   * `match` — structured DSL evaluated by `BucketMatcher` in
#     `scripts/build_wikidata_index.py`. Supported keys:
#       p31_any:           [Qxxx, ...]   entity has any of these as P31
#       p106_any:          [Qxxx, ...]   entity has any of these as P106
#       p31_subclass_of:   [Qxxx, ...]   entity's P31 ∈ closure(P279*, root)
#       min_population:    int           entity's P1082 ≥ value
#
#   * `min_sitelinks` (top-level, optional) — sitelinks-count threshold,
#     applied during hydration after bucket membership is decided.
#
# When updating a bucket, keep `where_clause` and `match` semantically in
# sync. The two-form contract exists so that the SPARQL fragment remains
# the explanatory artefact for newcomers while the build script consumes
# the structured form.
#
# Adding a new bucket is a one-PR operation: append an entry below, run the
# workflow_dispatch trigger of wikidata_index_rebuild, and verify the resulting
# index size + hash match expectations. No code change required.

buckets:
  - name: politicians
    description: Heads of state, ministers, parliamentarians, party officials
    where_clause: |
      ?item wdt:P31 wd:Q5 ;
            wdt:P106 ?occ .
      VALUES ?occ {
        wd:Q82955    # politician
        wd:Q372436   # statesperson
        wd:Q83307    # minister
        wd:Q486839   # member of parliament
        wd:Q1971288  # head of state
        wd:Q30461    # president
        wd:Q484876   # head of government
        wd:Q2285706  # head of government (alt)
        wd:Q4175034  # diplomat
      }
    match:
      p31_any: [Q5]
      p106_any:
        - Q82955    # politician
        - Q372436   # statesperson
        - Q83307    # minister
        - Q486839   # member of parliament
        - Q1971288  # head of state
        - Q30461    # president
        - Q484876   # head of government
        - Q2285706  # head of government (alt)
        - Q4175034  # diplomat
    min_sitelinks: 3

  - name: sovereign_states
    description: UN-member and de-facto sovereign states
    where_clause: |
      ?item wdt:P31 wd:Q3624078 .
    match:
      p31_any: [Q3624078]

  - name: subnational_entities
    description: First-level administrative divisions (Bundesländer, régions, states)
    where_clause: |
      ?item wdt:P31 ?cls .
      VALUES ?cls {
        wd:Q35657   # state of Germany
        wd:Q34876   # province
        wd:Q22387   # state of the United States
        wd:Q9357527 # autonomous community of Spain
        wd:Q36784   # region of France
      }
    match:
      p31_any:
        - Q35657    # state of Germany
        - Q34876    # province
        - Q22387    # state of the United States
        - Q9357527  # autonomous community of Spain
        - Q36784    # region of France

  - name: cities_population_threshold
    description: Cities with population >= 50,000
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q515 ;
            wdt:P1082 ?pop .
      FILTER(?pop >= 50000)
    match:
      p31_subclass_of: [Q515]
      min_population: 50000

  - name: international_organizations
    description: International organisations (UN, NATO, OECD, etc.)
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q484652 .
    match:
      p31_subclass_of: [Q484652]
    min_sitelinks: 3

  - name: political_parties
    description: Political parties (current and historical)
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q7278 .
    match:
      p31_subclass_of: [Q7278]
    min_sitelinks: 2

  - name: government_agencies
    description: Government agencies, ministries, regulatory bodies
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q327333 .
    match:
      p31_subclass_of: [Q327333]
    min_sitelinks: 2

  - name: central_banks
    description: Central banks (ECB, Fed, Bundesbank, etc.)
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q1242737 .
    match:
      p31_subclass_of: [Q1242737]

  - name: news_organisations
    description: News agencies, newspapers, news websites
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q1002697 .
    match:
      p31_subclass_of: [Q1002697]
    min_sitelinks: 3

  - name: broadcasters
    description: Public and private broadcasters
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q15265344 .
    match:
      p31_subclass_of: [Q15265344]
    min_sitelinks: 3

  - name: eu_institutions
    description: EU institutions and bodies (Commission, Parliament, ECJ, etc.)
    where_clause: |
      ?item wdt:P31/wdt:P279* wd:Q3152824 .
    match:
      p31_subclass_of: [Q3152824]
