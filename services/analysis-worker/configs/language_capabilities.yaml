# Language Capability Manifest (ADR-024 / Phase 118a).
#
# Single system-of-record for per-language analytical capability across the
# AĒR analysis worker and the BFF API. See
# `services/analysis-worker/internal/models/language_capability.py` for the
# Pydantic schema and `docs/extending/add-a-language.md` for the editorial
# workflow.
#
# Editing rules:
#   * Adding a language: add a new top-level entry under `languages:` and add
#     the spaCy model to `services/analysis-worker/requirements.txt`. Then
#     run `make scaffold-metric-validity` and commit the resulting diff in
#     `infra/clickhouse/seed/metric_validity_scaffold_generated.sql`.
#   * Refining an existing block: feature flags under `sentiment_tier1.features`
#     are validated against the extractor's known set — typos fail at startup.
#   * Tier-2 entries (`sentiment_tier2_default`, `sentiment_tier2_refinement`)
#     are consumed from Phase 119 onward; today they remain unset.
#   * `manifest_version` evolution policy is governed by ADR-024.

manifest_version: 1

languages:
  de:
    iso_code: de
    display_name: German

    # Phase 116/117 baseline. NER tier 1.5 = spaCy de_core_news_lg with the
    # Wikidata alias-resolution sidecar wired up in Phase 118.
    ner:
      tier: 1.5
      model: de_core_news_lg
      model_version: "3.8.0"
      provenance: "spaCy German news-domain large model"

    # Phase 117 hardening: dependency-based negation, compound split, and
    # custom-lexicon override. The negation block lifts the constants that
    # used to live as module-level frozensets in
    # `internal/extractors/sentiment.py` so a new language is a manifest
    # edit, not an extractor patch.
    sentiment_tier1:
      tier: 1
      method: lexicon
      lexicon: sentiws_v2.0
      features:
        - negation_dependency
        - compound_split
        - custom_lexicon
      negation:
        # Surface-form negation cues. Includes the inflected forms of `kein`
        # plus the standard sentence- and clause-level negators.
        particles:
          - nicht
          - kein
          - keine
          - keiner
          - keines
          - keinem
          - keinen
          - keinerlei
          - niemals
          - nie
          - nirgends
          - nirgendwo
          - kaum
        # German subordinators that mark embedded-clause boundaries. Used by
        # the operator-facing extending guide; the dependency walk uses the
        # `clause_boundary_deps` list below for the actual scope clamp.
        clause_boundaries:
          - weil
          - dass
          - obwohl
          - während
          - nachdem
          - bevor
        # spaCy / TIGER dep relations that mark a negation cue.
        spacy_neg_dep: neg
        spacy_neg_deps_extra:
          - ng
        # Dep relations that the negation walk treats as clause edges so the
        # inversion scope does not bleed into embedded clauses.
        clause_boundary_deps:
          - cc      # UD coordination
          - mark    # UD subordinator
          - cp      # TIGER complementiser
          - oc      # TIGER clausal object
          - re      # TIGER relative clause
          - cj      # TIGER conjunct
          - cd      # TIGER coordinator
      metric_name: sentiment_score_sentiws

    # Phase 119: Tier-2 sentiment per ADR-023. The multilingual default is
    # provided centrally via `shared.multilingual_bert`; only the metric name
    # is repeated here so the manifest exposes the per-language metric set
    # without consumers having to follow the `provided_by` indirection.
    sentiment_tier2_default:
      tier: 2
      method: multilingual_bert
      provided_by: shared.multilingual_bert
      metric_name: sentiment_score_bert_multilingual

    # Phase 119: Tier-2.5 German news-domain refinement. The gap between this
    # extractor and the multilingual default is the WP-002 §3.2 domain-transfer
    # signal mentioned in ADR-023.
    sentiment_tier2_refinement:
      tier: 2.5
      method: news_domain_bert
      model: mdraw/german-news-sentiment-bert
      # Pinned commit on the HuggingFace model repo. Rotate via
      # `make deps-refresh` per docs/operations_playbook.md.
      model_revision: "6e3e756d9242be48e27f6233a6c1e557726c1bfa"
      metric_name: sentiment_score_bert_de_news

    cultural_calendar:
      region_default: de
      file: cultural_calendars/de.yaml

    notes:
      - "Compound-split is German-specific (Phase 117); not applicable to non-agglutinating languages."

# Cross-language shared resources.
#
# Phase 119: `multilingual_bert` registers the Tier-2 default sentiment model
# used by `MultilingualBertSentimentExtractor`. Per-language `sentiment_tier2_default`
# blocks reference this entry via `provided_by: shared.multilingual_bert` so the
# model is loaded once per worker, not once per supported language.
shared:
  multilingual_bert:
    model: cardiffnlp/twitter-xlm-roberta-base-sentiment
    # Pinned commit on the HuggingFace model repo. Rotate via
    # `make deps-refresh` per docs/operations_playbook.md.
    model_revision: "f2f1202b1bdeb07342385c3f807f9c07cd8f5cf8"
    # The set of ISO codes the upstream model card lists as supported. The
    # extractor uses this list as a hard language guard — documents whose
    # detected_language falls outside the set produce no metric row.
    supported_languages:
      - ar
      - en
      - fr
      - de
      - hi
      - it
      - pt
      - es

  # Phase 120: BERTopic embedding model for the corpus-level
  # `TopicModelingExtractor`. Multilingual by construction — Probe-1
  # French documents and any future probe land in their own per-language
  # topic partition without per-language retraining (WP-004 §3.4).
  # Memory footprint ~2.2 GB. mpnet (paraphrase-multilingual-mpnet-base-v2)
  # is a viable fallback if E5 proves untenable on the deployment target;
  # see Operations Playbook §"Topic-Modeling Embedding Fallback".
  topic_modeling:
    model: intfloat/multilingual-e5-large
    # Pinned commit on the HuggingFace model repo. Rotate via
    # `make deps-refresh` per docs/operations_playbook.md.
    model_revision: "ab10c1a7f42e74530fe7ae5be82e6d4f11a719eb"
    bertopic_version_floor: "0.16.0"
    umap_seed: 42
    hdbscan_seed: 42
