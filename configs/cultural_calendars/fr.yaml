# AER Cultural Calendar — France (WP-005 §4.3)
#
# Static lookup of culturally significant dates whose presence is expected
# to perturb discourse metrics. Used by analysts when interpreting metric
# anomalies — not consumed by any service in the POC. Structurally parallel
# to cultural_calendars/de.yaml; this structural parity is a precondition for
# the Phase-124 cross-probe temporal equivalence grant (the grant is
# conditional on both calendars being comparable, not merely present).
#
# Schema per entry:
#   date                       ISO 8601 date (YYYY-MM-DD), or recurring rule
#   name                       Human-readable name (French)
#   type                       public_holiday | election | media_event |
#                              commemoration | parliamentary_recess
#   expected_discourse_effect  Qualitative note on the discourse signature
#
# Recurring entries use `recurrence` instead of a fixed date:
#   recurrence: annual         Same calendar date every year
#   recurrence: annual_month   Recurs within a given month each year
#   recurrence: movable        Date computed per year (Easter-based, etc.)
#   recurrence: annual_range   Inclusive MM-DD..MM-DD window each year
#                              (uses `start` and `end` instead of `date`)
#
# Presidential and legislative election dates are listed individually because
# they are not regular (and legislatives can be dissolution-triggered).
#
# `parliamentary_recess` is structurally parallel to the Bundestag recess in
# cultural_calendars/de.yaml — both legislatures' summer breaks slow the
# institutional publication cadence, which is exactly the temporal-rhythm
# signal the Phase-124 equivalence grant compares (WP-004 §6.3, Appendix B).

region: FR
language: fr
last_updated: "2026-06-03"

entries:
  # --- Public Holidays (national, recurring) ---
  - date: "01-01"
    recurrence: annual
    name: "Jour de l'An"
    type: public_holiday
    expected_discourse_effect: "Reduced news volume; reflective/year-in-review framing; presidential vœux follow-up."

