# Production overlay — adds Let's Encrypt ACME TLS certificates.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Disk-fill posture is INHERITED from compose.yaml and verified to hold in the
# merged prod config (SEC-055/099/100): every service keeps the base rotated
# json-file logging cap (10MB x 3), ClickHouse keeps its system-log TTL/disable
# config mount, and the NATS AER_LAKE stream keeps its bounded max_age/max_bytes.
# This overlay must NOT override a service's `logging:` (the base anchor
# `*default-logging` is file-local to compose.yaml and not available here) — if a
# prod-specific log driver is ever needed, re-add an explicit cap, never an
# unbounded driver.
services:
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt

  # SEC-001: the MinIO console gets NO public router in production. It stays on
  # the internal aer-backend network; reach it via an SSH tunnel
  # (`ssh -L 9001:localhost:9001 <box>` after `docker compose --profile debug up`,
  # or `ssh -L 9001:<minio-container-ip>:9001`). `!override` replaces the base
  # service's Traefik labels so no router is ever created from MINIO_CONSOLE_HOST.
  # (Requires Docker Compose v2.24.4+ for the !override tag.)
  minio:
    labels: !override
      - "traefik.enable=false"

  bff-api:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.bff-api.entrypoints=websecure"
      - "traefik.http.routers.bff-api.tls.certresolver=myresolver"
      - "traefik.http.services.bff-api.loadbalancer.server.port=8080"
      # Phase 134 / ADR-040: NO gateway-injected API key (mirrors compose.yaml).
      # Browsers authenticate by the opaque session cookie; the X-API-Key is a
      # machine-only credential sent directly to the BFF on the backend network.

  dashboard:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"

  # SEC-001: Grafana dashboards get NO public router in production. Alerts still
  # leave the box by email (Grafana → Brevo, Phase 153); operators view dashboards
  # via an SSH tunnel (`ssh -L 3000:localhost:3000 <box>` after a debug-profile up,
  # or `ssh -L 3000:<grafana-container-ip>:3000`). `!override` drops the base
  # Traefik labels so no router is created from GRAFANA_HOST.
  grafana:
    labels: !override
      - "traefik.enable=false"

volumes:
  traefik-certs:
