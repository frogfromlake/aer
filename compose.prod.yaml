# Production overlay — adds Let's Encrypt ACME TLS certificates.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Disk-fill posture is INHERITED from compose.yaml and verified to hold in the
# merged prod config (SEC-055/099/100): every service keeps the base rotated
# json-file logging cap (10MB x 3), ClickHouse keeps its system-log TTL/disable
# config mount, and the NATS AER_LAKE stream keeps its bounded max_age/max_bytes.
# This overlay must NOT override a service's `logging:` (the base anchor
# `*default-logging` is file-local to compose.yaml and not available here) — if a
# prod-specific log driver is ever needed, re-add an explicit cap, never an
# unbounded driver.
services:
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # SEC-042 — ACME CA toggle. Defaults to the Let's Encrypt PRODUCTION
      # directory. Let's Encrypt enforces tight rate limits (e.g. 5 duplicate-cert
      # failures/hour, 50 certs/week per domain); a misconfigured first deploy can
      # burn the week's quota and lock you out. For a first run / DNS-still-
      # propagating dry-run, set ACME_CA_SERVER to the STAGING directory
      # (https://acme-staging-v02.api.letsencrypt.org/directory) — untrusted certs
      # but unlimited retries — then unset it and `up` again for a real cert.
      # Switching CA requires clearing the old acme.json (see backup_restore /
      # operations playbook): `docker compose run --rm traefik rm -f /letsencrypt/acme.json`.
      - "--certificatesresolvers.myresolver.acme.caserver=${ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # acme.json lives in this named volume; Traefik creates it 0600 and refuses
      # to start if a bind-mounted acme.json is more permissive. Keep it a named
      # volume (not a host bind) so the permission is managed for you (SEC-042).
      - traefik-certs:/letsencrypt

  # SEC-001: the MinIO console gets NO public router in production. It stays on
  # the internal aer-backend network; reach it via an SSH tunnel
  # (`ssh -L 9001:localhost:9001 <box>` after `docker compose --profile debug up`,
  # or `ssh -L 9001:<minio-container-ip>:9001`). `!override` replaces the base
  # service's Traefik labels so no router is ever created from MINIO_CONSOLE_HOST.
  # (Requires Docker Compose v2.24.4+ for the !override tag.)
  minio:
    labels: !override
      - "traefik.enable=false"

  bff-api:
    labels:
      # SEC-040 — scope the router to the canonical app host. A Host-less
      # catch-all answers for ANY Host header (incl. the raw IP / a stray
      # domain), which both leaks the app to unintended names and makes the ACME
      # certresolver's hostname non-deterministic. `${DASHBOARD_HOST}` is the
      # deployed apex (e.g. aer-project.eu); preflight.sh requires it in prod.
      - "traefik.enable=true"
      - "traefik.http.routers.bff-api.rule=Host(`${DASHBOARD_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.bff-api.entrypoints=websecure"
      - "traefik.http.routers.bff-api.tls.certresolver=myresolver"
      - "traefik.http.services.bff-api.loadbalancer.server.port=8080"
      # Phase 134 / ADR-040: NO gateway-injected API key (mirrors compose.yaml).
      # Browsers authenticate by the opaque session cookie; the X-API-Key is a
      # machine-only credential sent directly to the BFF on the backend network.

  dashboard:
    labels:
      # SEC-040 — same host scoping for the static frontend catch-all.
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST}`) && PathPrefix(`/`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.priority=1"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"

  # SEC-001: Grafana dashboards get NO public router in production. Alerts still
  # leave the box by email (Grafana → Brevo, Phase 153); operators view dashboards
  # via an SSH tunnel (`ssh -L 3000:localhost:3000 <box>` after a debug-profile up,
  # or `ssh -L 3000:<grafana-container-ip>:3000`). `!override` drops the base
  # Traefik labels so no router is created from GRAFANA_HOST.
  grafana:
    labels: !override
      - "traefik.enable=false"

  # SEC-064 — harden the MkDocs services for production. The base compose runs a
  # dev livereload server with the WHOLE repo bind-mounted (`.:/docs`), which (a)
  # gives the docs container read access to .env and every other repo file and
  # (b) runs a file-watching livereload websocket — neither belongs on a prod box.
  # The overlay drops livereload and `!override`s the mount down to ONLY what
  # MkDocs needs (docs/ + the two configs, all read-only). Access is unchanged:
  # internal docs stay loopback-only (127.0.0.1:8001, SEC-018) → SSH tunnel
  # `ssh -L 8001:localhost:8001 <box>`; see docs/operations/monitoring.md.
  # (Public routing of the :8000 portal is a separate, deliberate decision — the
  # gated POC keeps it firewall-blocked, not Traefik-routed.)
  docs:
    command: serve -f mkdocs.public.yml --dev-addr=0.0.0.0:8000 --no-livereload
    volumes: !override
      - ./docs:/docs/docs:ro
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
      - ./mkdocs.public.yml:/docs/mkdocs.public.yml:ro

  docs-internal:
    command: serve -f mkdocs.yml --dev-addr=0.0.0.0:8001 --no-livereload
    volumes: !override
      - ./docs:/docs/docs:ro
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
      - ./mkdocs.public.yml:/docs/mkdocs.public.yml:ro

volumes:
  traefik-certs:
