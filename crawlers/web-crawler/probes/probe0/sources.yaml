# AĒR Web-Crawler Probe Configuration — Probe 0 (German Institutional)
#
# Each `name` must match a source registered in PostgreSQL (see
# infra/postgres/migrations/000003_seed_rss_sources and the Phase-122
# transition migration 000015_probe0_web_source_type). Adding a new
# source = one entry here + one PG seed migration. **No code changes.**
#
# Filtering is exclusively technical (asset URLs, search/index pages,
# legal boilerplate). Section-level editorial filtering (e.g. excluding
# `/sport/`) is rejected as researcher selection bias per WP-006 §3.
# Per-article discourse-function imprecision is addressed in Phase 126b.

# Probe-level configuration (Phase 122b). Applies uniformly to every
# source below — never per-source, by design. Cross-source comparability
# requires a uniform temporal horizon, enforced at probe scope so an
# operator cannot accidentally skew one source's archive depth against
# another (the "archive-depth bias" failure mode).
probe:
  # Temporal cutoff for discovery: any URL with
  # `sitemap_lastmod < (now - time_window_days)` (or RSS pubDate, or
  # archive-page date) is dropped at discovery time, never queued for
  # fetch.
  #
  # **Phase 122e — set to 7 (rolling 7-day watermark).** AĒR is operated
  # as a continuous monitoring system: each `make crawl-probe0` run
  # captures the last seven days of articles for every source, Postgres
  # `crawler_state` dedups already-seen URLs, and only the day's *new*
  # articles incur a fetch. Cron-driven repeated execution accumulates
  # the corpus organically — after 1 month the corpus is 1 month deep,
  # after 1 year 1 year deep.
  #
  # **Why 7 not 1**: 7 days is the data-science best-practice
  # "lateness allowance" for news / editorial pipelines (the same
  # pattern Apache Beam / Flink / Kafka Streams use under the name
  # "rolling window with watermark"). Rationale:
  #   * **Cron resilience.** A single missed firing under a 1-day
  #     window loses that day permanently; under a 7-day window the
  #     next firing recovers it. Postgres dedup makes the overlap
  #     storage- and compute-free.
  #   * **Editorial holds / backdating.** News publishers routinely
  #     emit an article today with `pubDate = yesterday` (or up to
  #     ~ 3 days back) after editorial review. A 1-day window silently
  #     misses these.
  #   * **Time-series gap sensitivity.** Any downstream temporal
  #     aggregation (sentiment over time, topic trends, frequency
  #     analysis) is corrupted by gap days — they manifest as
  #     artificial dips that are invisible to the consumer.
  #   * **Replayability.** A worker hiccup or NATS redelivery edge
  #     case loses an article forever under a tight window; under
  #     a 7-day window the next tick re-discovers it.
  #
  # **Why this is NOT backfill**. Backfill = "ingest content from
  # before we started monitoring." A 7-day rolling watermark only ever
  # reaches into the last week and is a one-time cost on the very
  # first run; from day 7 onward the watermark is stable and the
  # behaviour is identical to "today's articles only." WP-006 §3
  # prohibits *editorial* gating (don't pick sections); it does NOT
  # prohibit *temporal* lateness allowances, which are universal
  # across every source — same rule for tagesschau and bundesregierung,
  # no editorial picking. The Manifesto's "unaltered mirror" principle
  # actually argues *for* the wider window: a strict 1-day cutoff that
  # occasionally drops articles because of a cron hiccup is a
  # less-faithful mirror than a 7-day window that catches everything.
  #
  # The Gold TTLs (5-year / 1825-day / indefinite for the three MVs)
  # are independent of this knob — the corpus accumulates and is
  # retained per the MV TTLs regardless of how each crawl-tick
  # discovers content.
  time_window_days: 7

  # Phase 122e A21 / F-A21 — strict-lastmod sitemap filtering.
  # When `true` (default), sitemap entries with no `<lastmod>` field are
  # *dropped* in temporal-filter mode (i.e., when `time_window_days` is
  # set). When `false`, undated sitemap entries fall through and are
  # ingested as Negative Space (the Phase-122b backfill behaviour).
  #
  # Iter-4 forensics confirmed that Probe 0's bundesregierung.de sitemap
  # has 100 % undated entries (638 of 638 in the leaf I sampled), so
  # the previous "fall through" rule meant 100 % of bundesregierung's
  # 5-year archive bypassed the temporal filter — articles dating back
  # to 2011 made it into Bronze and Silver before being TTL-evicted on
  # the Gold side. Strict mode is the only correct setting for
  # continuous-monitoring; flip to `false` only for an explicit
  # backfill run.
  sitemap_strict_lastmod: true

sources:
  - name: tagesschau
    # Phase 122g — operator-readable publisher homepage. Used by
    # `aer-audit-source --probe <yaml>` to batch-re-audit every
    # configured source against its publisher's live discovery surfaces
    # and surface additive diffs (new RSS feeds, new HTML sitemaps,
    # etc.) for operator review. Not consumed by the runtime crawler.
    homepage_url: https://www.tagesschau.de
    # Phase 122e — tagesschau does NOT publish an XML sitemap at the
    # standard location: `https://www.tagesschau.de/sitemap.xml` returns
    # HTML 404, and `tagesschau.de/robots.txt` carries no `Sitemap:`
    # directive. The publisher DOES expose:
    #   * a main RSS feed at `index~rss2.xml` (≈ 70 most-recent items),
    #   * a daily-refreshed HTML "sitemap" page at
    #     `/infoservices/startseite-sitemap-102.html` (≈ 64 article
    #     links — operator-discoverable, not standardly auto-discoverable),
    #   * a date-indexed archive walker at `/archiv?datum=YYYY-MM-DD`
    #     (≈ 140 articles/day, multi-year depth — code shipped in
    #     Phase 122e, see `internal/discovery/archive_index.py`).
    #
    # Empirical publication rate (operator-observed, cross-checked
    # against the HTML sitemap surface): ≈ 60 articles/day. The earlier
    # 150-300/day estimate in `bias_assessment.md` was incorrect —
    # corrected in Phase 122g.
    #
    # Phase 122g — per-source `discovery:` block declares the channels
    # this publisher exposes (see ADR-031, DiscoveryProtocol Contract).
    # Step 1 (this commit) introduces the schema and aliases the legacy
    # flat keys; step 2 wires the `html_sitemap.py` discovery module and
    # activates `html_sitemap_urls` + `archive_index` on tagesschau.
    discovery:
      sitemap_urls: []
      rss_hint_urls:
        - https://www.tagesschau.de/index~rss2.xml
      # Phase 122g step 2 — HTML sitemap activation. The publisher's
      # daily-refreshed page surfaces ≈ 60 article links. The
      # `article_url_pattern` matches tagesschau's `/<section>/.../<slug>-NNN.html`
      # URL convention; non-article links (navigation, asset URLs, the
      # page's own self-link) are dropped at discovery time.
      html_sitemap_urls:
        - url: https://www.tagesschau.de/infoservices/startseite-sitemap-102.html
          article_url_pattern: 'https?://(www\.)?tagesschau\.de/[^?#]+-[0-9]+\.html$'
      # Phase 122g step 2 — date-indexed archive walker activation. Live
      # check (2026-05-12) confirms daily granularity (≈ 30–40 articles
      # per day, different URL list per date). Over a 7-day window this
      # surfaces ≈ 250–300 unique articles per run — closes the
      # tagesschau side of Structural Bias #8.
      archive_index:
        url_template: https://www.tagesschau.de/archiv?datum={date}
        date_format: "%Y-%m-%d"
        granularity: daily
        article_url_pattern: 'https?://(www\.)?tagesschau\.de/[^?#]+-[0-9]+\.html$'
      expected_floor_per_run: 200   # ≈ 7 days × 30–40 articles after dedup with RSS / HTML sitemap
    politeness:
      delay_seconds: 1.0
      autothrottle: true
      max_concurrent_per_domain: 2
    url_filter:
      exclude_extensions:
        [jpg, png, gif, svg, webp, mp4, mp3, css, js, pdf, ico, woff, woff2]
      exclude_path_prefixes:
        [/api/, /search/, /suche/, /impressum, /datenschutz, /agb]
      require_html_content_type: true
    content_filter:
      min_word_count: 50
      require_extraction_success: true
    # Tier-E scaffolded; populated only when an analysis demands a
    # specific bespoke field. Empty by design in Phase 122.
    custom_extractors: {}

  - name: bundesregierung
    # Phase 122g — see tagesschau homepage_url comment above. Used only
    # by the re-audit CLI, not by the runtime crawler.
    homepage_url: https://www.bundesregierung.de
    # Phase 122e — `https://www.bundesregierung.de/sitemap.xml` returns
    # HTML 404; the publisher's actual sitemaps are three hash-suffixed
    # `sitemap_index.xml` files declared in robots.txt. All three are
    # **service-sitemaps** (archive / forms / CMS-noise URLs only) — no
    # `/breg-de/aktuelles/` news content. RSS is the only channel that
    # surfaces actual news articles; with the Phase-122e sort fix (RSS
    # pubDate populates DiscoveredUrl.sitemap_lastmod) the news URLs
    # compete fairly with sitemap URLs in newest-first ordering. The
    # sitemap_urls list is kept for completeness (operators inspecting
    # the config see what the publisher actually publishes), but the
    # URL-filter below excludes the known noise paths so the sitemap
    # output is constrained to the small fraction of URLs that aren't
    # archive/form/listing pages.
    #
    # Phase 122g — the publisher publishes a four-feed RSS catalogue at
    # `/breg-de/service/newsletter-und-abos/rss-newsfeed`:
    #   * 1151242 — "Bundesregierung kompakt" (currently configured)
    #   * 1151244 — "Pressemitteilungen"        (Phase 122g step 2)
    #   * 1151246 — "Artikel"                    (Phase 122g step 2)
    #   * 2318648 — "Bulletin" (Kanzler-Reden)   (Phase 122g step 2)
    # Step 1 (this commit) introduces the discovery: block schema with
    # the single currently-configured feed (exact pre-122g behaviour);
    # step 2 expands to all four publisher-curated feeds.
    discovery:
      sitemap_urls:
        - https://www.bundesregierung.de/service-sitemap-4d4e784d6cdbde1a37901f96601df03f-sitemap_index.xml
        - https://www.bundesregierung.de/service-sitemap-9dca52ff98e0ed01b98a219a2b0bb383-sitemap_index.xml
        - https://www.bundesregierung.de/service-sitemap-eac0bb2dddac4321ff3b164c4ce8d951-sitemap_index.xml
      # Phase 122g step 2 — all four publisher-curated feeds from
      # `/breg-de/service/newsletter-und-abos/rss-newsfeed` (verified live
      # 2026-05-12). The publisher organised this catalogue; we ingest the
      # set verbatim per WP-006 §3 (publisher curation, not researcher
      # curation).
      rss_hint_urls:
        - https://www.bundesregierung.de/service/rss/breg-de/1151242/feed.xml   # Bundesregierung kompakt
        - https://www.bundesregierung.de/service/rss/breg-de/1151244/feed.xml   # Pressemitteilungen
        - https://www.bundesregierung.de/service/rss/breg-de/1151246/feed.xml   # Artikel
        - https://www.bundesregierung.de/service/rss/breg-de/2318648/feed.xml   # Bulletin
      expected_floor_per_run: 30   # 4 feeds × ~ 7 days × few articles/day after dedup
    politeness:
      delay_seconds: 1.0
      autothrottle: true
      max_concurrent_per_domain: 2
    url_filter:
      exclude_extensions:
        [jpg, png, gif, svg, webp, mp4, mp3, css, js, pdf, ico, woff, woff2]
      # Technical filters only (per WP-006 §3 — no editorial gating).
      # Three categories of exclusion below, all technical:
      #
      # (1) Stack-wide noise paths (legal pages, asset/search endpoints).
      #
      # (2) Phase 122e A3: archive-section index pages and event-listing
      #     pages that bundesregierung's sitemap surfaces but which
      #     contain no article body. Iter-1 forensics: 78 archive + 28
      #     schwerpunkte quarantines confirmed every entry under these
      #     prefixes is non-article content.
      #
      # (3) Phase 122e A16 (supersedes A10): bundesregierung partitions
      #     content by **locale prefix**, not by topic — the actual URL
      #     structure is `/breg-de/...` (German), `/breg-en/...` (English),
      #     `/breg-fr/...` (French). Iter-3 forensics confirmed A10's
      #     topic-prefix exclusions (`/le-gouvernement-fédéral/`,
      #     `/federal-government/`, `/issues/`) silently failed because
      #     a startswith match on `/issues/` cannot match
      #     `/breg-en/issues/...`. The fix is to exclude the locale
      #     prefixes outright — Probe 0 is German-institutional per
      #     the dossier, so the foreign mirrors are by definition
      #     out-of-scope. Technical filtering on locale, same spirit
      #     as `exclude_extensions`; not editorial gating.
      #
      # (4) Phase 122e A11: long tail of CMS-generated non-article
      #     paths the iter-2 forensics surfaced. Cabinet-member
      #     CV/Lebenslauf pages, press-office org-info pages,
      #     newsletter subscription forms, accessible-language mirrors
      #     (sign-language, "easy language"), search-result
      #     placeholders, and broken-link pages — all consume worker
      #     resources without producing articles. Technical filtering
      #     on CMS-emitted non-article content; not editorial gating.
      exclude_path_prefixes:
        # (1) Stack-wide noise.
        - /api/
        - /search/
        - /suche/
        - /impressum
        - /datenschutz
        - /agb
        - /resource/
        # (2) Phase 122e A3 — archive + event-listing.
        - /breg-de/service/archiv-bundesregierung/
        - /breg-de/schwerpunkte/
        # (3) Phase 122e A16 (supersedes A10) — non-German locale mirrors.
        - /breg-en/
        - /breg-fr/
        # (4) Phase 122e A11 — CMS-generated non-article paths.
        - /breg-de/bundesregierung/bundeskabinett/
        - /breg-de/bundesregierung/bundespresseamt/
        - /breg-de/bundesregierung/bundeskanzleramt/
        - /breg-de/bundesregierung/bundesministerien/
        - /breg-de/service/newsletter-und-abos/
        - /breg-de/service/kontakt/
        - /breg-de/gebaerdensprache/
        - /breg-de/leichte-sprache/
        - /breg-de/suche/
        - /breg-de/mediathek/
        # (5) Phase 122e A22 — single-segment CMS info / placeholder
        # pages surfaced by iter-4 forensics. These are not articles;
        # trafilatura fails to extract content from them. Most slip
        # through F-A11 because they don't share a common nested
        # prefix. After F-A21 (strict-lastmod) most of these get
        # dropped at discovery anyway, but listing them here is
        # defense-in-depth in case the publisher ever starts dating
        # them.
        - /breg-de/richtige-wahl-aus-330-berufen-
        - /breg-de/fakten-zur-regierungspolitik-
        - /breg-de/bundesregierung/link-kopieren-
        - /breg-de/neueste-nachrichten-der-bundesregierung-ueber-rss-feedreader-
        - /breg-de/barrierefreiheit/
      require_html_content_type: true
    content_filter:
      min_word_count: 50
      require_extraction_success: true
    custom_extractors: {}
